[[workflow.variables]]
name = "SPEC_PATH"

[[workflow.variables]]
name = "SPEC_RENDERED"

[[workflow.variables]]
name = "STEP_1_OUTPUT"

[[workflow.variables]]
name = "STEP_2_OUTPUT"

[[workflow.variables]]
name = "STEP_3_OUTPUT"

[[workflow.variables]]
name = "STEP_4_OUTPUT"

[[workflow.variables]]
name = "STEP_5_OUTPUT"

[[workflow.variables]]
name = "STEP_6_OUTPUT"

[[workflow.variables]]
name = "STEP_7_OUTPUT"

[[workflow.variables]]
name = "STEP_8_OUTPUT"

[[workflow.variables]]
name = "STEP_9_OUTPUT"

[[workflow.variables]]
name = "STEP_11_OUTPUT"

