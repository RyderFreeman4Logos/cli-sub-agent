[[workflow.variables]]
name = "CURRENT_BRANCH"

[[workflow.variables]]
name = "CWD"

[[workflow.variables]]
name = "DEBATE_JSON"

[[workflow.variables]]
name = "DEBATE_PROMPT"

[[workflow.variables]]
name = "FEATURE"

[[workflow.variables]]
name = "KEY_POINTS"

[[workflow.variables]]
name = "LANGUAGE"

[[workflow.variables]]
name = "MAPPED_VERDICT"

[[workflow.variables]]
name = "MIN_CJK"

[[workflow.variables]]
name = "MIN_HAN"

[[workflow.variables]]
name = "RAW_VERDICT"

[[workflow.variables]]
