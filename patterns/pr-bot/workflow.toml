[[workflow.steps]]
id = 1
title = "Assumed Fork Convention"
tool = "note"
prompt = """
pr-bot assumes the GitHub-common fork convention:

- `origin` = your personal fork (push target and PR source)
- a separate remote such as `upstream` = canonical repository

Under this convention, the default remote resolution order
`branch.<branch>.pushRemote -> remote.pushDefault -> origin -> branch.<branch>.remote -> checkout.defaultRemote -> single remote`
pushes to your fork and opens PRs against the canonical repository.

If you use the alternate convention where `origin` points at the canonical
repository and a separate remote points at your fork, you must configure the
push remote explicitly before running pr-bot:

```bash
git config branch.<your-branch>.pushRemote <fork-remote-name>
```

Or set a global default:

```bash
git config remote.pushDefault <fork-remote-name>
```

When multiple remotes exist, `origin` does not reference the authenticated
GitHub login, and no explicit push remote is configured, pr-bot fails closed
with an actionable error instead of guessing and risking a push to the
canonical repository.
"""
on_fail = "abort"

[[workflow.steps]]
id = 2
title = "Commit Changes"
tool = "bash"
prompt = '''
> **Layer**: 0 (Orchestrator) -- lightweight shell command, no code reading.


Ensure all changes committed. Set `WORKFLOW_BRANCH`, `REMOTE_NAME`, `REPO_SLUG`, and `DEFAULT_BRANCH` once
(both persist through clean branch switches in Step 11).

```bash
# Force weave to pick up workflow variables used across steps.
: "${WORKFLOW_BRANCH}" "${REVIEW_COMPLETED}" "${REMOTE_NAME}" "${REPO_SLUG}" "${DEFAULT_BRANCH}"

ROOT_DIR="$(git rev-parse --show-toplevel)"
WORKFLOW_BRANCH="$(git branch --show-current)"
CURRENT_BRANCH="${WORKFLOW_BRANCH:-$(git branch --show-current)}"
REMOTE_NAME="$("${ROOT_DIR}/patterns/pr-bot/scripts/resolve-push-remote.sh" "${CURRENT_BRANCH}")"
REMOTE_URL=$(git remote get-url --push "$REMOTE_NAME" 2>/dev/null)
if [ -z "$REMOTE_URL" ]; then
  echo "ERROR: git remote '$REMOTE_NAME' has no push URL" >&2
  exit 1
fi

# Parse owner/repo slug from SSH (git@github.com:owner/repo.git) or HTTPS (https://github.com/owner/repo.git).
REPO_SLUG="$(
  printf '%s' "$REMOTE_URL" | sed -E \
    -e 's|^git@[^:]+:||' \
    -e 's|^https?://[^/]+/||' \
    -e 's|^ssh://([^@]+@)?[^/]+/||' \
    -e 's|\.git$||'
)"

if [ -z "$REPO_SLUG" ] || ! printf '%s' "$REPO_SLUG" | grep -qE '^[^/]+/[^/]+$'; then
  echo "ERROR: could not derive owner/repo slug from remote URL: $REMOTE_URL" >&2
  exit 1
fi
# Prefer GitHub API (server truth) over locally-cached remote HEAD (can be stale).
DEFAULT_BRANCH=$(gh repo view "${REPO_SLUG}" --json defaultBranchRef --jq '.defaultBranchRef.name // empty' 2>/dev/null)
if [ -z "$DEFAULT_BRANCH" ]; then
  # gh unavailable or unauthenticated — fall back to cached remote HEAD
  DEFAULT_BRANCH=$(git symbolic-ref "refs/remotes/${REMOTE_NAME}/HEAD" 2>/dev/null | sed "s@^refs/remotes/${REMOTE_NAME}/@@")
fi
if [ -z "$DEFAULT_BRANCH" ]; then
  # Push aliases may not have cached HEAD refs locally; try any fetched remote.
  for CANDIDATE in $(git remote); do
    DEFAULT_BRANCH=$(git symbolic-ref "refs/remotes/${CANDIDATE}/HEAD" 2>/dev/null | sed "s@^refs/remotes/${CANDIDATE}/@@")
    if [ -n "$DEFAULT_BRANCH" ]; then
      break
    fi
  done
fi
if [ -z "$DEFAULT_BRANCH" ]; then
  echo "ERROR: cannot determine default branch (neither 'gh repo view' nor '${REMOTE_NAME}/HEAD' succeeded)" >&2
  echo "Fix: run 'gh auth login' OR 'git remote set-head ${REMOTE_NAME} --auto', then retry" >&2
  exit 1
fi
echo "CSA_VAR:WORKFLOW_BRANCH=$WORKFLOW_BRANCH"
echo "CSA_VAR:REMOTE_NAME=$REMOTE_NAME"
echo "CSA_VAR:REPO_SLUG=$REPO_SLUG"
echo "CSA_VAR:DEFAULT_BRANCH=$DEFAULT_BRANCH"
```'''
on_fail = "abort"

[[workflow.steps]]
id = 3
title = "Local Pre-PR Review (SYNCHRONOUS — MUST NOT background)"
tool = "bash"
prompt = '''
> **Layer**: 1 (CSA executor) -- Layer 0 dispatches `csa review`, which spawns
> Layer 2 reviewer model(s) internally. Orchestrator waits for result.


Run cumulative local review covering all commits since the default branch.
This is the FOUNDATION — without it, bot unavailability cannot safely merge.

> Fast-path (SHA-verified): compare `git rev-parse HEAD` with the HEAD SHA
> stored in the latest `csa review` session metadata. If they match, skip
> Step 2 review. If they do not match (or metadata is missing), run full
> `csa review --branch "${DEFAULT_BRANCH}"`. Any HEAD drift (including amend) auto-invalidates
> the fast-path.

```bash
set -euo pipefail
if [ -n "${CSA_WORKFLOW_DIR:-}" ]; then
  CSA_HELPER_DIR="${CSA_WORKFLOW_DIR}/scripts/csa"
else
  CSA_HELPER_DIR="patterns/pr-bot/scripts/csa"
fi
CURRENT_HEAD="$(git rev-parse HEAD)"
REVIEW_SESSION_RECORD="$(bash "${CSA_HELPER_DIR}/latest-pass-review-head.sh" --session-record)"
LOCAL_REVIEW_SESSION_ID="${LOCAL_REVIEW_SESSION_ID:-}"
REVIEW_HEAD=""
if [ -n "${REVIEW_SESSION_RECORD}" ]; then
  IFS=$'\t' read -r LOCAL_REVIEW_SESSION_ID REVIEW_HEAD <<<"${REVIEW_SESSION_RECORD}"
fi
if [ -n "${REVIEW_HEAD}" ] && [ "${CURRENT_HEAD}" = "${REVIEW_HEAD}" ]; then
  echo "Fast-path: local review already covers current HEAD."
else
  SID=$(csa review --branch "${DEFAULT_BRANCH}")
  LOCAL_REVIEW_SESSION_ID="${SID}"
  bash "${CSA_HELPER_DIR}/session-wait-until-done.sh" "$SID"
fi
REVIEW_COMPLETED=true
echo "CSA_VAR:REVIEW_COMPLETED=$REVIEW_COMPLETED"
echo "CSA_VAR:LOCAL_REVIEW_SESSION_ID=${LOCAL_REVIEW_SESSION_ID}"
echo '<!-- CSA:NEXT_STEP cmd="push and create PR (Step 4)" required=true -->'
```'''
on_fail = "abort"

[[workflow.steps]]
id = 4
title = "Fix Local Review Issues"
tool = "csa"
prompt = """
> **Layer**: 1 (CSA executor) -- Layer 0 dispatches fix task to CSA. CSA reads
> code, applies fixes, and returns results. Orchestrator reviews outcome.


Fix issues found by local review. Loop until clean (max 3 rounds)."""
tier = "tier-4-critical"
condition = "${LOCAL_REVIEW_HAS_ISSUES}"

[workflow.steps.on_fail]
retry = 3

[[workflow.steps]]
id = 5
title = "Push and Ensure PR"
tool = "bash"
prompt = '''
> **Layer**: 0 (Orchestrator) -- shell commands only, no code reading/writing.


**PRECONDITION (MANDATORY)**: Step 2 local review MUST have completed successfully.
- If `REVIEW_COMPLETED` is not `true`, STOP and report:
  `ERROR: Local review (Step 2) was not completed. Run csa review --branch "${DEFAULT_BRANCH}" before creating PR.`
- If Step 2 found unresolved issues that were not fixed in Step 3, STOP and report:
  `ERROR: Local review found unresolved issues. Fix them before PR creation.`
- FORBIDDEN: Creating a PR without completing Step 2. This violates the two-layer review guarantee.

```bash
# --- Precondition gate: review must be complete ---
if [ "${REVIEW_COMPLETED:-}" != "true" ]; then
  echo "ERROR: Local review (Step 2) was not completed."
  echo "Run csa review --branch \"${DEFAULT_BRANCH}\" before creating PR."
  echo "FORBIDDEN: Creating PR without Step 2 completion."
  exit 1
fi

set -euo pipefail

# --- Early-push detection: warn if branch was already pushed before review ---
if git ls-remote --heads "${REMOTE_NAME}" "${WORKFLOW_BRANCH}" 2>/dev/null | grep -q .; then
  echo "WARNING: Branch '${WORKFLOW_BRANCH}' was already pushed to remote before this skill ran."
  echo "Unreviewed code may have been visible to CI/reviewers. Continuing with force-push of reviewed code."
fi

git push --force-with-lease -u "${REMOTE_NAME}" "${WORKFLOW_BRANCH}"
ORIGIN_URL="$(git remote get-url --push "${REMOTE_NAME}")"
SOURCE_OWNER="$(
  printf '%s\n' "${ORIGIN_URL}" | sed -nE \
    -e 's#^https?://([^@/]+@)?github\\.com/([^/]+)/[^/]+(\\.git)?$#\\2#p' \
    -e 's#^(ssh://)?([^@]+@)?github\\.com[:/]([^/]+)/[^/]+(\\.git)?$#\\3#p' \
    | head -n 1
)"
if [ -z "${SOURCE_OWNER}" ]; then
  SOURCE_OWNER="$(gh repo view "${REPO_SLUG}" --json owner -q '.owner.login')"
fi
find_branch_pr() {
  local owner_matches owner_count branch_matches branch_count
  owner_matches="$(
    gh pr list --repo "${REPO_SLUG}" --base "${DEFAULT_BRANCH}" --state open --head "${SOURCE_OWNER}:${WORKFLOW_BRANCH}" --json number \
      --jq '.[].number' 2>/dev/null || true
  )"
  owner_count="$(printf '%s\n' "${owner_matches}" | sed '/^$/d' | wc -l | tr -d ' ')"
  if [ "${owner_count}" = "1" ]; then
    printf '%s\n' "${owner_matches}" | sed '/^$/d' | head -n 1
    return 0
  fi
  if [ "${owner_count}" -gt 1 ]; then
    echo "ERROR: Multiple open PRs found for ${SOURCE_OWNER}:${WORKFLOW_BRANCH}. Resolve ambiguity manually." >&2
    return 1
  fi

  branch_matches="$(
    gh pr list --repo "${REPO_SLUG}" --base "${DEFAULT_BRANCH}" --state open --head "${WORKFLOW_BRANCH}" --json number \
      --jq '.[].number' 2>/dev/null || true
  )"
  branch_count="$(printf '%s\n' "${branch_matches}" | sed '/^$/d' | wc -l | tr -d ' ')"
  if [ "${branch_count}" = "1" ]; then
    printf '%s\n' "${branch_matches}" | sed '/^$/d' | head -n 1
    return 0
  fi
  if [ "${branch_count}" -gt 1 ]; then
    echo "ERROR: Multiple open PRs found for branch ${WORKFLOW_BRANCH}. Resolve ambiguity manually." >&2
    return 1
  fi
  return 2
}

set +e
PR_NUM="$(find_branch_pr)"
FIND_RC=$?
set -e
if [ "${FIND_RC}" = "0" ] && [ -n "${PR_NUM}" ]; then
  echo "Using existing PR #${PR_NUM} for branch ${WORKFLOW_BRANCH}"
elif [ "${FIND_RC}" = "1" ]; then
  exit 1
else
  set +e
  CREATE_OUTPUT="$(gh pr create --repo "${REPO_SLUG}" --base "${DEFAULT_BRANCH}" --head "${SOURCE_OWNER}:${WORKFLOW_BRANCH}" --title "${PR_TITLE}" --body "${PR_BODY}" 2>&1)"
  CREATE_RC=$?
  set -e
  if [ "${CREATE_RC}" != "0" ]; then
    if ! printf '%s\n' "${CREATE_OUTPUT}" | grep -Eiq 'already exists|a pull request already exists'; then
      echo "ERROR: gh pr create failed: ${CREATE_OUTPUT}" >&2
      exit 1
    fi
    echo "Detected existing PR during create race; resolving PR number by owner+branch."
  fi
  FIND_RC=2
  PR_NUM=""
  for attempt in 1 2 3 4 5; do
    set +e
    PR_NUM="$(find_branch_pr)"
    FIND_RC=$?
    set -e
    if [ "${FIND_RC}" = "0" ] && [ -n "${PR_NUM}" ]; then
      break
    fi
    if [ "${FIND_RC}" = "1" ]; then
      break
    fi
    sleep 2
  done
  if [ "${FIND_RC}" != "0" ] || [ -z "${PR_NUM}" ]; then
    echo "ERROR: Failed to resolve a unique PR for branch ${WORKFLOW_BRANCH} targeting \"${DEFAULT_BRANCH}\"." >&2
    exit 1
  fi
fi
if [ -z "${PR_NUM:-}" ] || ! printf '%s' "${PR_NUM}" | grep -Eq '^[0-9]+$'; then
  echo "ERROR: Failed to resolve PR number for branch ${WORKFLOW_BRANCH} targeting \"${DEFAULT_BRANCH}\"." >&2
  exit 1
fi
REPO="${REPO_SLUG}"
echo "CSA_VAR:PR_NUM=$PR_NUM"
echo "CSA_VAR:REPO=$REPO"
echo '<!-- CSA:NEXT_STEP cmd="trigger cloud bot review or merge (Step 4a/5)" required=true -->'
```'''
on_fail = "abort"

[[workflow.steps]]
id = 6
title = "Step 4a: Check Cloud Bot Configuration"
tool = "bash"
prompt = '''
> **Layer**: 0 (Orchestrator) -- config check, lightweight.


Check whether cloud bot review is enabled for this project.
Before triggering the bot, consult the persisted quota cache at
`${XDG_STATE_HOME:-$HOME/.local/state}/cli-sub-agent/pr_review/cloud_bot_quota.toml`.
If the configured bot is still inside a recorded quota-exhaustion window and
`CSA_PR_BOT_FORCE` is not set, skip the bot path and route directly to Step 6a.
Also inspect the latest configured-bot PR comment; if that newest comment
already signals quota exhaustion, record the 24h window and take the same
Step 6a fallback path without entering Step 5.

```bash
set -euo pipefail
if [ -n "${CSA_WORKFLOW_DIR:-}" ]; then
  CSA_HELPER_DIR="${CSA_WORKFLOW_DIR}/scripts/csa"
  PR_BOT_QUOTA_CACHE_SCRIPT="${CSA_WORKFLOW_DIR}/scripts/pr-bot-quota-cache.sh"
else
  CSA_HELPER_DIR="patterns/pr-bot/scripts/csa"
  PR_BOT_QUOTA_CACHE_SCRIPT="patterns/pr-bot/scripts/pr-bot-quota-cache.sh"
fi
# shellcheck source=patterns/pr-bot/scripts/pr-bot-quota-cache.sh
. "${PR_BOT_QUOTA_CACHE_SCRIPT}"
CLOUD_BOT=$(csa config get pr_review.cloud_bot --default true)
CLOUD_BOT_NAME=$(csa config get pr_review.cloud_bot_name --default gemini-code-assist)
CLOUD_BOT_TRIGGER=$(csa config get pr_review.cloud_bot_trigger --default auto)
CLOUD_BOT_LOGIN_RAW=$(csa config get pr_review.cloud_bot_login --default "")
if [ -z "${CLOUD_BOT_LOGIN_RAW}" ]; then
  CLOUD_BOT_LOGIN="${CLOUD_BOT_NAME}[bot]"
else
  CLOUD_BOT_LOGIN="${CLOUD_BOT_LOGIN_RAW}"
fi
# Retrigger command for post-fix re-review (round 2+).
# Default: "/gemini review" for gemini-code-assist, "@<name> review" for others.
CLOUD_BOT_RETRIGGER_CMD_RAW=$(csa config get pr_review.cloud_bot_retrigger_command --default "")
if [ -z "${CLOUD_BOT_RETRIGGER_CMD_RAW}" ]; then
  if [ "${CLOUD_BOT_NAME}" = "gemini-code-assist" ]; then
    CLOUD_BOT_RETRIGGER_CMD="/gemini review"
  else
    CLOUD_BOT_RETRIGGER_CMD="@${CLOUD_BOT_NAME} review"
  fi
else
  CLOUD_BOT_RETRIGGER_CMD="${CLOUD_BOT_RETRIGGER_CMD_RAW}"
fi
# Configurable wait/poll timeouts for cloud bot response.
CLOUD_BOT_WAIT_SECONDS=$(csa config get pr_review.cloud_bot_wait_seconds --default "$(csa config get kv_cache.frequent_poll_seconds --default 60)")
CLOUD_BOT_POLL_MAX_SECONDS=$(csa config get pr_review.cloud_bot_poll_max_seconds --default "$(csa config get kv_cache.long_poll_seconds --default 240)")
CLOUD_BOT_SKIPPED=false
CLOUD_BOT_SKIP_KIND=""
CLOUD_BOT_SKIP_REASON=""
CLOUD_BOT_QUOTA_CACHE_FILE="${XDG_STATE_HOME:-$HOME/.local/state}/cli-sub-agent/pr_review/cloud_bot_quota.toml"
CLOUD_BOT_QUOTA_EXHAUSTED_AT=""
CLOUD_BOT_QUOTA_EXPECTED_RESET_AT=""
MERGE_WITHOUT_BOT_REASON_KIND="${MERGE_WITHOUT_BOT_REASON_KIND:-}"
quota_section_header="[cloud_bot_quota.${CLOUD_BOT_NAME}]"
quota_read_field() {
  local field_name="$1"
  [ -f "${CLOUD_BOT_QUOTA_CACHE_FILE}" ] || return 0
  awk -v target="${quota_section_header}" -v field="${field_name}" '
    $0 == target { in_section = 1; next }
    in_section && /^\[/ { exit }
    in_section && index($0, field " = ") == 1 {
      value = substr($0, length(field) + 4)
      if (value ~ /^".*"$/) {
        value = substr(value, 2, length(value) - 2)
      }
      print value
      exit
    }
  ' "${CLOUD_BOT_QUOTA_CACHE_FILE}"
}
quota_clear_section() {
  local tmp_file
  tmp_file="${CLOUD_BOT_QUOTA_CACHE_FILE}.tmp"
  mkdir -p "$(dirname "${CLOUD_BOT_QUOTA_CACHE_FILE}")"
  if [ -f "${CLOUD_BOT_QUOTA_CACHE_FILE}" ]; then
    awk -v target="${quota_section_header}" '
      $0 == target { skip = 1; next }
      skip && /^\[/ { skip = 0 }
      !skip { print }
    ' "${CLOUD_BOT_QUOTA_CACHE_FILE}" >"${tmp_file}"
  else
    : >"${tmp_file}"
  fi
  mv "${tmp_file}" "${CLOUD_BOT_QUOTA_CACHE_FILE}"
}
query_latest_bot_comment_json() {
  gh api --paginate --slurp "repos/${REPO}/issues/${PR_NUM}/comments?per_page=100" 2>/dev/null \
    | jq -c '[.[] | .[] | select((.user.login // "") == "'"${CLOUD_BOT_LOGIN}"'")] | sort_by(.created_at) | last // empty'
}
if [ "${CLOUD_BOT}" = "true" ]; then
  CLOUD_BOT_QUOTA_EXHAUSTED_AT="$(quota_read_field exhausted_at)"
  CLOUD_BOT_QUOTA_EXPECTED_RESET_AT="$(quota_read_field expected_reset_at)"
  if [ "${CSA_PR_BOT_FORCE:-0}" != "1" ] \
    && [ -n "${CLOUD_BOT_QUOTA_EXHAUSTED_AT}" ] \
    && [ -n "${CLOUD_BOT_QUOTA_EXPECTED_RESET_AT}" ]
  then
    NOW_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
    if [[ "${NOW_UTC}" < "${CLOUD_BOT_QUOTA_EXPECTED_RESET_AT}" ]]; then
      CLOUD_BOT_SKIPPED=true
      CLOUD_BOT_SKIP_KIND="quota_exhausted"
      CLOUD_BOT_SKIP_REASON="quota exhausted at ${CLOUD_BOT_QUOTA_EXHAUSTED_AT}; expected reset ${CLOUD_BOT_QUOTA_EXPECTED_RESET_AT}"
    else
      echo "Cloud bot quota window elapsed for ${CLOUD_BOT_NAME}; clearing ${CLOUD_BOT_QUOTA_CACHE_FILE} and retrying normally." >&2
      quota_clear_section
      CLOUD_BOT_QUOTA_EXHAUSTED_AT=""
      CLOUD_BOT_QUOTA_EXPECTED_RESET_AT=""
    fi
  fi
fi
if [ "${CLOUD_BOT}" = "true" ] \
  && [ "${CLOUD_BOT_SKIPPED}" != "true" ] \
  && [ "${CSA_PR_BOT_FORCE:-0}" != "1" ]
then
  set +e
  LATEST_BOT_COMMENT_JSON="$(query_latest_bot_comment_json)"
  LATEST_BOT_COMMENT_RC=$?
  set -e
  if [ "${LATEST_BOT_COMMENT_RC}" -eq 0 ] && [ -n "${LATEST_BOT_COMMENT_JSON}" ]; then
    LATEST_BOT_COMMENT_BODY="$(printf '%s\n' "${LATEST_BOT_COMMENT_JSON}" | jq -r '.body // ""')"
    if quota_comment_indicates_exhaustion "${LATEST_BOT_COMMENT_BODY}" "${CLOUD_BOT_LOGIN}" "${CLOUD_BOT_NAME}"; then
      LATEST_BOT_COMMENT_CREATED_AT="$(printf '%s\n' "${LATEST_BOT_COMMENT_JSON}" | jq -r '.created_at // ""')"
      QUOTA_NOW_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      QUOTA_EXPECTED_RESET_AT="$(compute_quota_expected_reset_at)"
      QUOTA_CACHE_FILE="${CLOUD_BOT_QUOTA_CACHE_FILE}" \
      BOT_NAME="${CLOUD_BOT_NAME}" \
      PR_NUMBER="${PR_NUM}" \
      write_quota_cache "${QUOTA_NOW_UTC}" "${QUOTA_EXPECTED_RESET_AT}" "cloud_bot_quota_exhausted" "${LATEST_BOT_COMMENT_BODY}"
      CLOUD_BOT_SKIPPED=true
      CLOUD_BOT_SKIP_KIND="quota_exhausted"
      CLOUD_BOT_SKIP_REASON="latest ${CLOUD_BOT_NAME} comment indicates quota exhaustion at ${LATEST_BOT_COMMENT_CREATED_AT:-unknown}"
    fi
  fi
fi
if [ "${CLOUD_BOT}" = "false" ]; then
  BOT_UNAVAILABLE=true
  MERGE_WITHOUT_BOT_REASON_KIND="cloud_bot_disabled"
elif [ "${CLOUD_BOT_SKIPPED}" = "true" ] && [ "${CLOUD_BOT_SKIP_KIND}" = "quota_exhausted" ]; then
  BOT_UNAVAILABLE=true
  echo "SKIPPING cloud bot trigger — ${CLOUD_BOT_NAME} ${CLOUD_BOT_SKIP_REASON}" >&2
  MERGE_WITHOUT_BOT_REASON_KIND="cloud_bot_quota_exhausted"
fi
if [ "${BOT_UNAVAILABLE:-false}" = "true" ]; then
  FALLBACK_REVIEW_HAS_ISSUES=false
  CURRENT_HEAD="$(git rev-parse HEAD)"
  REVIEW_SESSION_RECORD="$(bash "${CSA_HELPER_DIR}/latest-pass-review-head.sh" --session-record)"
  LOCAL_REVIEW_SESSION_ID="${LOCAL_REVIEW_SESSION_ID:-}"
  REVIEW_HEAD=""
  if [ -n "${REVIEW_SESSION_RECORD}" ]; then
    IFS=$'\t' read -r LOCAL_REVIEW_SESSION_ID REVIEW_HEAD <<<"${REVIEW_SESSION_RECORD}"
  fi
  if [ -n "${REVIEW_HEAD}" ] && [ "${CURRENT_HEAD}" = "${REVIEW_HEAD}" ]; then
    echo "Merge-without-bot fast-path active: local review already covers HEAD ${CURRENT_HEAD}."
  else
    echo "Merge-without-bot fast-path invalid. Running full local review."
    SID=$(csa review --branch "${DEFAULT_BRANCH}")
    LOCAL_REVIEW_SESSION_ID="${SID}"
    bash "${CSA_HELPER_DIR}/session-wait-until-done.sh" "$SID"
  fi
fi
BOT_UNAVAILABLE="${BOT_UNAVAILABLE:-false}"
FALLBACK_REVIEW_HAS_ISSUES="${FALLBACK_REVIEW_HAS_ISSUES:-false}"
echo "CSA_VAR:CLOUD_BOT=$CLOUD_BOT"
echo "CSA_VAR:CLOUD_BOT_NAME=$CLOUD_BOT_NAME"
echo "CSA_VAR:CLOUD_BOT_TRIGGER=$CLOUD_BOT_TRIGGER"
echo "CSA_VAR:CLOUD_BOT_LOGIN=$CLOUD_BOT_LOGIN"
echo "CSA_VAR:CLOUD_BOT_RETRIGGER_CMD=$CLOUD_BOT_RETRIGGER_CMD"
echo "CSA_VAR:CLOUD_BOT_QUOTA_CACHE_FILE=$CLOUD_BOT_QUOTA_CACHE_FILE"
echo "CSA_VAR:CLOUD_BOT_QUOTA_EXHAUSTED_AT=${CLOUD_BOT_QUOTA_EXHAUSTED_AT}"
echo "CSA_VAR:CLOUD_BOT_QUOTA_EXPECTED_RESET_AT=${CLOUD_BOT_QUOTA_EXPECTED_RESET_AT}"
echo "CSA_VAR:CLOUD_BOT_SKIPPED=$CLOUD_BOT_SKIPPED"
echo "CSA_VAR:CLOUD_BOT_SKIP_KIND=${CLOUD_BOT_SKIP_KIND}"
echo "CSA_VAR:CLOUD_BOT_SKIP_REASON=${CLOUD_BOT_SKIP_REASON}"
echo "CSA_VAR:CLOUD_BOT_WAIT_SECONDS=$CLOUD_BOT_WAIT_SECONDS"
echo "CSA_VAR:CLOUD_BOT_POLL_MAX_SECONDS=$CLOUD_BOT_POLL_MAX_SECONDS"
# Centralized timeout computation — reused by Step 5, Step 10b, Step 10.5.
# idle-timeout must exceed poll max so the agent isn't killed mid-poll.
# max-timeout adds headroom for agent startup + prompt processing.
# Enforce the 1800s minimum timeout policy.
# Timeout calculation constants (seconds)
readonly POLL_IDLE_BUFFER_SECS=50         # grace above poll max before idle kill
readonly POLL_MAX_HEADROOM_SECS=1200      # grace above poll max before hard timeout
readonly MIN_TIMEOUT_SECS=1800            # minimum per CLAUDE.md timeout policy
readonly POST_REBASE_FIX_BUDGET_SECS=900  # fix/commit/push/re-trigger per round
readonly POST_REBASE_ROUNDS=3             # pr-bot typical rounds

POLL_IDLE_TIMEOUT=$((CLOUD_BOT_POLL_MAX_SECONDS + POLL_IDLE_BUFFER_SECS))
POLL_MAX_TIMEOUT=$((CLOUD_BOT_POLL_MAX_SECONDS + POLL_MAX_HEADROOM_SECS))
if (( POLL_MAX_TIMEOUT < MIN_TIMEOUT_SECS )); then POLL_MAX_TIMEOUT=$MIN_TIMEOUT_SECS; fi
# POST_REBASE_TIMEOUT covers up to POST_REBASE_ROUNDS rounds of (quiet wait + poll + fix work).
# Each round: wait + poll + POST_REBASE_FIX_BUDGET_SECS budget for fix/commit/push/re-trigger.
ROUND_BUDGET_SECONDS=$((CLOUD_BOT_WAIT_SECONDS + CLOUD_BOT_POLL_MAX_SECONDS + POST_REBASE_FIX_BUDGET_SECS))
POST_REBASE_TIMEOUT=$((POST_REBASE_ROUNDS * ROUND_BUDGET_SECONDS))
if (( POST_REBASE_TIMEOUT < MIN_TIMEOUT_SECS )); then POST_REBASE_TIMEOUT=$MIN_TIMEOUT_SECS; fi
echo "CSA_VAR:POLL_IDLE_TIMEOUT=$POLL_IDLE_TIMEOUT"
echo "CSA_VAR:POLL_MAX_TIMEOUT=$POLL_MAX_TIMEOUT"
echo "CSA_VAR:POST_REBASE_TIMEOUT=$POST_REBASE_TIMEOUT"
echo "CSA_VAR:BOT_UNAVAILABLE=$BOT_UNAVAILABLE"
echo "CSA_VAR:FALLBACK_REVIEW_HAS_ISSUES=$FALLBACK_REVIEW_HAS_ISSUES"
echo "CSA_VAR:LOCAL_REVIEW_SESSION_ID=${LOCAL_REVIEW_SESSION_ID:-}"
echo "CSA_VAR:MERGE_WITHOUT_BOT_REASON_KIND=${MERGE_WITHOUT_BOT_REASON_KIND:-}"
```

If `CLOUD_BOT` is `false`:
- Skip Steps 5 through 10 (cloud bot trigger, delegated wait gate, classify, arbitrate, fix).
- Reuse the same SHA-verified fast-path before supplementary review:
  - If current `HEAD` matches latest reviewed session HEAD SHA → skip review.
  - Otherwise run full `csa review --branch "${DEFAULT_BRANCH}"`.
- Route to Step 6a (Merge Without Bot) after supplementary local review gate passes.'''
on_fail = "abort"

[[workflow.steps]]
id = 7
title = "Trigger Cloud Bot Review and Delegate Waiting"
tool = "bash"
prompt = '''
> **Layer**: 0 (Orchestrator + shell helper).
> Layer 0 triggers cloud bot review (via @mention or auto-review depending on
> `cloud_bot_trigger` config and review round), launches a self-contained shell
> poller once, then checks a deterministic result file after at most two
> long-poll windows. Intermediate GitHub polling happens entirely in shell.


Trigger cloud bot review for current HEAD. Trigger method is **round-aware**:
- **Round 0** (initial PR creation): follows `cloud_bot_trigger` config
  ("comment" posts `@bot review`, "auto" skips trigger since bot auto-reviews).
- **Round 1+** (after fix push): ALWAYS posts explicit retrigger command
  (`cloud_bot_retrigger_command`, default: `/gemini review` for gemini-code-assist)
  because bots do NOT auto-review on subsequent pushes (#506).

Wait `cloud_bot_wait_seconds` (default: `kv_cache.frequent_poll_seconds`, 60s), then launch `patterns/pr-bot/scripts/pr-bot-wait.sh` with `cloud_bot_poll_max_seconds` (default: `kv_cache.long_poll_seconds`, 240s) as its internal timeout and `cloud_bot_poll_interval_seconds` (default: `30`) as its shell-level poll interval.
If an exact current-HEAD bot review already exists before this run triggers the
bot, reuse that specific review object instead of posting a duplicate trigger
or aborting on resume/rerun.
If bot times out, **ABORT the workflow** — user must decide next action.
Also detects non-target bot comments (e.g., codex auto-review when
configured bot is gemini-code-assist) and includes them with a quota warning.
If the most recent issue comment from the configured bot indicates quota
exhaustion (`daily quota limit`, `resource exhausted`, gemini `try again
later`, or generic quota/rate-limit wording), record the 24h quota window in
the cache file, mark the bot unavailable, and continue through the Step 6a
merge-without-bot path instead of spending another wait cycle. This applies
both to the polling helper path and to the later Step 5 post-verification
latest-comment check.

```bash
set -euo pipefail
if [ -n "${CSA_WORKFLOW_DIR:-}" ]; then
  CSA_HELPER_DIR="${CSA_WORKFLOW_DIR}/scripts/csa"
else
  CSA_HELPER_DIR="patterns/pr-bot/scripts/csa"
fi

CURRENT_SHA="$(git rev-parse HEAD)"
REVIEW_ROUND="${REVIEW_ROUND:-0}"
BOT_UNAVAILABLE=true
FALLBACK_REVIEW_HAS_ISSUES=false
BOT_HAS_ISSUES=false
BOT_HAS_ISSUES_SOURCE=""
BOT_REUSED_REVIEW_ID=""

# --- Detect whether current HEAD already has a reusable bot review ---
query_latest_current_head_trigger_ts() {
  gh api --paginate --slurp "repos/${REPO}/issues/${PR_NUM}/comments?per_page=100" 2>/dev/null \
    | jq -r '[.[] | .[] | select((.body // "") | test("csa-trigger:'"${CURRENT_SHA}"':|csa-retrigger:round[0-9]+:'"${CURRENT_SHA}"':|csa-retrigger:post-fix:'"${CURRENT_SHA}"':")) | .created_at] | sort | last // ""'
}

query_reusable_current_head_review_record() {
  local latest_trigger_ts="${1:-}"
  gh api --paginate --slurp "repos/${REPO}/pulls/${PR_NUM}/reviews?per_page=100" 2>/dev/null \
    | jq -r '([.[] | .[] | select(.user.login == "'"${CLOUD_BOT_LOGIN}"'") | select(.commit_id == "'"${CURRENT_SHA}"'" or (.commit_id == null and "'"${latest_trigger_ts}"'" != "" and .submitted_at >= "'"${latest_trigger_ts}"'")) | {id: (.id | tostring), submitted_at: .submitted_at}] | sort_by(.submitted_at) | last | select(. != null) | [.id, .submitted_at] | @tsv) // ""'
}

set +e
LATEST_CURRENT_HEAD_TRIGGER_TS="$(query_latest_current_head_trigger_ts)"
LATEST_CURRENT_HEAD_TRIGGER_TS_RC=$?
reusable_current_head_review_record="$(query_reusable_current_head_review_record "${LATEST_CURRENT_HEAD_TRIGGER_TS}")"
reusable_current_head_review_record_rc=$?
set -e

reusable_current_head_review_ts=""
if [ "${reusable_current_head_review_record_rc}" -eq 0 ] && [ -n "${reusable_current_head_review_record}" ]; then
  IFS=$'\t' read -r BOT_REUSED_REVIEW_ID reusable_current_head_review_ts <<<"${reusable_current_head_review_record}"
fi

reuse_existing_current_head_review=false
if [ -n "${BOT_REUSED_REVIEW_ID}" ] && [ -n "${reusable_current_head_review_ts}" ]; then
  reuse_existing_current_head_review=true
  BOT_UNAVAILABLE=false
  BOT_REVIEW_WINDOW_START="${reusable_current_head_review_ts}"
  WAIT_MARKER="BOT_REPLY=received"
  echo "Reusable @${CLOUD_BOT_NAME} review #${BOT_REUSED_REVIEW_ID} already exists for HEAD ${CURRENT_SHA} at ${reusable_current_head_review_ts}; skipping trigger and delegated wait."
fi

# --- Trigger cloud bot review for current HEAD ---
if [ "${reuse_existing_current_head_review}" = "false" ]; then
TRIGGER_TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

# Round-aware trigger logic (#506):
# - Round 0 (initial PR creation) + auto: bot auto-reviews on push, skip trigger
# - Round 1+ (after fix push): bot does NOT auto-review on force-push,
#   MUST explicitly trigger re-review regardless of cloud_bot_trigger setting
if [ "${REVIEW_ROUND}" -gt 0 ]; then
  # Post-fix round: ALWAYS trigger explicitly via retrigger command
  TRIGGER_BODY="${CLOUD_BOT_RETRIGGER_CMD}

<!-- csa-retrigger:round${REVIEW_ROUND}:${CURRENT_SHA}:${TRIGGER_TS} -->"
  gh pr comment "${PR_NUM}" --repo "${REPO}" --body "${TRIGGER_BODY}"
  echo "Round ${REVIEW_ROUND}: Triggered re-review via '${CLOUD_BOT_RETRIGGER_CMD}' for HEAD ${CURRENT_SHA}."
  WAIT_BASE_TS="${TRIGGER_TS}"
elif [ "${CLOUD_BOT_TRIGGER}" = "comment" ]; then
  # Round 0 + comment mode: trigger via @mention
  TRIGGER_BODY="@${CLOUD_BOT_NAME} review

<!-- csa-trigger:${CURRENT_SHA}:${TRIGGER_TS} -->"
  gh pr comment "${PR_NUM}" --repo "${REPO}" --body "${TRIGGER_BODY}"
  echo "Triggered @${CLOUD_BOT_NAME} review via comment for HEAD ${CURRENT_SHA}."
  WAIT_BASE_TS="${TRIGGER_TS}"
else
  # Round 0 + auto mode: bot auto-reviews on PR push
  echo "Cloud bot trigger mode is '${CLOUD_BOT_TRIGGER}' (auto-review); skipping @mention trigger."
  echo "Bot will auto-review the PR push. Proceeding to polling phase."
  # Backdate the window by 10 minutes to catch responses that arrived between push and now.
  WAIT_BASE_TS="$(date -u -d '10 minutes ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-10M +%Y-%m-%dT%H:%M:%SZ)"
fi

# --- Initial quiet wait — bot responses rarely arrive faster ---
echo "Waiting ${CLOUD_BOT_WAIT_SECONDS}s before polling (bot responses rarely arrive faster)..."
sleep "${CLOUD_BOT_WAIT_SECONDS}"
BOT_REVIEW_WINDOW_START="${WAIT_BASE_TS}"

# Compatibility + recovery probe: keep the current-window review helper shape
# so pr-bot can still confirm a HEAD-matching review event when the helper's
# result file only contains a comment timestamp.
query_current_window_current_head_review_ts() {
  gh api --paginate --slurp "repos/${REPO}/pulls/${PR_NUM}/reviews?per_page=100" 2>/dev/null \
    | jq -r '[.[] | .[] | select(.user.login == "'"${CLOUD_BOT_LOGIN}"'") | select(.submitted_at >= "'"${WAIT_BASE_TS}"'") | select(.commit_id == "'"${CURRENT_SHA}"'" or .commit_id == null) | .submitted_at] | sort | last // ""'
}

# --- Launch self-contained poller once; main workflow only checks the result file ---
if [ -n "${CSA_WORKFLOW_DIR:-}" ]; then
  PR_BOT_WAIT_SCRIPT="${CSA_WORKFLOW_DIR}/scripts/pr-bot-wait.sh"
  PR_BOT_QUOTA_CACHE_SCRIPT="${CSA_WORKFLOW_DIR}/scripts/pr-bot-quota-cache.sh"
else
  PR_BOT_WAIT_SCRIPT="patterns/pr-bot/scripts/pr-bot-wait.sh"
  PR_BOT_QUOTA_CACHE_SCRIPT="patterns/pr-bot/scripts/pr-bot-quota-cache.sh"
fi
# shellcheck source=patterns/pr-bot/scripts/pr-bot-quota-cache.sh
. "${PR_BOT_QUOTA_CACHE_SCRIPT}"
OUTPUT_FILE="$(mktemp -t pr-bot-wait-${PR_NUM}-XXXXXX.json)"
# mktemp creates a 0-byte regular file; the wrapper's existence check
# ([ -s ... ] below) would match with [ -f ] immediately, breaking the
# poll loop on its first iteration before pr-bot-wait.sh has had a chance
# to write a result (#1079). Delete the empty sentinel so [ -s ] only
# trips once the helper's atomic-rename write_output() fires.
rm -f "${OUTPUT_FILE}"
INTERVAL="$(csa config get pr_review.cloud_bot_poll_interval_seconds --default 30)"
WAIT_LONG_POLL_SECS="$(csa config get kv_cache.long_poll_seconds --default 240)"
WAIT_RESULT_GRACE_SECS=1
POLL_RESULT_STATUS=""
WAIT_MARKER=""
CSA_PR_BOT_NAME="${CLOUD_BOT_NAME}" nohup "${PR_BOT_WAIT_SCRIPT}" "${PR_NUM}" \
  --timeout "${CLOUD_BOT_POLL_MAX_SECONDS}" \
  --interval "${INTERVAL}" \
  --bot-login "${CLOUD_BOT_LOGIN}" \
  --push-sha "${CURRENT_SHA}" \
  --window-start "${WAIT_BASE_TS}" \
  --quota-cache "${CLOUD_BOT_QUOTA_CACHE_FILE}" \
  --output "${OUTPUT_FILE}" \
  >/dev/null 2>&1 &
POLL_PID=$!
WAIT_STARTED_AT="$(date +%s)"
WAIT_ELAPSED_SECS=0

while [ "${WAIT_ELAPSED_SECS}" -lt "${CLOUD_BOT_POLL_MAX_SECONDS}" ]; do
  if [ -s "${OUTPUT_FILE}" ]; then
    break
  fi
  if ! kill -0 "${POLL_PID}" 2>/dev/null; then
    sleep "${WAIT_RESULT_GRACE_SECS}"
    break
  fi

  remaining=$((CLOUD_BOT_POLL_MAX_SECONDS - WAIT_ELAPSED_SECS))
  step="${WAIT_LONG_POLL_SECS}"
  if [ "${step}" -gt "${remaining}" ]; then
    step="${remaining}"
  fi

  sleep "${step}" &
  WAIT_SLEEP_PID=$!
  wait -n "${POLL_PID}" "${WAIT_SLEEP_PID}" 2>/dev/null || true
  if kill -0 "${WAIT_SLEEP_PID}" 2>/dev/null; then
    kill "${WAIT_SLEEP_PID}" 2>/dev/null || true
    wait "${WAIT_SLEEP_PID}" 2>/dev/null || true
  fi
  WAIT_ELAPSED_SECS=$(( $(date +%s) - WAIT_STARTED_AT ))
done

WAIT_ELAPSED_SECS=$(( $(date +%s) - WAIT_STARTED_AT ))

if [ ! -f "${OUTPUT_FILE}" ]; then
  if kill -0 "${POLL_PID}" 2>/dev/null; then
    kill "${POLL_PID}" 2>/dev/null || true
    wait "${POLL_PID}" 2>/dev/null || true
  fi
  printf '{"status":"timeout","pr":%s,"elapsed_seconds":%s}\n' \
    "${PR_NUM}" "${WAIT_ELAPSED_SECS}" > "${OUTPUT_FILE}.tmp"
  mv "${OUTPUT_FILE}.tmp" "${OUTPUT_FILE}"
fi

POLL_RESULT_STATUS="$(jq -r '.status // empty' "${OUTPUT_FILE}")"
case "${POLL_RESULT_STATUS}" in
  replied)
    WAIT_MARKER="BOT_REPLY=received"
    BOT_UNAVAILABLE=false
    BOT_REVIEW_WINDOW_START="$(jq -r '.review.submitted_at // .comment.created_at // empty' "${OUTPUT_FILE}")"
    if [ -z "${BOT_REVIEW_WINDOW_START}" ]; then
      set +e
      CURRENT_WINDOW_CURRENT_HEAD_REVIEW_TS="$(query_current_window_current_head_review_ts)"
      CURRENT_WINDOW_CURRENT_HEAD_REVIEW_TS_RC=$?
      set -e
      if [ "${CURRENT_WINDOW_CURRENT_HEAD_REVIEW_TS_RC}" -eq 0 ] && [ -n "${CURRENT_WINDOW_CURRENT_HEAD_REVIEW_TS}" ]; then
        BOT_REVIEW_WINDOW_START="${CURRENT_WINDOW_CURRENT_HEAD_REVIEW_TS}"
      else
        BOT_REVIEW_WINDOW_START="${WAIT_BASE_TS}"
      fi
    fi
    ;;
  quota_exhausted)
    WAIT_MARKER="BOT_REPLY=quota_exhausted"
    BOT_UNAVAILABLE=true
    BOT_HAS_ISSUES=false
    BOT_HAS_ISSUES_SOURCE=""
    CLOUD_BOT_SKIPPED=true
    CLOUD_BOT_SKIP_KIND="quota_exhausted"
    CLOUD_BOT_SKIP_REASON="quota exhausted detected on PR #${PR_NUM}"
    CLOUD_BOT_QUOTA_EXHAUSTED_AT="$(jq -r '.exhausted_at // empty' "${OUTPUT_FILE}")"
    CLOUD_BOT_QUOTA_EXPECTED_RESET_AT="$(jq -r '.expected_reset_at // empty' "${OUTPUT_FILE}")"
    MERGE_WITHOUT_BOT_REASON_KIND="cloud_bot_quota_exhausted"
    BOT_REVIEW_WINDOW_START="$(jq -r '.comment.created_at // empty' "${OUTPUT_FILE}")"
    if [ -z "${BOT_REVIEW_WINDOW_START}" ]; then
      BOT_REVIEW_WINDOW_START="${WAIT_BASE_TS}"
    fi
    echo "Quota exhaustion detected for ${CLOUD_BOT_NAME}; cache updated at ${CLOUD_BOT_QUOTA_CACHE_FILE}. Routing to merge-without-bot path." >&2
    ;;
  timeout)
    echo "ERROR: Cloud bot did not respond within ${CLOUD_BOT_POLL_MAX_SECONDS}s after the quiet wait." >&2
    echo "Options: retry later, inspect the PR page manually, or disable the cloud bot for this run." >&2
    exit 1
    ;;
  *)
    echo "ERROR: Unknown polling helper status '${POLL_RESULT_STATUS}'." >&2
    cat "${OUTPUT_FILE}" >&2
    exit 1
    ;;
esac
rm -f "${OUTPUT_FILE}"
fi

if [ "${WAIT_MARKER}" = "BOT_REPLY=received" ]; then
  BOT_UNAVAILABLE=false
  BOT_SETTLE_SECS="${BOT_SETTLE_SECS:-20}"
  sleep "${BOT_SETTLE_SECS}"

  # --- Positive signal check (#505): verify a current-HEAD review EVENT exists ---
  # If this run reused a specific current-HEAD review object, that selection is
  # already the positive signal and later checks must stay scoped to that review.
  if [ "${reuse_existing_current_head_review}" = "true" ]; then
    REVIEW_EVENT_RC=0
    REVIEW_EVENT_COUNT=1
  else
    set +e
    REVIEW_EVENT_RAW="$(
      gh api --paginate --slurp "repos/${REPO}/pulls/${PR_NUM}/reviews?per_page=100" 2>/dev/null \
        | jq -r '[.[] | .[] | select(.user.login == "'"${CLOUD_BOT_LOGIN}"'") | select(.submitted_at >= "'"${BOT_REVIEW_WINDOW_START}"'") | select(.commit_id == "'"${CURRENT_SHA}"'" or .commit_id == null)] | length'
    )"
    REVIEW_EVENT_RC=$?
    set -e
    REVIEW_EVENT_COUNT="$(echo "${REVIEW_EVENT_RAW}" | awk '{s+=$1} END {print s+0}')"
  fi
  # Helper: check for setup/configuration messages before marking unavailable
  query_latest_bot_comment_json_step5() {
    gh api --paginate --slurp "repos/${REPO}/issues/${PR_NUM}/comments?per_page=100" 2>/dev/null \
      | jq -c '[.[] | .[] | select((.user.login // "") == "'"${CLOUD_BOT_LOGIN}"'") | select(.created_at >= "'"${BOT_REVIEW_WINDOW_START}"'")] | sort_by(.created_at) | last // empty'
  }

  check_latest_quota_comment_step5() {
    set +e
    local latest_bot_comment_json
    local quota_body
    local quota_now_utc
    local quota_expected_reset_at
    latest_bot_comment_json="$(query_latest_bot_comment_json_step5)"
    set -e
    if [ -n "${latest_bot_comment_json}" ]; then
      quota_body="$(printf '%s\n' "${latest_bot_comment_json}" | jq -r '.body // ""')"
      if quota_comment_indicates_exhaustion "${quota_body}" "${CLOUD_BOT_LOGIN}" "${CLOUD_BOT_NAME}"; then
        echo "Quota exhaustion detected from latest cloud bot comment during post-poll verification." >&2
        quota_now_utc="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        quota_expected_reset_at="$(compute_quota_expected_reset_at)"
        QUOTA_CACHE_FILE="${CLOUD_BOT_QUOTA_CACHE_FILE}" \
        BOT_NAME="${CLOUD_BOT_NAME}" \
        PR_NUMBER="${PR_NUM}" \
        write_quota_cache "${quota_now_utc}" "${quota_expected_reset_at}" "cloud_bot_quota_exhausted" "${quota_body}"
        CLOUD_BOT_SKIPPED=true
        CLOUD_BOT_SKIP_KIND="quota_exhausted"
        CLOUD_BOT_SKIP_REASON="latest ${CLOUD_BOT_NAME} comment indicates quota exhaustion on PR #${PR_NUM}"
        BOT_UNAVAILABLE=true
        return 0
      fi
    fi
    return 1
  }

  _check_setup_message_step5() {
    set +e
    local setup_body
    setup_body="$(
      gh api --paginate --slurp "repos/${REPO}/issues/${PR_NUM}/comments?per_page=100" \
        | jq -r '[.[] | .[] | select(.user.login == "'"${CLOUD_BOT_LOGIN}"'") | select(.created_at >= "'"${BOT_REVIEW_WINDOW_START}"'")] | .[0].body // ""' \
        2>/dev/null
    )"
    set -e
    if [ -n "${setup_body}" ] && echo "${setup_body}" | grep -qEi 'configur|set.?up.*(environment|repo)|environment.*(set.?up|configur|need)|unable.to.(review|access)|cannot.*(complete|access|review)|not.*configured|permission|credential'; then
      echo "ERROR: Cloud bot responded with a setup/configuration message instead of a code review." >&2
      echo "Bot response (truncated): $(echo "${setup_body}" | head -c 500)" >&2
      echo "" >&2
      echo "ACTION REQUIRED: Configure the cloud bot, then re-run pr-bot." >&2
      BOT_NEEDS_SETUP=true
      return 0
    fi
    return 1
  }

  if [ "${REVIEW_EVENT_RC}" -ne 0 ]; then
    echo "WARN: Failed to query review events (rc=${REVIEW_EVENT_RC})." >&2
    check_latest_quota_comment_step5 || _check_setup_message_step5 || {
      echo "Treating as bot unavailable — API failure with no setup message." >&2
      BOT_UNAVAILABLE=true
    }
  fi
  # --- Check inline comments for actionable findings ---
  # This runs regardless of REVIEW_EVENT_COUNT because some bots
  # post inline comments without a formal review event.
  if [ "${BOT_UNAVAILABLE}" = "false" ] && [ "${BOT_NEEDS_SETUP:-false}" = "false" ]; then
    set +e
    if [ "${reuse_existing_current_head_review}" = "true" ]; then
      ACTIONABLE_COMMENT_COUNT="$(
        gh api --paginate --slurp "repos/${REPO}/pulls/${PR_NUM}/reviews/${BOT_REUSED_REVIEW_ID}/comments?per_page=100" \
          | jq -r '[.[] | .[] | select((.user.login // "") == "'"${CLOUD_BOT_LOGIN}"'") | select((.body | test("P0|P1|P2"))) ] | length' \
          2>/dev/null
      )"
    else
      ACTIONABLE_COMMENT_COUNT="$(
        gh api --paginate --slurp "repos/${REPO}/pulls/${PR_NUM}/comments" \
          | jq -r '[.[] | .[] | select(.user.login == "'"${CLOUD_BOT_LOGIN}"'") | select(.created_at >= "'"${BOT_REVIEW_WINDOW_START}"'") | select((.body | test("P0|P1|P2"))) ] | length' \
          2>/dev/null
      )"
    fi
    ACTIONABLE_COMMENT_RC=$?
    set -e
    if [ "${ACTIONABLE_COMMENT_RC}" -ne 0 ]; then
      echo "ERROR: Failed to query actionable bot comments for the effective review window (rc=${ACTIONABLE_COMMENT_RC})." >&2
      exit 1
    fi
    case "${ACTIONABLE_COMMENT_COUNT:-}" in
      ''|*[!0-9]*)
        echo "ERROR: Invalid actionable comment count from GitHub API: '${ACTIONABLE_COMMENT_COUNT}'." >&2
        exit 1
        ;;
    esac
    if [ "${ACTIONABLE_COMMENT_COUNT}" -gt 0 ]; then
      if [ "${reuse_existing_current_head_review}" = "true" ]; then
        echo "Detected ${ACTIONABLE_COMMENT_COUNT} actionable bot comment(s) in reusable review #${BOT_REUSED_REVIEW_ID}; marking BOT_HAS_ISSUES=true."
        BOT_HAS_ISSUES_SOURCE="reused_review_comments"
      else
        echo "Detected ${ACTIONABLE_COMMENT_COUNT} actionable bot comment(s) since ${BOT_REVIEW_WINDOW_START}; marking BOT_HAS_ISSUES=true."
        BOT_HAS_ISSUES_SOURCE="current_window_comments"
      fi
      BOT_HAS_ISSUES=true
    elif [ "${REVIEW_EVENT_COUNT:-0}" -eq 0 ]; then
      echo "WARN: No current-HEAD review event or inline comments for HEAD ${CURRENT_SHA} since ${BOT_REVIEW_WINDOW_START}." >&2
      check_latest_quota_comment_step5 || _check_setup_message_step5 || {
        echo "Treating as bot unavailable — no positive signal (neither review event nor comments)." >&2
        BOT_UNAVAILABLE=true
      }
    fi
  fi
fi

# --- Check for non-target bot comments (e.g., codex auto-review) ---
if [ "${BOT_UNAVAILABLE}" = "false" ] && [ "${BOT_HAS_ISSUES}" = "false" ]; then
  set +e
  if [ "${reuse_existing_current_head_review}" = "true" ]; then
    OTHER_BOT_COUNT="$(
      gh api --paginate --slurp "repos/${REPO}/pulls/${PR_NUM}/comments" \
        | jq -r '[.[] | .[] | select(.user.type == "Bot") | select(.user.login != "'"${CLOUD_BOT_LOGIN}"'") | select(.commit_id == "'"${CURRENT_SHA}"'" or .original_commit_id == "'"${CURRENT_SHA}"'") | select((.body | test("P0|P1|P2"))) ] | length' \
        2>/dev/null || echo "0"
    )"
  else
    OTHER_BOT_COUNT="$(
      gh api --paginate --slurp "repos/${REPO}/pulls/${PR_NUM}/comments" \
        | jq -r '[.[] | .[] | select(.user.type == "Bot") | select(.user.login != "'"${CLOUD_BOT_LOGIN}"'") | select(.created_at >= "'"${BOT_REVIEW_WINDOW_START}"'") | select((.body | test("P0|P1|P2"))) ] | length' \
        2>/dev/null || echo "0"
    )"
  fi
  set -e
  if [ "${OTHER_BOT_COUNT:-0}" -gt 0 ]; then
    echo "WARNING: Detected ${OTHER_BOT_COUNT} actionable comment(s) from non-target bot(s)." >&2
    echo "WARNING: These may consume coding quota for the originating bot service." >&2
    echo "Including non-target bot findings in review."
    if [ "${reuse_existing_current_head_review}" = "true" ]; then
      BOT_HAS_ISSUES_SOURCE="current_sha_comments"
    else
      BOT_HAS_ISSUES_SOURCE="current_window_comments"
    fi
    BOT_HAS_ISSUES=true
  fi
fi

if [ "${BOT_UNAVAILABLE}" = "true" ]; then
  if [ "${MERGE_WITHOUT_BOT_REASON_KIND}" = "cloud_bot_quota_exhausted" ]; then
    echo "Cloud bot quota exhaustion confirmed; continuing with merge-without-bot path." >&2
  else
  echo "" >&2
  echo "ERROR: Cloud bot (${CLOUD_BOT_NAME}) did not produce a current-HEAD review signal within the polling window (${CLOUD_BOT_WAIT_SECONDS}s wait + ${CLOUD_BOT_POLL_MAX_SECONDS}s poll)." >&2
  echo "" >&2
  echo "Options:" >&2
  echo "  1. Wait and re-run: csa plan run patterns/pr-bot/workflow.toml" >&2
  echo "  2. Disable cloud bot: csa config set pr_review.cloud_bot false && csa plan run patterns/pr-bot/workflow.toml" >&2
  echo "  3. Investigate bot configuration" >&2
  echo "" >&2
  echo "ABORTING: Will not merge without cloud bot confirmation." >&2
  exit 1
  fi
fi
echo "CSA_VAR:BOT_REUSED_REVIEW_ID=${BOT_REUSED_REVIEW_ID}"
echo "CSA_VAR:BOT_REVIEW_WINDOW_START=$BOT_REVIEW_WINDOW_START"
echo "CSA_VAR:BOT_UNAVAILABLE=$BOT_UNAVAILABLE"
echo "CSA_VAR:BOT_NEEDS_SETUP=${BOT_NEEDS_SETUP:-false}"
echo "CSA_VAR:FALLBACK_REVIEW_HAS_ISSUES=$FALLBACK_REVIEW_HAS_ISSUES"
echo "CSA_VAR:BOT_HAS_ISSUES=$BOT_HAS_ISSUES"
echo "CSA_VAR:BOT_HAS_ISSUES_SOURCE=${BOT_HAS_ISSUES_SOURCE}"
echo "CSA_VAR:CLOUD_BOT_QUOTA_CACHE_FILE=${CLOUD_BOT_QUOTA_CACHE_FILE}"
echo "CSA_VAR:CLOUD_BOT_QUOTA_EXHAUSTED_AT=${CLOUD_BOT_QUOTA_EXHAUSTED_AT}"
echo "CSA_VAR:CLOUD_BOT_QUOTA_EXPECTED_RESET_AT=${CLOUD_BOT_QUOTA_EXPECTED_RESET_AT}"
echo "CSA_VAR:CLOUD_BOT_SKIPPED=${CLOUD_BOT_SKIPPED}"
echo "CSA_VAR:CLOUD_BOT_SKIP_KIND=${CLOUD_BOT_SKIP_KIND}"
echo "CSA_VAR:CLOUD_BOT_SKIP_REASON=${CLOUD_BOT_SKIP_REASON}"
echo "CSA_VAR:MERGE_WITHOUT_BOT_REASON_KIND=${MERGE_WITHOUT_BOT_REASON_KIND}"
```'''
on_fail = "abort"
condition = "(${CLOUD_BOT}) && (!(${BOT_UNAVAILABLE}))"

[[workflow.steps]]
id = 8
title = "Step 5a: Abort — Bot Needs Environment Configuration"
tool = "await-user"
prompt = """
The Cloud bot responded but did not perform an actual code review — it sent a
message indicating environment configuration is needed. The workflow MUST stop
here and report to the user. FORBIDDEN: falling back to local review, skipping
the bot review, or proceeding in any way.

**Orchestrator action**: Report the bot's response to the user and STOP. The
user must:
1. Configure the cloud bot (follow the bot's instructions)
2. Re-run `pr-bot` after configuration is complete"""
on_fail = "abort"
condition = "(${CLOUD_BOT}) && (${BOT_NEEDS_SETUP})"

[[workflow.steps]]
id = 9
title = "Step 6-fix: Fallback Review Fix Cycle (Bot Timeout Path)"
tool = "bash"
prompt = '''
> **Layer**: 0 + 1 (Orchestrator + CSA executor) -- wrapper step enforces
> timeout/return-code/marker contracts, while CSA performs the fix cycle.


When `FALLBACK_REVIEW_HAS_ISSUES=true` (set in Step 5 when `csa review`
found issues during bot timeout), this dedicated fix cycle runs WITHIN the
timeout branch. Steps 7-10 are structurally inside the `BOT_UNAVAILABLE=false`
branch and are NOT reachable from here.

Delegate this cycle to CSA as a single operation and enforce hard bounds:
- CSA daemon + session wait (configured by `cloud_bot_wait_seconds` + `cloud_bot_poll_max_seconds`, defaults: `kv_cache.frequent_poll_seconds = 60` and `kv_cache.long_poll_seconds = 240`)
- no `|| true` silent downgrade
- success requires marker `FALLBACK_FIX=clean`
- on success, orchestrator explicitly sets `FALLBACK_REVIEW_HAS_ISSUES=false`

```bash
set -euo pipefail
if [ -n "${CSA_WORKFLOW_DIR:-}" ]; then
  CSA_HELPER_DIR="${CSA_WORKFLOW_DIR}/scripts/csa"
else
  CSA_HELPER_DIR="patterns/pr-bot/scripts/csa"
fi
set +e
FIX_SID="$(csa run --sa-mode true --tier tier-4-critical --timeout 1800 --idle-timeout 1800 "Bounded fallback-fix task only. Do NOT invoke pr-bot skill or any full PR workflow. Operate on PR #${PR_NUM} in repo ${REPO}. Bot is unavailable and fallback local review found issues. Run a self-contained max-3-round fix cycle: read latest findings from csa review --range ${DEFAULT_BRANCH}...HEAD, apply fixes with commits, re-run review, repeat until clean. Return exactly one marker line FALLBACK_FIX=clean when clean; otherwise return FALLBACK_FIX=failed and exit non-zero.")"
DAEMON_RC=$?
set -e
if [ "${DAEMON_RC}" -ne 0 ] || [ -z "${FIX_SID}" ]; then
  echo "ERROR: Failed to launch daemon for fallback fix cycle (rc=${DAEMON_RC})." >&2
  exit 1
fi
set +e
FIX_RESULT="$(bash "${CSA_HELPER_DIR}/session-wait-until-done.sh" "${FIX_SID}")"
FIX_RC=$?
set -e

if [ "${FIX_RC}" -ne 0 ]; then
  echo "ERROR: Fallback fix cycle failed (rc=${FIX_RC})." >&2
  exit 1
fi
FIX_MARKER="$(
  printf '%s\n' "${FIX_RESULT}" \
    | grep -E '^[[:space:]]*FALLBACK_FIX=(clean|failed)[[:space:]]*$' \
    | tail -n 1 \
    | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//' \
    || true
)"
if [ "${FIX_MARKER}" != "FALLBACK_FIX=clean" ]; then
  echo "ERROR: Fallback fix cycle returned invalid marker." >&2
  exit 1
fi

FALLBACK_REVIEW_HAS_ISSUES=false
echo "CSA_VAR:FALLBACK_REVIEW_HAS_ISSUES=$FALLBACK_REVIEW_HAS_ISSUES"
```'''
on_fail = "abort"
condition = "(${CLOUD_BOT}) && (${BOT_UNAVAILABLE} && ${FALLBACK_REVIEW_HAS_ISSUES})"

[[workflow.steps]]
id = 10
title = "Select Current Bot Comment"
tool = "bash"
prompt = '''
> **Layer**: 0 (Orchestrator) -- shell-only selection of a single current
> bot comment for v1 flat execution. The workflow handles one current bot
> comment per loop iteration; after Step 10 pushes, the next bot review
> trigger picks up any remaining findings.


Select one actionable bot review comment from the current review window or
the reusable-review scope and export its metadata as `CURRENT_COMMENT_ID`, `COMMENT_PATH`, and
`COMMENT_TIMESTAMP`. Initialize `COMMENT_IS_FALSE_POSITIVE=true` and
`COMMENT_IS_STALE=false` so the current comment always enters the arbitration
path first unless the staleness guard suppresses it.

```bash
set -euo pipefail
CURRENT_SHA="$(git rev-parse HEAD)"
case "${BOT_HAS_ISSUES_SOURCE:-current_window_comments}" in
  reused_review_comments)
    if [ -z "${BOT_REUSED_REVIEW_ID:-}" ]; then
      echo "ERROR: BOT_REUSED_REVIEW_ID is unset for reused review comment selection."
      exit 1
    fi
    COMMENT_RECORD="$(
      gh api --paginate --slurp "repos/${REPO}/pulls/${PR_NUM}/reviews/${BOT_REUSED_REVIEW_ID}/comments?per_page=100" \
        | jq -r '[.[] | .[] | select((.user.login // "") == "'"${CLOUD_BOT_LOGIN}"'") | select((.body | test("P0|P1|P2"))) ] | sort_by(.created_at) | .[0] | select(. != null) | [(.id | tostring), (.path // ""), .created_at] | @tsv'
    )"
    ;;
  current_sha_comments)
    COMMENT_RECORD="$(
      gh api --paginate --slurp "repos/${REPO}/pulls/${PR_NUM}/comments" \
        | jq -r '[.[] | .[] | select(.user.type == "Bot") | select(.commit_id == "'"${CURRENT_SHA}"'" or .original_commit_id == "'"${CURRENT_SHA}"'") | select((.body | test("P0|P1|P2"))) ] | sort_by(.created_at) | .[0] | select(. != null) | [(.id | tostring), (.path // ""), .created_at] | @tsv'
    )"
    ;;
  *)
    if [ -z "${BOT_REVIEW_WINDOW_START:-}" ]; then
      echo "ERROR: BOT_REVIEW_WINDOW_START is unset."
      exit 1
    fi
    # Query from ANY bot (not just target) to also catch non-target bot findings
    COMMENT_RECORD="$(
      gh api --paginate --slurp "repos/${REPO}/pulls/${PR_NUM}/comments" \
        | jq -r '[.[] | .[] | select(.user.type == "Bot") | select(.created_at >= "'"${BOT_REVIEW_WINDOW_START}"'") | select((.body | test("P0|P1|P2"))) ] | sort_by(.created_at) | .[0] | select(. != null) | [(.id | tostring), (.path // ""), .created_at] | @tsv'
    )"
    ;;
esac
if [ -z "${COMMENT_RECORD}" ] || [ "${COMMENT_RECORD}" = "null" ]; then
  echo "ERROR: BOT_HAS_ISSUES=true but no actionable bot comment was found in the selected scope."
  exit 1
fi

IFS=$'\t' read -r CURRENT_COMMENT_ID COMMENT_PATH COMMENT_TIMESTAMP <<EOF
${COMMENT_RECORD}
EOF

echo "CSA_VAR:CURRENT_COMMENT_ID=$CURRENT_COMMENT_ID"
echo "CSA_VAR:COMMENT_PATH=$COMMENT_PATH"
echo "CSA_VAR:COMMENT_TIMESTAMP=$COMMENT_TIMESTAMP"
echo "CSA_VAR:COMMENT_IS_FALSE_POSITIVE=true"
echo "CSA_VAR:COMMENT_IS_STALE=false"
```'''
on_fail = "abort"
condition = "(${CLOUD_BOT}) && ((!(${BOT_UNAVAILABLE} && ${FALLBACK_REVIEW_HAS_ISSUES})) && (${BOT_HAS_ISSUES}))"

[[workflow.steps]]
id = 11
title = "Step 7a: Staleness Filter"
tool = "bash"
prompt = '''
For the current bot comment selected in Step 7, run a conservative file-level
staleness check. When the referenced file changed on this branch after the
comment timestamp, set `COMMENT_IS_STALE=true` and skip arbitration/fix for
this loop iteration.

```bash
set -euo pipefail
COMMENT_IS_STALE=false

if [ -n "${COMMENT_PATH:-}" ] && [ -n "${COMMENT_TIMESTAMP:-}" ]; then
  if ! git diff --quiet "${DEFAULT_BRANCH}...HEAD" -- "${COMMENT_PATH}"; then
    if git log --since="${COMMENT_TIMESTAMP}" --format=%H -- "${COMMENT_PATH}" | grep -q .; then
      COMMENT_IS_STALE=true
    fi
  fi
fi

echo "CSA_VAR:COMMENT_IS_STALE=$COMMENT_IS_STALE"
```'''
on_fail = "skip"
condition = "(${CLOUD_BOT}) && ((!(${BOT_UNAVAILABLE} && ${FALLBACK_REVIEW_HAS_ISSUES})) && (${BOT_HAS_ISSUES}))"

[[workflow.steps]]
id = 12
title = "Arbitrate via Debate"
tool = "csa"
prompt = """
> **Layer**: 1 (CSA debate) -- Layer 0 dispatches to `csa debate`, which
> internally spawns Layer 2 independent models for adversarial evaluation.
> Orchestrator receives the verdict and posts audit trail to PR."""
tier = "tier-4-critical"
on_fail = "abort"
condition = "(${CLOUD_BOT}) && ((!(${BOT_UNAVAILABLE} && ${FALLBACK_REVIEW_HAS_ISSUES})) && ((${BOT_HAS_ISSUES}) && (${COMMENT_IS_FALSE_POSITIVE} && !(${COMMENT_IS_STALE}))))"

[[workflow.steps]]
id = 13
title = "Include debate"
tool = "weave"
prompt = "debate"
on_fail = "abort"
condition = "(${CLOUD_BOT}) && ((!(${BOT_UNAVAILABLE} && ${FALLBACK_REVIEW_HAS_ISSUES})) && ((${BOT_HAS_ISSUES}) && (${COMMENT_IS_FALSE_POSITIVE} && !(${COMMENT_IS_STALE}))))"

[[workflow.steps]]
id = 14
title = "Step 8a: Post Debate Audit Trail Comment"
tool = "bash"
prompt = '''
> **Layer**: 0 (Orchestrator) -- explicit bash step that posts the PR comment
> or reroutes to the fix path based on the debate verdict.


Parse the structured debate result from Step 8.
- If `VERDICT=DISMISSED`: post the explanatory PR comment explicitly via
  `gh pr comment` and fail if comment creation fails.
- If `VERDICT=CONFIRMED`: do not post a dismissal comment; set
  `COMMENT_IS_FALSE_POSITIVE=false` so the workflow routes the current comment into
  Step 9 (fix real issue).

```bash
set -euo pipefail
DEBATE_OUTPUT="${STEP_11_OUTPUT}"
VERDICT_COUNT="$(
  printf '%s\n' "${DEBATE_OUTPUT}" \
    | grep -Ec '^[[:space:]]*VERDICT: (DISMISSED|CONFIRMED)[[:space:]]*$' \
    || true
)"
if [ "${VERDICT_COUNT}" != "1" ]; then
  echo "ERROR: Debate output must contain exactly one VERDICT marker." >&2
  exit 1
fi
VERDICT_MARKER="$(
  printf '%s\n' "${DEBATE_OUTPUT}" \
    | grep -E '^[[:space:]]*VERDICT: (DISMISSED|CONFIRMED)[[:space:]]*$' \
    | tail -n 1 \
    | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//' \
    || true
)"

if [ -z "${VERDICT_MARKER}" ]; then
  echo "ERROR: Debate output missing VERDICT marker." >&2
  exit 1
fi

VERDICT="${VERDICT_MARKER#VERDICT: }"

case "${VERDICT}" in
  DISMISSED)
    COMMENT_START_COUNT="$(printf '%s\n' "${DEBATE_OUTPUT}" | grep -Ec '^[[:space:]]*PR_COMMENT_START[[:space:]]*$' || true)"
    COMMENT_END_COUNT="$(printf '%s\n' "${DEBATE_OUTPUT}" | grep -Ec '^[[:space:]]*PR_COMMENT_END[[:space:]]*$' || true)"
    if [ "${COMMENT_START_COUNT}" != "1" ] || [ "${COMMENT_END_COUNT}" != "1" ]; then
      echo "ERROR: Debate output must contain exactly one PR comment marker pair." >&2
      exit 1
    fi
    COMMENT_START_LINE="$(printf '%s\n' "${DEBATE_OUTPUT}" | grep -n -E '^[[:space:]]*PR_COMMENT_START[[:space:]]*$' | tail -n 1 | cut -d: -f1 || true)"
    COMMENT_END_LINE="$(printf '%s\n' "${DEBATE_OUTPUT}" | grep -n -E '^[[:space:]]*PR_COMMENT_END[[:space:]]*$' | tail -n 1 | cut -d: -f1 || true)"
    if [ -z "${COMMENT_START_LINE}" ] || [ -z "${COMMENT_END_LINE}" ] || [ "${COMMENT_END_LINE}" -le "${COMMENT_START_LINE}" ]; then
      echo "ERROR: Debate output has an invalid PR comment marker range." >&2
      exit 1
    fi
    COMMENT_FILE="$(mktemp)"
    trap "rm -f \"\${COMMENT_FILE}\"" EXIT
    printf '%s\n' "${DEBATE_OUTPUT}" \
      | sed -n "${COMMENT_START_LINE},${COMMENT_END_LINE}p" \
      | sed '1d;$d' > "${COMMENT_FILE}"
    if [ ! -s "${COMMENT_FILE}" ]; then
      echo "ERROR: Debate output missing PR comment body." >&2
      exit 1
    fi
    grep -Eq '^\*\*Local arbitration result: DISMISSED\.\*\*$' "${COMMENT_FILE}" || { echo "ERROR: Debate output missing a DISMISSED arbitration result heading." >&2; exit 1; }
    grep -Eq '^## Participants$' "${COMMENT_FILE}" || { echo "ERROR: Debate output missing Participants section." >&2; exit 1; }
    grep -Eq '^## Bot Concern$' "${COMMENT_FILE}" || { echo "ERROR: Debate output missing Bot Concern section." >&2; exit 1; }
    grep -Eq '^## Debate Summary$' "${COMMENT_FILE}" || { echo "ERROR: Debate output missing Debate Summary section." >&2; exit 1; }
    grep -Eq '^## Conclusion$' "${COMMENT_FILE}" || { echo "ERROR: Debate output missing Conclusion section." >&2; exit 1; }
    grep -Eq '^CSA session ID:' "${COMMENT_FILE}" || { echo "ERROR: Debate output missing CSA session ID." >&2; exit 1; }
    gh pr comment "${PR_NUM}" --repo "${REPO}" --body-file "${COMMENT_FILE}"
    rm -f "${COMMENT_FILE}"
    trap - EXIT
    echo "CSA_VAR:AUDIT_TRAIL_POSTED=true"
    ;;
  CONFIRMED)
    echo "CSA_VAR:AUDIT_TRAIL_POSTED=false"
    echo "CSA_VAR:COMMENT_IS_FALSE_POSITIVE=false"
    ;;
  *)
    echo "ERROR: Debate output missing a supported VERDICT marker." >&2
    exit 1
    ;;
esac
```'''
on_fail = "abort"
condition = "(${CLOUD_BOT}) && ((!(${BOT_UNAVAILABLE} && ${FALLBACK_REVIEW_HAS_ISSUES})) && ((${BOT_HAS_ISSUES}) && (${COMMENT_IS_FALSE_POSITIVE} && !(${COMMENT_IS_STALE}))))"

[[workflow.steps]]
id = 15
title = "Fix Real Issue"
tool = "csa"
prompt = """
> **Layer**: 1 (CSA executor) -- Layer 0 dispatches fix to CSA sub-agent.
> CSA reads code, applies fix, commits. Orchestrator verifies result.


Fix the real issue for the current bot review comment (non-stale,
non-false-positive). Fetch the comment body via
`gh api repos/${REPO}/pulls/comments/${CURRENT_COMMENT_ID}`, apply the fix,
and commit it."""
tier = "tier-4-critical"
condition = "(${CLOUD_BOT}) && ((!(${BOT_UNAVAILABLE} && ${FALLBACK_REVIEW_HAS_ISSUES})) && ((${BOT_HAS_ISSUES}) && (!(${COMMENT_IS_FALSE_POSITIVE} && !(${COMMENT_IS_STALE})))))"

[workflow.steps.on_fail]
retry = 2

[[workflow.steps]]
id = 16
title = "Push Fixes and Continue Loop"
tool = "bash"
prompt = '''
> **Layer**: 0 (Orchestrator) -- shell commands to push fixes and continue loop.


Track iteration count via `REVIEW_ROUND`. Check the round cap BEFORE
pushing fixes and continuing to the next review loop iteration. When `REVIEW_ROUND`
reaches `MAX_REVIEW_ROUNDS` (default: 10), STOP and present options to
the user — no new review is triggered until the user decides:

- **Option A**: Merge now (review is good enough)
- **Option B**: Continue for `MAX_REVIEW_ROUNDS` more rounds
- **Option C**: Abort and investigate manually

The workflow MUST NOT auto-merge or auto-abort at the round limit.
The user MUST explicitly choose an option before proceeding.

**Orchestrator protocol**: When the round cap is hit, the bash block exits
with code 0 after printing `ROUND_LIMIT_HALT`. The orchestrator (Layer 0)
MUST then use `AskUserQuestion` to present options A/B/C and collect the
user's choice. Based on the answer, set `ROUND_LIMIT_ACTION` and re-enter
this step. The action handler at the TOP of the script processes the user's
choice BEFORE the round cap check, so the chosen action always takes effect:
- **A**: Set `ROUND_LIMIT_ACTION=merge` → clears `ROUND_LIMIT_REACHED`, prints `ROUND_LIMIT_MERGE`, exits 0. Orchestrator routes to Step 12/12b.
- **B**: Set `ROUND_LIMIT_ACTION=continue` → clears `ROUND_LIMIT_REACHED`, extends `MAX_REVIEW_ROUNDS`, falls through to push loop.
- **C**: Set `ROUND_LIMIT_ACTION=abort` → leaves `ROUND_LIMIT_REACHED=true`, prints `ROUND_LIMIT_ABORT`, exits 1.

**CRITICAL**: The `merge` and `continue` branches MUST clear `ROUND_LIMIT_REACHED=false`
before proceeding. Steps 11 and 12 are gated by `!(${ROUND_LIMIT_REACHED})`,
so a stale `true` value blocks all downstream merge/rebase paths even after the user
explicitly chose to proceed. The `abort` branch intentionally leaves the flag set,
as it halts the workflow.

**Signal disambiguation**: The orchestrator distinguishes re-entry outcomes by
output markers, NOT exit codes alone. `ROUND_LIMIT_HALT` (exit 0) = ask user.
`ROUND_LIMIT_MERGE` (exit 0) = proceed to merge. `ROUND_LIMIT_ABORT` (exit 1) = stop.

```bash
REVIEW_ROUND=$((REVIEW_ROUND + 1))
MAX_REVIEW_ROUNDS="${MAX_REVIEW_ROUNDS:-10}"
echo "CSA_VAR:REVIEW_ROUND=$REVIEW_ROUND"
echo "CSA_VAR:MAX_REVIEW_ROUNDS=$MAX_REVIEW_ROUNDS"

# --- Handle orchestrator re-entry with user decision (FIRST) ---
# When the orchestrator re-enters after collecting user choice via
# AskUserQuestion, ROUND_LIMIT_ACTION is set. Process it BEFORE the round
# cap check so the user's choice always takes effect regardless of round count.
#
# CRITICAL: The merge path prints ROUND_LIMIT_MERGE (distinct from
# ROUND_LIMIT_HALT) so the orchestrator can unambiguously route to Step 12/12b.
# The abort path exits non-zero. The continue path falls through to push loop.
if [ -n "${ROUND_LIMIT_ACTION}" ]; then
  case "${ROUND_LIMIT_ACTION}" in
    merge)
      echo "User chose: Merge now. Pushing local commits before merge."
      ROUND_LIMIT_REACHED=false  # Clear so Steps 10.5/11/12 are unblocked
      # Push any Category C fixes from Step 9 so remote HEAD includes them.
      # Without this, gh pr merge merges the stale remote head.
      git push "${REMOTE_NAME}" "${WORKFLOW_BRANCH}"
      echo "CSA_VAR:ROUND_LIMIT_REACHED=$ROUND_LIMIT_REACHED"
      echo "CSA_VAR:ROUND_LIMIT_ACTION="
      echo "ROUND_LIMIT_MERGE: Routing to merge step."
      # Orchestrator MUST route to Step 12/12b upon seeing ROUND_LIMIT_MERGE.
      # Distinct from ROUND_LIMIT_HALT — this is an affirmative merge decision.
      exit 0
      ;;
    continue)
      echo "User chose: Continue. Extending by ${MAX_REVIEW_ROUNDS} rounds."
      ROUND_LIMIT_REACHED=false  # Clear so review loop and downstream steps are unblocked
      MAX_REVIEW_ROUNDS=$((REVIEW_ROUND + MAX_REVIEW_ROUNDS))
      unset ROUND_LIMIT_ACTION
      echo "CSA_VAR:ROUND_LIMIT_REACHED=$ROUND_LIMIT_REACHED"
      echo "CSA_VAR:MAX_REVIEW_ROUNDS=$MAX_REVIEW_ROUNDS"
      echo "CSA_VAR:ROUND_LIMIT_ACTION="
      # Fall through to push loop below (bypasses round cap check)
      ;;
    abort)
      echo "User chose: Abort workflow."
      echo "ROUND_LIMIT_ABORT: Workflow terminated by user."
      exit 1
      ;;
  esac
fi

# --- Round cap check BEFORE push/next-loop ---
# This block ONLY fires when ROUND_LIMIT_ACTION is unset (first hit, or after
# continue already extended the cap). When ROUND_LIMIT_ACTION was set, the case
# block above already handled it and either exited or fell through past this check.
if [ "${REVIEW_ROUND}" -ge "${MAX_REVIEW_ROUNDS}" ]; then
  ROUND_LIMIT_REACHED=true
  echo "Reached MAX_REVIEW_ROUNDS (${MAX_REVIEW_ROUNDS})."
  echo "Options:"
  echo "  A) Merge now (review is good enough)"
  echo "  B) Continue for ${MAX_REVIEW_ROUNDS} more rounds"
  echo "  C) Abort and investigate manually"
  echo ""
  echo "CSA_VAR:ROUND_LIMIT_REACHED=$ROUND_LIMIT_REACHED"
  echo "ROUND_LIMIT_HALT: Awaiting user decision."
  # HALT: The orchestrator MUST use AskUserQuestion to collect user's choice.
  # The shell script block ENDS here. The orchestrator handles routing based on
  # the user's answer OUTSIDE this script block. This ensures non-interactive
  # execution environments (CSA sub-agents) do not hang on stdin.
  #
  # Orchestrator routing logic (executed at Layer 0, NOT in this bash block):
  #   User answers "A" → set ROUND_LIMIT_ACTION=merge, re-enter this step
  #   User answers "B" → set ROUND_LIMIT_ACTION=continue, re-enter this step
  #   User answers "C" → set ROUND_LIMIT_ACTION=abort, re-enter this step
  #
  # FORBIDDEN: Falling through to push loop without a user decision.
  exit 0  # Yield control to orchestrator for AskUserQuestion
fi

# --- Push fixes only (next trigger happens in Step 5) ---
git push "${REMOTE_NAME}" "${WORKFLOW_BRANCH}"
ROUND_LIMIT_REACHED=false
echo "CSA_VAR:ROUND_LIMIT_REACHED=$ROUND_LIMIT_REACHED"
echo "CSA_VAR:REVIEW_ROUND=$REVIEW_ROUND"
echo "CSA_VAR:MAX_REVIEW_ROUNDS=$MAX_REVIEW_ROUNDS"
```

Loop back to Step 5 (delegated wait gate).'''
on_fail = "abort"
condition = "(${CLOUD_BOT}) && ((!(${BOT_UNAVAILABLE} && ${FALLBACK_REVIEW_HAS_ISSUES})) && (${BOT_HAS_ISSUES}))"

[[workflow.steps]]
id = 17
title = "Step 10b: Post-Fix Re-Review Gate (HARD GATE)"
tool = "bash"
prompt = '''
After fixing bot findings, verify the bot has actually re-reviewed the current
HEAD and found zero actionable findings before any merge path can execute.

This is a **deterministic hard gate** — it prevents the linear workflow
from falling through to merge without re-verification. The "Loop back
to Step 5" above is guidance for LLM orchestrators but is NOT enforced
by the workflow engine (`csa plan run` executes steps linearly).

**Positive confirmation signal** (#505): The gate checks for a **review event**
(via `pulls/{pr}/reviews` API) on the current HEAD. If the current HEAD was
already re-reviewed before this rerun starts, the gate reuses that exact
current-HEAD review and skips posting a duplicate retrigger comment. Otherwise
it waits for a new current-window review before proceeding. This distinguishes
"bot re-reviewed and found nothing" from "bot hasn't re-reviewed yet."

The gate:
1. Records push timestamp before checking
2. Checks for an already-posted exact current-HEAD review before retriggering; otherwise polls for a new review event from `${CLOUD_BOT_LOGIN}` on the current HEAD
3. If review event found AND has P0/P1/P2 inline comments → **abort** (user must re-run pr-bot)
4. If review event found AND clean → clears `BOT_HAS_ISSUES=false` so merge steps can proceed
5. If no review event within timeout → falls back to local `csa review --range ${DEFAULT_BRANCH}...HEAD`

Apply the same wait policy as Step 5: `cloud_bot_wait_seconds` quiet wait,
then up to `cloud_bot_poll_max_seconds` of polling.

```bash
set -euo pipefail
if [ -n "${CSA_WORKFLOW_DIR:-}" ]; then
  CSA_HELPER_DIR="${CSA_WORKFLOW_DIR}/scripts/csa"
else
  CSA_HELPER_DIR="patterns/pr-bot/scripts/csa"
fi
CURRENT_SHA="$(git rev-parse HEAD)"
BOT_CLEAN=false
POST_FIX_REUSED_REVIEW_ID=""

# --- Detect whether current HEAD already has a reusable post-fix review ---
query_latest_current_head_trigger_ts() {
  gh api --paginate --slurp "repos/${REPO}/issues/${PR_NUM}/comments?per_page=100" 2>/dev/null \
    | jq -r '[.[] | .[] | select((.body // "") | test("csa-trigger:'"${CURRENT_SHA}"':|csa-retrigger:round[0-9]+:'"${CURRENT_SHA}"':|csa-retrigger:post-fix:'"${CURRENT_SHA}"':")) | .created_at] | sort | last // ""'
}

query_reusable_current_head_review_record() {
  local latest_trigger_ts="${1:-}"
  gh api --paginate --slurp "repos/${REPO}/pulls/${PR_NUM}/reviews?per_page=100" 2>/dev/null \
    | jq -r '([.[] | .[] | select(.user.login == "'"${CLOUD_BOT_LOGIN}"'") | select(.commit_id == "'"${CURRENT_SHA}"'" or (.commit_id == null and "'"${latest_trigger_ts}"'" != "" and .submitted_at >= "'"${latest_trigger_ts}"'")) | {id: (.id | tostring), submitted_at: .submitted_at}] | sort_by(.submitted_at) | last | select(. != null) | [.id, .submitted_at] | @tsv) // ""'
}

set +e
LATEST_CURRENT_HEAD_TRIGGER_TS="$(query_latest_current_head_trigger_ts)"
LATEST_CURRENT_HEAD_TRIGGER_TS_RC=$?
REUSABLE_POST_FIX_REVIEW_RECORD="$(query_reusable_current_head_review_record "${LATEST_CURRENT_HEAD_TRIGGER_TS}")"
REUSABLE_POST_FIX_REVIEW_RECORD_RC=$?
set -e

REUSABLE_POST_FIX_REVIEW_TS=""
if [ "${REUSABLE_POST_FIX_REVIEW_RECORD_RC}" -eq 0 ] && [ -n "${REUSABLE_POST_FIX_REVIEW_RECORD}" ]; then
  IFS=$'\t' read -r POST_FIX_REUSED_REVIEW_ID REUSABLE_POST_FIX_REVIEW_TS <<<"${REUSABLE_POST_FIX_REVIEW_RECORD}"
fi

REUSE_EXISTING_POST_FIX_REVIEW=false
if [ -n "${POST_FIX_REUSED_REVIEW_ID}" ] && [ -n "${REUSABLE_POST_FIX_REVIEW_TS}" ]; then
  REUSE_EXISTING_POST_FIX_REVIEW=true
  POST_FIX_REVIEW_WINDOW_START="${REUSABLE_POST_FIX_REVIEW_TS}"
  WAIT_MARKER="BOT_REPLY=received"
  echo "Reusable @${CLOUD_BOT_NAME} post-fix review #${POST_FIX_REUSED_REVIEW_ID} already exists for HEAD ${CURRENT_SHA} at ${REUSABLE_POST_FIX_REVIEW_TS}; skipping retrigger and delegated wait."
fi

# --- Re-trigger bot review (ALWAYS explicit — bots don't auto-review on force-push) ---
if [ "${REUSE_EXISTING_POST_FIX_REVIEW}" = "false" ]; then
RETRIGGER_TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
RETRIGGER_BODY="${CLOUD_BOT_RETRIGGER_CMD}

<!-- csa-retrigger:post-fix:${CURRENT_SHA}:${RETRIGGER_TS} -->"
gh pr comment "${PR_NUM}" --repo "${REPO}" --body "${RETRIGGER_BODY}"
echo "Re-triggered review via '${CLOUD_BOT_RETRIGGER_CMD}' for HEAD ${CURRENT_SHA} at ${RETRIGGER_TS}"

# --- Initial quiet wait — bot responses rarely arrive faster ---
echo "Waiting ${CLOUD_BOT_WAIT_SECONDS}s before polling post-fix review (bot responses rarely arrive faster)..."
sleep "${CLOUD_BOT_WAIT_SECONDS}"

# --- Delegate remaining polling to CSA via daemon+wait ---
POST_FIX_REVIEW_WINDOW_START="${RETRIGGER_TS}"

query_current_window_current_head_review_ts() {
  gh api --paginate --slurp "repos/${REPO}/pulls/${PR_NUM}/reviews?per_page=100" 2>/dev/null \
    | jq -r '[.[] | .[] | select(.user.login == "'"${CLOUD_BOT_LOGIN}"'") | select(.submitted_at >= "'"${RETRIGGER_TS}"'") | select(.commit_id == "'"${CURRENT_SHA}"'" or .commit_id == null) | .submitted_at] | sort | last // ""'
}

refresh_post_fix_review_signal() {
  set +e
  CURRENT_WINDOW_CURRENT_HEAD_REVIEW_TS="$(query_current_window_current_head_review_ts)"
  CURRENT_WINDOW_CURRENT_HEAD_REVIEW_TS_RC=$?
  set -e
  if [ "${CURRENT_WINDOW_CURRENT_HEAD_REVIEW_TS_RC}" -eq 0 ] \
    && [ -n "${CURRENT_WINDOW_CURRENT_HEAD_REVIEW_TS}" ]
  then
    echo "Detected current-window @${CLOUD_BOT_NAME} post-fix review on HEAD ${CURRENT_SHA} at ${CURRENT_WINDOW_CURRENT_HEAD_REVIEW_TS}."
  fi
}
WAIT_MARKER=""
# POLL_IDLE_TIMEOUT and POLL_MAX_TIMEOUT are pre-computed in Step 4a.
set +e
WAIT_SID="$(csa run --sa-mode true --tier tier-1 --timeout ${POLL_MAX_TIMEOUT} --idle-timeout ${POLL_IDLE_TIMEOUT} \
  "Bounded post-fix re-review gate. Do NOT invoke pr-bot skill or any full PR workflow. \
  Operate on PR #${PR_NUM} in repo ${REPO}. Wait for @${CLOUD_BOT_NAME} review on HEAD ${CURRENT_SHA}. \
  Check for a review EVENT via 'gh api repos/${REPO}/pulls/${PR_NUM}/reviews' with submitted_at after \
  ${RETRIGGER_TS} and user.login matching the bot. Also check issue comments for bot activity. \
  Max wait ${CLOUD_BOT_POLL_MAX_SECONDS} seconds (quiet wait already elapsed before this step). Do not edit code. \
  Return exactly one marker line: BOT_REPLY=received or BOT_REPLY=timeout.")"
DAEMON_RC=$?
set -e
if [ "${DAEMON_RC}" -ne 0 ] || [ -z "${WAIT_SID}" ]; then
  echo "" >&2
  echo "ERROR: Failed to launch daemon for post-fix re-review gate (rc=${DAEMON_RC})." >&2
  echo "ABORTING: Will not merge without cloud bot confirmation after fixes." >&2
  echo "Re-run pr-bot to start a new review cycle." >&2
  exit 1
fi
set +e
WAIT_RESULT="$(bash "${CSA_HELPER_DIR}/session-wait-until-done.sh" "${WAIT_SID}")"
WAIT_RC=$?
set -e

if [ "${WAIT_RC}" -ne 0 ]; then
  echo "" >&2
  echo "ERROR: Post-fix cloud bot (${CLOUD_BOT_NAME}) did not produce a current-HEAD re-review signal within the polling window (rc=${WAIT_RC})." >&2
  echo "ABORTING: Will not merge without cloud bot confirmation after fixes." >&2
  echo "Re-run pr-bot to start a new review cycle." >&2
  exit 1
else
  WAIT_MARKER="$(
    printf '%s\n' "${WAIT_RESULT}" \
      | grep -E '^[[:space:]]*BOT_REPLY=(received|timeout)[[:space:]]*$' \
      | tail -n 1 \
      | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//' \
      || true
  )"
fi
fi

if [ "${WAIT_MARKER}" != "BOT_REPLY=received" ]; then
  refresh_post_fix_review_signal
  if [ "${CURRENT_WINDOW_CURRENT_HEAD_REVIEW_TS_RC}" -eq 0 ] && [ -n "${CURRENT_WINDOW_CURRENT_HEAD_REVIEW_TS}" ]; then
    WAIT_MARKER="BOT_REPLY=received"
    echo "Detected current-window @${CLOUD_BOT_NAME} review for HEAD ${CURRENT_SHA} after delegated post-fix wait; continuing."
  fi
fi

if [ "${WAIT_MARKER}" = "BOT_REPLY=received" ]; then
  BOT_SETTLE_SECS="${BOT_SETTLE_SECS:-20}"
  sleep "${BOT_SETTLE_SECS}"

  # --- Positive signal check (#505): verify a current-HEAD review EVENT exists ---
  if [ "${REUSE_EXISTING_POST_FIX_REVIEW}" = "true" ]; then
    REVIEW_EVENT_RC=0
    REVIEW_EVENT_COUNT=1
  else
    set +e
    REVIEW_EVENT_RAW="$(
      gh api --paginate --slurp "repos/${REPO}/pulls/${PR_NUM}/reviews?per_page=100" 2>/dev/null \
        | jq -r '[.[] | .[] | select(.user.login == "'"${CLOUD_BOT_LOGIN}"'") | select(.submitted_at >= "'"${POST_FIX_REVIEW_WINDOW_START}"'") | select(.commit_id == "'"${CURRENT_SHA}"'" or .commit_id == null)] | length'
    )"
    REVIEW_EVENT_RC=$?
    set -e
    REVIEW_EVENT_COUNT="$(echo "${REVIEW_EVENT_RAW}" | awk '{s+=$1} END {print s+0}')"
  fi
  # --- Setup message check (runs before any fallback to catch config issues) ---
  # NOTE: Similar to _check_setup_message_step5 in Step 5, but with different
  # semantics: Step 5 soft-detects (sets BOT_NEEDS_SETUP, returns 0/1);
  # this version hard-fails (exit 1) because post-fix is too late to recover.
  _check_setup_message() {
    set +e
    local setup_body
    setup_body="$(
      gh api --paginate --slurp "repos/${REPO}/issues/${PR_NUM}/comments?per_page=100" \
        | jq -r '[.[] | .[] | select(.user.login == "'"${CLOUD_BOT_LOGIN}"'") | select(.created_at >= "'"${POST_FIX_REVIEW_WINDOW_START}"'")] | .[0].body // ""' \
        2>/dev/null
    )"
    set -e
    if [ -n "${setup_body}" ] && echo "${setup_body}" | grep -qEi 'configur|set.?up.*(environment|repo)|environment.*(set.?up|configur|need)|unable.to.(review|access)|cannot.*(complete|access|review)|not.*configured|permission|credential'; then
      echo "ERROR: Cloud bot responded with a setup/configuration message instead of a code review." >&2
      echo "Bot response (truncated): $(echo "${setup_body}" | head -c 500)" >&2
      echo "ACTION REQUIRED: Configure the cloud bot, then re-run pr-bot." >&2
      exit 1
    fi
  }

  if [ "${REVIEW_EVENT_RC}" -ne 0 ]; then
    echo "WARN: Failed to query review events (rc=${REVIEW_EVENT_RC})." >&2
    _check_setup_message
    REVIEW_API_FAILED=true
  fi
  # --- Check inline comments for actionable findings ---
  if [ "${BOT_CLEAN}" != "true" ]; then
    set +e
    if [ "${REUSE_EXISTING_POST_FIX_REVIEW}" = "true" ]; then
      ACTIONABLE_COUNT="$(
        gh api --paginate --slurp "repos/${REPO}/pulls/${PR_NUM}/reviews/${POST_FIX_REUSED_REVIEW_ID}/comments?per_page=100" \
          | jq -r '[.[] | .[] | select((.user.login // "") == "'"${CLOUD_BOT_LOGIN}"'") | select((.body | test("P0|P1|P2"))) ] | length' \
          2>/dev/null
      )"
    else
      ACTIONABLE_COUNT="$(
        gh api --paginate --slurp "repos/${REPO}/pulls/${PR_NUM}/comments" \
          | jq -r '[.[] | .[] | select(.user.login == "'"${CLOUD_BOT_LOGIN}"'") | select(.created_at >= "'"${POST_FIX_REVIEW_WINDOW_START}"'") | select((.body | test("P0|P1|P2"))) ] | length' \
          2>/dev/null
      )"
    fi
    ACTIONABLE_RC=$?
    set -e
    if [ "${ACTIONABLE_RC}" -ne 0 ]; then
      echo "ERROR: Failed to query post-fix bot comments (rc=${ACTIONABLE_RC})." >&2
      exit 1
    fi
    case "${ACTIONABLE_COUNT:-}" in
      ''|*[!0-9]*)
        echo "ERROR: Invalid actionable comment count from GitHub API: '${ACTIONABLE_COUNT}'." >&2
        exit 1
        ;;
    esac
    if [ "${ACTIONABLE_COUNT}" -gt 0 ]; then
      echo "ERROR: Post-fix re-review found ${ACTIONABLE_COUNT} new actionable finding(s). Cannot merge." >&2
      echo "Re-run pr-bot to start a new fix cycle."
      exit 1
    elif [ "${REVIEW_EVENT_COUNT:-0}" -eq 0 ] || [ "${REVIEW_API_FAILED:-false}" = "true" ]; then
      echo "WARN: No positive signal (review event or inline comments) for HEAD ${CURRENT_SHA} since ${POST_FIX_REVIEW_WINDOW_START}." >&2
      _check_setup_message
      echo "Falling back to local review." >&2
      SID=$(csa review --sa-mode true --range "${DEFAULT_BRANCH}...HEAD")
      if ! bash "${CSA_HELPER_DIR}/session-wait-until-done.sh" "$SID"; then
        echo "ERROR: Local fallback review found issues after fix. Cannot merge." >&2
        exit 1
      fi
    fi
  fi
  BOT_CLEAN=true
else
  echo "WARN: Post-fix bot wait returned timeout/no-marker. Falling back to local review."
  SID=$(csa review --sa-mode true --range "${DEFAULT_BRANCH}...HEAD")
  if ! bash "${CSA_HELPER_DIR}/session-wait-until-done.sh" "$SID"; then
    echo "ERROR: Local fallback review found issues after fix. Cannot merge." >&2
    exit 1
  fi
  BOT_CLEAN=true
fi

if [ "${BOT_CLEAN}" != "true" ]; then
  echo "ERROR: Post-fix re-review gate failed unexpectedly." >&2
  exit 1
fi

# Clear BOT_HAS_ISSUES so merge steps can proceed
BOT_HAS_ISSUES=false
echo "CSA_VAR:POST_FIX_REUSED_REVIEW_ID=${POST_FIX_REUSED_REVIEW_ID}"
echo "CSA_VAR:BOT_HAS_ISSUES=$BOT_HAS_ISSUES"
echo "Post-fix re-review gate PASSED. Merge is now allowed."
```'''
on_fail = "abort"
condition = "(${CLOUD_BOT}) && !(${BOT_UNAVAILABLE}) && (${BOT_HAS_ISSUES}) && !(${ROUND_LIMIT_REACHED})"

[[workflow.steps]]
id = 18
title = "Step 10a: Bot Review Clean"
tool = "note"
prompt = """
No issues found by bot. Proceed to merge.
This step only runs when the cloud bot is enabled, reachable, has reported no
issues, and the review loop has not hit the round limit."""
on_fail = "abort"
condition = "(${CLOUD_BOT}) && !(${BOT_UNAVAILABLE}) && !(${BOT_HAS_ISSUES}) && !(${ROUND_LIMIT_REACHED})"

[[workflow.steps]]
id = 19
title = "Step 10.5: Rebase for Clean History"
tool = "bash"
prompt = '''
> **Layer**: 0 (Orchestrator) -- git history cleanup before merge.
Reorganize accumulated fix commits into logical groups (source, patterns, other)
before merging, but only when the branch meets the audit guard:
- branch has 3+ commits since `${DEFAULT_BRANCH}`
- every original commit carries explicit review metadata with `verdict=Pass`
  (legacy `Review: ... summary=PASS|CLEAN` is also accepted)

When the guard passes, Step 10.5:
- creates/refreshes `backup-${PR_NUM}-pre-rebase`
- soft-resets to the merge-base
- rebuilds logical commits
- preserves the current commit's `### AI Reviewer Metadata` block
- appends an additive `## AI Reviewer Metadata Rollup` block naming the
  original SHAs + verdict/tool/round metadata
- force-pushes with `--force-with-lease`
- triggers one final `@${CLOUD_BOT_NAME}` review on the rebased HEAD
- blocks merge until the delegated post-rebase review gate returns
  `REBASE_GATE=PASS`

When the guard does not pass, the step logs the skip reason and the workflow
falls back to the existing clean-branch path (Step 11 / Step 12).

```bash
set -euo pipefail
if [ -n "${CSA_WORKFLOW_DIR:-}" ]; then
  REBASE_SCRIPT="${CSA_WORKFLOW_DIR}/scripts/rebase-with-rollup.sh"
else
  REBASE_SCRIPT="patterns/pr-bot/scripts/rebase-with-rollup.sh"
fi

bash "${REBASE_SCRIPT}"
```'''
on_fail = "abort"
condition = "(${CLOUD_BOT}) && !(${BOT_UNAVAILABLE}) && !(${BOT_HAS_ISSUES}) && !(${ROUND_LIMIT_REACHED}) && (${FIXES_ACCUMULATED})"

[[workflow.steps]]
id = 20
title = "Step 6a: Merge Without Bot"
tool = "bash"
prompt = '''
> **Layer**: 0 (Orchestrator) -- merge command, no code analysis.


Cloud bot explicitly disabled (cloud_bot=false). Local fallback review passed
(either initially in Step 4a, or after fix cycle in Step 6-fix). Step 6-fix
guarantees `FALLBACK_REVIEW_HAS_ISSUES=false` before reaching this point.
This step executes in either of these cases:
- `cloud_bot=false` (no cloud bot path)
- `cloud_bot=true`, bot is skipped due to cached quota exhaustion, and fallback local review is clean
Note: this Step 6a path now also covers the latest-comment quota fallback once
the workflow records the quota window.

**MANDATORY**: Before merging, leave a PR comment explaining the merge rationale.
This step has two audit-trail cases:
- `cloud_bot=false`: "cloud_bot=false (disabled in config); merging on local review clean"
- `MERGE_WITHOUT_BOT_REASON_KIND=cloud_bot_quota_exhausted`: explain the cached quota window and cite the local review session ID
When `MERGE_WITHOUT_BOT_REASON_KIND=cloud_bot_quota_exhausted`, the audit trail
must explain the cached quota window and cite the local review session ID.

```bash
# --- Hard gate: unconditional pre-merge check ---
if [ "${FALLBACK_REVIEW_HAS_ISSUES:-false}" = "true" ]; then
  echo "ERROR: Reached merge with unresolved fallback review issues."
  echo "This is a workflow violation. Aborting merge."
  exit 1
fi
if [ "${REBASE_REVIEW_HAS_ISSUES:-false}" = "true" ]; then
  echo "ERROR: Reached merge with unresolved post-rebase review issues."
  echo "This is a workflow violation. Aborting merge."
  exit 1
fi

# Push fallback fix commits so the remote PR head includes them.
# Without this, gh pr merge uses the stale remote HEAD and omits fixes.
git push "${REMOTE_NAME}" "${WORKFLOW_BRANCH}"

# Audit trail: explain why merging without bot review.
DIFF_SUMMARY="$(git diff --stat "${DEFAULT_BRANCH}...HEAD" | sed -n '1,20p')"
if [ -z "${DIFF_SUMMARY}" ]; then
  DIFF_SUMMARY="No diff stat available."
fi
if [ "${CLOUD_BOT}" = "false" ]; then
  MERGE_REASON="cloud_bot=false (disabled in config); merging on local review clean"
  MERGE_WITHOUT_BOT_REASON_KIND="${MERGE_WITHOUT_BOT_REASON_KIND:-cloud_bot_disabled}"
  COMMENT_BODY="**Merge rationale**: ${MERGE_REASON}. Local \`csa review --branch ${DEFAULT_BRANCH}\` passed CLEAN (or issues were fixed in fallback cycle). Proceeding to merge with local review as the review layer."
elif [ "${MERGE_WITHOUT_BOT_REASON_KIND:-}" = "cloud_bot_quota_exhausted" ]; then
  MERGE_REASON="cloud_bot=true but ${CLOUD_BOT_NAME} quota is exhausted; merging on local review clean"
  COMMENT_BODY="$(
    printf '%s\n' \
      '## Merge audit trail — cloud bot skipped (quota exhausted)' \
      '' \
      "Configured cloud bot \`${CLOUD_BOT_NAME}\` is quota-exhausted (detected at \`${CLOUD_BOT_QUOTA_EXHAUSTED_AT:-unknown}\`, expected reset \`${CLOUD_BOT_QUOTA_EXPECTED_RESET_AT:-unknown}\`). Per pr-bot quota fallback, routing to the bot-unavailable + local-review-clean merge path." \
      '' \
      "**Local pre-merge review verdict**: CLEAN (session \`${LOCAL_REVIEW_SESSION_ID:-unknown}\`)" \
      '' \
      '**Diff scope**:' \
      '\`\`\`' \
      "${DIFF_SUMMARY}" \
      '\`\`\`'
  )"
else
  echo "ERROR: Step 6a reached without a valid merge-without-bot rationale."
  exit 1
fi
gh pr comment "${PR_NUM}" --repo "${REPO}" --body "${COMMENT_BODY}"

MERGE_STRATEGY=$(csa config get pr_review.merge_strategy --default merge)
DELETE_BRANCH_FLAG=""
if [ "$(csa config get pr_review.delete_branch --default false)" = "true" ]; then
  DELETE_BRANCH_FLAG="--delete-branch"
fi
# shellcheck disable=SC2086
gh pr merge "${PR_NUM}" --repo "${REPO}" --"${MERGE_STRATEGY}" ${DELETE_BRANCH_FLAG} --force-skip-pr-bot

# Write pr-bot completion marker (deterministic gate for pre-merge hook).
MARKER_REPO_SLUG="$(printf '%s' "${REPO_SLUG}" | tr '/' '_')"
MARKER_DIR="${HOME}/.local/state/cli-sub-agent/pr-bot-markers/${MARKER_REPO_SLUG}"
mkdir -p "${MARKER_DIR}"
touch "${MARKER_DIR}/${PR_NUM}-$(git rev-parse HEAD).done"

# Post-merge: sync local default branch with remote
git fetch "${REMOTE_NAME}"
git checkout "${DEFAULT_BRANCH}"
git merge "${REMOTE_NAME}/${DEFAULT_BRANCH}" --ff-only
git log --oneline -1  # verify local matches remote
echo '<!-- CSA:NEXT_STEP cmd="pipeline complete — PR merged without bot" required=false -->'
```'''
on_fail = "abort"
condition = "!(${CLOUD_BOT}) || ((${CLOUD_BOT}) && (${BOT_UNAVAILABLE}) && !(${FALLBACK_REVIEW_HAS_ISSUES}))"

[[workflow.steps]]
id = 21
title = "Clean Resubmission (if needed)"
tool = "bash"
prompt = '''
> **Layer**: 0 (Orchestrator) -- git branch management, no code reading.


If fixes accumulated, create clean branch for final review.

```bash
CLEAN_BRANCH="${WORKFLOW_BRANCH}-clean"
git checkout -b "${CLEAN_BRANCH}"
git push -u "${REMOTE_NAME}" "${CLEAN_BRANCH}"
gh pr create --repo "${REPO_SLUG}" --base "${DEFAULT_BRANCH}" --head "${CLEAN_BRANCH}" --title "${PR_TITLE}" --body "${PR_BODY}"
```'''
on_fail = "abort"
condition = "(!(${BOT_UNAVAILABLE})) && (${FIXES_ACCUMULATED}) && !(${REBASE_CLEAN_HISTORY_APPLIED})"

[[workflow.steps]]
id = 22
title = "Final Merge"
tool = "bash"
prompt = '''
> **Layer**: 0 (Orchestrator) -- final merge command, no code analysis.


Merge and update the local default branch.

```bash
# --- Hard gate: unconditional pre-merge check ---
if [ "${FALLBACK_REVIEW_HAS_ISSUES}" = "true" ]; then
  echo "ERROR: Reached merge with unresolved fallback review issues."
  echo "This is a workflow violation. Aborting merge."
  exit 1
fi
if [ "${REBASE_REVIEW_HAS_ISSUES}" = "true" ]; then
  echo "ERROR: Reached merge with unresolved post-rebase review issues."
  echo "This is a workflow violation. Aborting merge."
  exit 1
fi

git push "${REMOTE_NAME}" "${WORKFLOW_BRANCH}"
MERGE_STRATEGY=$(csa config get pr_review.merge_strategy --default merge)
DELETE_BRANCH_FLAG=""
if [ "$(csa config get pr_review.delete_branch --default false)" = "true" ]; then
  DELETE_BRANCH_FLAG="--delete-branch"
fi
# shellcheck disable=SC2086
gh pr merge "${WORKFLOW_BRANCH}-clean" --repo "${REPO}" --"${MERGE_STRATEGY}" ${DELETE_BRANCH_FLAG} --force-skip-pr-bot

# Write pr-bot completion marker (deterministic gate for pre-merge hook).
MARKER_REPO_SLUG="$(printf '%s' "${REPO_SLUG}" | tr '/' '_')"
MARKER_DIR="${HOME}/.local/state/cli-sub-agent/pr-bot-markers/${MARKER_REPO_SLUG}"
mkdir -p "${MARKER_DIR}"
touch "${MARKER_DIR}/${PR_NUM}-$(git rev-parse HEAD).done"

# Post-merge: sync local default branch with remote
git fetch "${REMOTE_NAME}"
git checkout "${DEFAULT_BRANCH}"
git merge "${REMOTE_NAME}/${DEFAULT_BRANCH}" --ff-only
git log --oneline -1  # verify local matches remote
echo '<!-- CSA:NEXT_STEP cmd="pipeline complete — PR merged" required=false -->'
```'''
on_fail = "abort"
condition = "(!(${BOT_UNAVAILABLE})) && (${FIXES_ACCUMULATED}) && !(${REBASE_CLEAN_HISTORY_APPLIED})"

[[workflow.steps]]
id = 23
title = "Step 12b: Final Merge (Direct or Post-Rebase)"
tool = "bash"
prompt = '''
> **Layer**: 0 (Orchestrator) -- direct merge, no code analysis needed.


First-pass clean review or Step 10.5 post-rebase success: merge the existing PR directly.

```bash
# --- Hard gate: unconditional pre-merge check ---
if [ "${FALLBACK_REVIEW_HAS_ISSUES}" = "true" ]; then
  echo "ERROR: Reached merge with unresolved fallback review issues."
  echo "This is a workflow violation. Aborting merge."
  exit 1
fi
if [ "${REBASE_REVIEW_HAS_ISSUES}" = "true" ]; then
  echo "ERROR: Reached merge with unresolved post-rebase review issues."
  echo "This is a workflow violation. Aborting merge."
  exit 1
fi

git push "${REMOTE_NAME}" "${WORKFLOW_BRANCH}"
MERGE_STRATEGY=$(csa config get pr_review.merge_strategy --default merge)
DELETE_BRANCH_FLAG=""
if [ "$(csa config get pr_review.delete_branch --default false)" = "true" ]; then
  DELETE_BRANCH_FLAG="--delete-branch"
fi
# shellcheck disable=SC2086
gh pr merge "${PR_NUM}" --repo "${REPO}" --"${MERGE_STRATEGY}" ${DELETE_BRANCH_FLAG} --force-skip-pr-bot

# Write pr-bot completion marker (deterministic gate for pre-merge hook).
MARKER_REPO_SLUG="$(printf '%s' "${REPO_SLUG}" | tr '/' '_')"
MARKER_DIR="${HOME}/.local/state/cli-sub-agent/pr-bot-markers/${MARKER_REPO_SLUG}"
mkdir -p "${MARKER_DIR}"
touch "${MARKER_DIR}/${PR_NUM}-$(git rev-parse HEAD).done"

# Post-merge: sync local default branch with remote
git fetch "${REMOTE_NAME}"
git checkout "${DEFAULT_BRANCH}"
git merge "${REMOTE_NAME}/${DEFAULT_BRANCH}" --ff-only
git log --oneline -1  # verify local matches remote
echo '<!-- CSA:NEXT_STEP cmd="pipeline complete — PR merged" required=false -->'
```'''
on_fail = "abort"
condition = "(!(${BOT_UNAVAILABLE})) && ((!(${FIXES_ACCUMULATED})) || (${REBASE_CLEAN_HISTORY_APPLIED}))"
