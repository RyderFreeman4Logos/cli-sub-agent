name = "LIGHT_THRESHOLD_FILES"
[[workflow.variables]]
name = "LIGHT_THRESHOLD_LINES"
[[workflow.variables]]
name = "LOCAL_SHA"
[[workflow.variables]]
name = "LOCK_DIR"
[[workflow.variables]]
name = "LOCK_HELD"
[[workflow.variables]]
name = "MARKER_BASE"
[[workflow.variables]]
name = "MARKER_DIR"
[[workflow.variables]]
name = "MKTD_EXIT"
[[workflow.variables]]
name = "MKTD_FAILURE_CONTEXT"
[[workflow.variables]]
name = "MKTD_INTENSITY"
[[workflow.variables]]
name = "MKTD_OUTPUT"
[[workflow.variables]]
name = "MKTD_TIMEOUT_SECONDS"
[[workflow.variables]]
name = "MKTD_WORKFLOW_PATH"
[[workflow.variables]]
name = "MKTD_TODO_TIMESTAMP"
