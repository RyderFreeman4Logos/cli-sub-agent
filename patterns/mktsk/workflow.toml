[workflow]
name = "mktsk"
description = "Execute TODO plans as deterministic, resumable serial checklists across auto-compaction"

[[workflow.variables]]
name = "CONTEXT_ABOVE_80_PERCENT"

[[workflow.variables]]
name = "SID"

[[workflow.steps]]
id = 1
title = "Parse TODO Plan"
prompt = """
Read the TODO plan file (from mktd output or user-provided path).
Extract every unchecked checklist item with executor tag and DONE WHEN.
Record the resolved TODO path explicitly in the output.
Fail if no executable checklist items are found."""
on_fail = "abort"

[[workflow.steps]]
id = 2
title = "Register Tasks"
prompt = """
Register each parsed TODO item via TaskCreate. Each task must include:
- stable item id
- source TODO line reference
- executor tag
- concrete action
- mechanically verifiable DONE WHEN

Do NOT modify TODO.md checkboxes — task progress is tracked via TaskUpdate.

## Parsed Items
${STEP_1_OUTPUT}"""
on_fail = "abort"

[[workflow.steps]]
id = 3
title = "Execute Checklist Serially"
prompt = """
Execute the normalized checklist strictly in order.
Treat each checklist item as an atomic transaction:
1) execute exactly one item
2) run quality gates/review
3) persist completion to TODO immediately
4) write progress checkpoint before moving to next item

Dispatch by executor tag:
- [CSA:tool] => csa run
- [Sub:developer] => execute directly
- [Skill:xxx] => invoke skill
- [Main]/no tag => execute directly

Checkpoint policy (mandatory):
- Use `.csa/state/mktsk/checkpoint.json` as progress checkpoint.
- Update checkpoint after each completed item with latest completed item id.
- If interrupted, resume from remaining unchecked TODO items and checkpoint state.

After each item:
1) just fmt
2) just clippy
3) just test
4) SID=$(csa review --diff) && csa session wait --session "$SID"
5) mark TODO checkbox as completed

## Execution Checklist
${STEP_2_OUTPUT}"""
on_fail = "abort"

[[workflow.steps]]
id = 4
title = "Compact Context"
prompt = """
Compact while preserving:
- remaining checklist items
- completed items
- open review findings
- pending DONE WHEN checks
- checkpoint path and latest completed item id."""
on_fail = "abort"
condition = "${CONTEXT_ABOVE_80_PERCENT}"

[[workflow.steps]]
id = 5
title = "Verify Completion"
tool = "bash"
prompt = """
Run final verification.

```bash
just fmt
just clippy
just test
git status --short
```"""
on_fail = "abort"

[[workflow.steps]]
id = 6
title = "Publish Transaction"
tool = "bash"
prompt = '''
Push, create/reuse PR, and run pr-bot atomically.
Skipped when parent workflow handles publish (CSA_SKIP_PUBLISH=true).

```bash
set -euo pipefail
if [ "${CSA_SKIP_PUBLISH:-}" = "true" ]; then
  echo "Parent workflow handles publish; skipping."
  exit 0
fi

# Branch safety check — refuse to push protected branches
BRANCH="$(git branch --show-current)"
DEFAULT_BRANCH=$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed 's@^refs/remotes/origin/@@')
if [ -z "$DEFAULT_BRANCH" ]; then DEFAULT_BRANCH="main"; fi
if [ "$BRANCH" = "$DEFAULT_BRANCH" ] || [ "$BRANCH" = "dev" ]; then
  echo "ERROR: Cannot publish from protected branch $BRANCH. Must be on a feature branch." >&2
  exit 1
fi

# Version bump check
if command -v just >/dev/null 2>&1; then
  if ! just check-version-bumped 2>/dev/null; then
    just bump-patch
    cargo run -p weave -- lock 2>/dev/null || true
    git add Cargo.toml Cargo.lock weave.lock 2>/dev/null || git add Cargo.toml weave.lock
    VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "cli-sub-agent") | .version')"
    git commit -m "chore(release): bump workspace version to ${VERSION}"
  fi
fi

# Pre-PR cumulative review (hard gate — must pass before push)
SID=$(csa review --sa-mode true --range main...HEAD)
if ! csa session wait --session "$SID"; then
  echo "ERROR: Cumulative review failed. Fix issues before publishing." >&2
  exit 1
fi

# Push
BRANCH="$(git branch --show-current)"
git push -u origin "${BRANCH}" --force-with-lease

# Create or reuse PR
COMMIT_SUBJECT="$(git log -1 --format=%s)"
set +e
CREATE_OUTPUT="$(gh pr create --base main --title "${COMMIT_SUBJECT}" --body "Auto-created by mktsk pipeline." 2>&1)"
CREATE_RC=$?
set -e
if [ "${CREATE_RC}" -ne 0 ]; then
  if ! printf '%s\n' "${CREATE_OUTPUT}" | grep -Eiq 'already exists|a pull request already exists'; then
    echo "ERROR: gh pr create failed: ${CREATE_OUTPUT}" >&2
    exit 1
  fi
  echo "INFO: PR already exists for ${BRANCH}; continuing."
fi

# Run pr-bot (idempotency markers prevent duplicate runs)
if [ -x scripts/hooks/post-pr-create.sh ]; then
  scripts/hooks/post-pr-create.sh --base main
elif [ -f patterns/pr-bot/workflow.toml ]; then
  csa plan run patterns/pr-bot/workflow.toml
else
  echo "WARN: pr-bot workflow not found; PR created but review/merge skipped." >&2
fi
```'''
on_fail = "abort"

[[workflow.steps]]
id = 7
title = "Post-Merge Local Sync"
tool = "bash"
prompt = """
Sync local main with remote after PR merge.
Skipped when parent workflow handles publish.

```bash
set -euo pipefail
if [ "${CSA_SKIP_PUBLISH:-}" = "true" ]; then
  exit 0
fi
git fetch origin
git checkout main
git merge origin/main --ff-only
git log --oneline -1
```"""
on_fail = "abort"
