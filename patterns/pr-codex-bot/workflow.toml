[workflow]
name = "pr-codex-bot"
description = "Iterative PR review loop with cloud codex bot: local review, push, bot trigger, false-positive arbitration, fix, merge"

[[workflow.variables]]
name = "CLOUD_BOT"

[[workflow.variables]]
name = "BOT_HAS_ISSUES"

[[workflow.variables]]
name = "BOT_UNAVAILABLE"

[[workflow.variables]]
name = "AUDIT_TRAIL_POSTED"

[[workflow.variables]]
name = "BOT_REVIEW_WINDOW_START"

[[workflow.variables]]
name = "CLEAN_BRANCH"

[[workflow.variables]]
name = "COMMENT_IS_FALSE_POSITIVE"

[[workflow.variables]]
name = "COMMENT_IS_STALE"

[[workflow.variables]]
name = "COMMENT_PATH"

[[workflow.variables]]
name = "COMMENT_TIMESTAMP"

[[workflow.variables]]
name = "CURRENT_COMMENT_ID"

[[workflow.variables]]
name = "FALLBACK_REVIEW_HAS_ISSUES"

[[workflow.variables]]
name = "FIXES_ACCUMULATED"

[[workflow.variables]]
name = "LOCAL_REVIEW_HAS_ISSUES"

[[workflow.variables]]
name = "MAX_REVIEW_ROUNDS"

[[workflow.variables]]
name = "PR_BODY"

[[workflow.variables]]
name = "REVIEW_COMPLETED"

[[workflow.variables]]
name = "PR_NUM"

[[workflow.variables]]
name = "PR_TITLE"

[[workflow.variables]]
name = "REBASE_ENABLED"

[[workflow.variables]]
name = "REBASE_REVIEW_HAS_ISSUES"

[[workflow.variables]]
name = "REPO"

[[workflow.variables]]
name = "REVIEW_ROUND"

[[workflow.variables]]
name = "ROUND_LIMIT_ACTION"

[[workflow.variables]]
name = "ROUND_LIMIT_REACHED"

[[workflow.variables]]
name = "WORKFLOW_BRANCH"

[[workflow.steps]]
id = 1
title = "Commit Changes"
tool = "bash"
prompt = """
Ensure all changes committed. Set WORKFLOW_BRANCH once (persists through
clean branch switches in Step 11).

```bash
WORKFLOW_BRANCH="$(git branch --show-current)"
echo "CSA_VAR:WORKFLOW_BRANCH=$WORKFLOW_BRANCH"
```"""
on_fail = "abort"

[[workflow.steps]]
id = 2
title = "Local Pre-PR Review (SYNCHRONOUS — MUST NOT background)"
tool = "bash"
prompt = """
Run cumulative local review covering all commits since main, with SHA-verified
fast-path. This is the FOUNDATION — without it, bot unavailability cannot
safely merge. Local pre-PR review findings must be fixed before Step 4; the PR
audit-trail comment path starts only after a PR exists.

```bash
set -euo pipefail
CURRENT_HEAD="$(git rev-parse HEAD)"
REVIEW_HEAD="$(csa session list --recent-review 2>/dev/null | parse_head_sha || true)"
if [ -n "${REVIEW_HEAD}" ] && [ "${CURRENT_HEAD}" = "${REVIEW_HEAD}" ]; then
  echo "Fast-path: latest local review already covers HEAD ${CURRENT_HEAD}; skip Step 2 review."
else
  echo "No matching review HEAD found (or HEAD drift detected). Running full local review."
  csa review --branch main
fi
REVIEW_COMPLETED=true
echo "CSA_VAR:REVIEW_COMPLETED=$REVIEW_COMPLETED"
```"""
on_fail = "abort"

[[workflow.steps]]
id = 3
title = "Fix Local Review Issues"
tool = "csa"
prompt = "Fix issues found by local review. Loop until clean (max 3 rounds)."
tier = "tier-2-standard"
condition = "${LOCAL_REVIEW_HAS_ISSUES}"

[workflow.steps.on_fail]
retry = 3

[[workflow.steps]]
id = 4
title = "Push and Ensure PR"
tool = "bash"
prompt = """
PRECONDITION: Step 2 (local review) must have completed successfully.
The bash block below includes an explicit REVIEW_COMPLETED gate for safety:
even though the workflow engine's on_fail=abort on Step 2 should prevent
reaching this step without a passing review, agents executing manually via
PATTERN.md may skip or fail to set the variable.

```bash
set -euo pipefail
if [ "${REVIEW_COMPLETED:-}" != "true" ]; then
  echo "ERROR: Local review (Step 2) was not completed. REVIEW_COMPLETED=${REVIEW_COMPLETED:-unset}"
  echo "FORBIDDEN: Creating a PR without completing Step 2."
  exit 1
fi
git push -u origin "${WORKFLOW_BRANCH}"
ORIGIN_URL="$(git remote get-url origin)"
SOURCE_OWNER="$(
  printf '%s\n' "${ORIGIN_URL}" | sed -nE \
    -e 's#^https?://([^@/]+@)?github\\.com/([^/]+)/[^/]+(\\.git)?$#\\2#p' \
    -e 's#^(ssh://)?([^@]+@)?github\\.com[:/]([^/]+)/[^/]+(\\.git)?$#\\3#p' \
    | head -n 1
)"
if [ -z "${SOURCE_OWNER}" ]; then
  SOURCE_OWNER="$(gh repo view --json owner -q '.owner.login')"
fi
find_branch_pr() {
  local owner_matches owner_count branch_matches branch_count
  owner_matches="$(
    gh pr list --base main --state open --head "${SOURCE_OWNER}:${WORKFLOW_BRANCH}" --json number \
      --jq '.[].number' 2>/dev/null || true
  )"
  owner_count="$(printf '%s\n' "${owner_matches}" | sed '/^$/d' | wc -l | tr -d ' ')"
  if [ "${owner_count}" = "1" ]; then
    printf '%s\n' "${owner_matches}" | sed '/^$/d' | head -n 1
    return 0
  fi
  if [ "${owner_count}" -gt 1 ]; then
    echo "ERROR: Multiple open PRs found for ${SOURCE_OWNER}:${WORKFLOW_BRANCH}. Resolve ambiguity manually." >&2
    return 1
  fi

  branch_matches="$(
    gh pr list --base main --state open --head "${WORKFLOW_BRANCH}" --json number \
      --jq '.[].number' 2>/dev/null || true
  )"
  branch_count="$(printf '%s\n' "${branch_matches}" | sed '/^$/d' | wc -l | tr -d ' ')"
  if [ "${branch_count}" = "1" ]; then
    printf '%s\n' "${branch_matches}" | sed '/^$/d' | head -n 1
    return 0
  fi
  if [ "${branch_count}" -gt 1 ]; then
    echo "ERROR: Multiple open PRs found for branch ${WORKFLOW_BRANCH}. Resolve ambiguity manually." >&2
    return 1
  fi
  return 2
}

set +e
PR_NUM="$(find_branch_pr)"
FIND_RC=$?
set -e
if [ "${FIND_RC}" -eq 0 ] && [ -n "${PR_NUM}" ]; then
  echo "Using existing PR #${PR_NUM} for branch ${WORKFLOW_BRANCH}"
elif [ "${FIND_RC}" -eq 1 ]; then
  exit 1
else
  set +e
  CREATE_OUTPUT="$(gh pr create --base main --head "${SOURCE_OWNER}:${WORKFLOW_BRANCH}" --title "${PR_TITLE}" --body "${PR_BODY}" 2>&1)"
  CREATE_RC=$?
  set -e
  if [ "${CREATE_RC}" -ne 0 ]; then
    if ! printf '%s\n' "${CREATE_OUTPUT}" | grep -Eiq 'already exists|a pull request already exists'; then
      echo "ERROR: gh pr create failed: ${CREATE_OUTPUT}" >&2
      exit 1
    fi
    echo "Detected existing PR during create race; resolving PR number by owner+branch."
  fi
  FIND_RC=2
  PR_NUM=""
  for attempt in 1 2 3 4 5; do
    set +e
    PR_NUM="$(find_branch_pr)"
    FIND_RC=$?
    set -e
    if [ "${FIND_RC}" -eq 0 ] && [ -n "${PR_NUM}" ]; then
      break
    fi
    if [ "${FIND_RC}" -eq 1 ]; then
      break
    fi
    sleep 2
  done
  if [ "${FIND_RC}" -ne 0 ] || [ -z "${PR_NUM}" ]; then
    echo "ERROR: Failed to resolve a unique PR for branch ${WORKFLOW_BRANCH} targeting main." >&2
    exit 1
  fi
fi
if [ -z "${PR_NUM:-}" ] || ! printf '%s' "${PR_NUM}" | grep -Eq '^[0-9]+$'; then
  echo "ERROR: Failed to resolve PR number for branch ${WORKFLOW_BRANCH} targeting main." >&2
  exit 1
fi
REPO="$(gh repo view --json nameWithOwner -q '.nameWithOwner')"
echo "CSA_VAR:PR_NUM=$PR_NUM"
echo "CSA_VAR:REPO=$REPO"
```"""
on_fail = "abort"

[[workflow.steps]]
id = 6
title = "Check Cloud Bot Configuration"
tool = "bash"
prompt = """
Check whether cloud bot review is enabled for this project.
If disabled, set BOT_UNAVAILABLE and apply the same SHA-verified fast-path
before deciding whether supplementary local review is needed.

```bash
set -euo pipefail
CLOUD_BOT=$(csa config get pr_review.cloud_bot --default true)
if [ "${CLOUD_BOT}" = "false" ]; then
  BOT_UNAVAILABLE=true
  FALLBACK_REVIEW_HAS_ISSUES=false
  CURRENT_HEAD="$(git rev-parse HEAD)"
  REVIEW_HEAD="$(csa session list --recent-review 2>/dev/null | parse_head_sha || true)"
  if [ -n "${REVIEW_HEAD}" ] && [ "${CURRENT_HEAD}" = "${REVIEW_HEAD}" ]; then
    echo "Cloud bot disabled, fast-path active: local review already covers HEAD ${CURRENT_HEAD}."
  else
    echo "Cloud bot disabled and fast-path invalid. Running full local review."
    csa review --branch main
  fi
fi
BOT_UNAVAILABLE="${BOT_UNAVAILABLE:-false}"
FALLBACK_REVIEW_HAS_ISSUES="${FALLBACK_REVIEW_HAS_ISSUES:-false}"
echo "CSA_VAR:BOT_UNAVAILABLE=$BOT_UNAVAILABLE"
echo "CSA_VAR:FALLBACK_REVIEW_HAS_ISSUES=$FALLBACK_REVIEW_HAS_ISSUES"
```"""
on_fail = "abort"

[[workflow.steps]]
id = 5
title = "Trigger Cloud Bot Review and Delegate Waiting"
tool = "bash"
prompt = """
Trigger a fresh @codex review for current HEAD,
then delegate long waiting to CSA so caller-side polling loops are avoided.
If bot times out, set BOT_UNAVAILABLE and fall through — local review
(Step 2) already covers main...HEAD. On timeout, run fallback local review
and gate merge on fallback result.

```bash
set -euo pipefail
TIMEOUT_BIN="$(command -v timeout || command -v gtimeout || true)"
run_with_hard_timeout() {
  local timeout_secs="$1"
  shift
  if [ -n "${TIMEOUT_BIN}" ]; then
    "${TIMEOUT_BIN}" -k 5s "${timeout_secs}s" "$@" 2>&1
    return $?
  fi

  local tmp_out timeout_flag child_pid watcher_pid rc use_pgroup
  tmp_out="$(mktemp)"
  timeout_flag="$(mktemp)"
  rm -f "${timeout_flag}"
  use_pgroup=false
  if command -v setsid >/dev/null 2>&1; then
    setsid "$@" >"${tmp_out}" 2>&1 &
    use_pgroup=true
    child_pid=$!
  else
    "$@" >"${tmp_out}" 2>&1 &
    child_pid=$!
  fi
  (
    sleep "${timeout_secs}"
    if kill -0 "${child_pid}" 2>/dev/null; then
      : >"${timeout_flag}"
      if [ "${use_pgroup}" = "true" ]; then
        kill -TERM "-${child_pid}" 2>/dev/null || true
      else
        kill -TERM "${child_pid}" 2>/dev/null || true
      fi
      sleep 2
      if kill -0 "${child_pid}" 2>/dev/null; then
        if [ "${use_pgroup}" = "true" ]; then
          kill -KILL "-${child_pid}" 2>/dev/null || true
        else
          kill -KILL "${child_pid}" 2>/dev/null || true
        fi
      fi
    fi
  ) &
  watcher_pid=$!
  wait "${child_pid}"
  rc=$?
  kill "${watcher_pid}" 2>/dev/null || true
  cat "${tmp_out}"
  rm -f "${tmp_out}"
  if [ -f "${timeout_flag}" ]; then
    rm -f "${timeout_flag}"
    return 124
  fi
  rm -f "${timeout_flag}"
  return "${rc}"
}

# --- Trigger fresh @codex review for current HEAD ---
CURRENT_SHA="$(git rev-parse HEAD)"
TRIGGER_TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
WAIT_BASE_TS="${TRIGGER_TS}"
TRIGGER_BODY="@codex review

<!-- csa-trigger:${CURRENT_SHA}:${TRIGGER_TS} -->"
gh pr comment "${PR_NUM}" --repo "${REPO}" --body "${TRIGGER_BODY}"

# --- Delegate waiting to CSA-managed step (max 10 min) ---
BOT_UNAVAILABLE=true
FALLBACK_REVIEW_HAS_ISSUES=false
BOT_HAS_ISSUES=false
WAIT_RESULT_FILE="$(mktemp)"
set +e
run_with_hard_timeout 650 csa run --force-ignore-tier-setting --tool codex --idle-timeout 650 "Bounded wait task only. Do NOT invoke pr-codex-bot skill or any full PR workflow. Operate on PR #${PR_NUM} in repo ${REPO}. Wait for @codex review response posted after ${WAIT_BASE_TS} for HEAD ${CURRENT_SHA}. Max wait 10 minutes. Do not edit code. Return exactly one marker line: BOT_REPLY=received or BOT_REPLY=timeout." | tee "${WAIT_RESULT_FILE}"
WAIT_RC=${PIPESTATUS[0]}
set -e
WAIT_RESULT="$(cat "${WAIT_RESULT_FILE}")"
rm -f "${WAIT_RESULT_FILE}"
if [ "${WAIT_RC}" -eq 124 ]; then
  BOT_UNAVAILABLE=true
elif [ "${WAIT_RC}" -ne 0 ]; then
  echo "WARN: Delegated bot wait failed (rc=${WAIT_RC}); treating cloud bot as unavailable." >&2
  BOT_UNAVAILABLE=true
else
  WAIT_MARKER="$(
    printf '%s\n' "${WAIT_RESULT}" \
      | grep -E '^[[:space:]]*BOT_REPLY=(received|timeout)[[:space:]]*$' \
      | tail -n 1 \
      | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//' \
      || true
  )"
  if [ "${WAIT_MARKER}" = "BOT_REPLY=received" ]; then
    BOT_UNAVAILABLE=false
    BOT_SETTLE_SECS="${BOT_SETTLE_SECS:-20}"
    sleep "${BOT_SETTLE_SECS}"
    set +e
    ACTIONABLE_COMMENT_COUNT="$(
      gh api "repos/${REPO}/pulls/${PR_NUM}/comments?per_page=100" \
        --jq '[.[] | select(.user.login == "chatgpt-codex-connector[bot]") | select(.created_at > "'"${WAIT_BASE_TS}"'") | select((.body | test("P0|P1|P2"))) ] | length' \
        2>/dev/null
    )"
    ACTIONABLE_COMMENT_RC=$?
    set -e
    if [ "${ACTIONABLE_COMMENT_RC}" -ne 0 ]; then
      echo "ERROR: Failed to query actionable bot comments for trigger window (rc=${ACTIONABLE_COMMENT_RC})." >&2
      exit 1
    fi
    case "${ACTIONABLE_COMMENT_COUNT:-}" in
      ''|*[!0-9]*)
        echo "ERROR: Invalid actionable comment count from GitHub API: '${ACTIONABLE_COMMENT_COUNT}'." >&2
        exit 1
        ;;
    esac
    if [ "${ACTIONABLE_COMMENT_COUNT}" -gt 0 ]; then
      echo "Detected ${ACTIONABLE_COMMENT_COUNT} actionable bot comment(s) after trigger window; marking BOT_HAS_ISSUES=true."
      BOT_HAS_ISSUES=true
    fi
  elif [ "${WAIT_MARKER}" = "BOT_REPLY=timeout" ]; then
    BOT_UNAVAILABLE=true
  else
    echo "WARN: Delegated bot wait returned no marker; treating cloud bot as unavailable." >&2
    BOT_UNAVAILABLE=true
  fi
fi

if [ "${BOT_UNAVAILABLE}" = "true" ]; then
  echo "Bot timed out after delegated wait window. Falling back to local review."
  if ! csa review --range main...HEAD --timeout 1200 2>/dev/null; then
    FALLBACK_REVIEW_HAS_ISSUES=true
  fi
fi
echo "CSA_VAR:BOT_REVIEW_WINDOW_START=$WAIT_BASE_TS"
echo "CSA_VAR:BOT_UNAVAILABLE=$BOT_UNAVAILABLE"
echo "CSA_VAR:FALLBACK_REVIEW_HAS_ISSUES=$FALLBACK_REVIEW_HAS_ISSUES"
echo "CSA_VAR:BOT_HAS_ISSUES=$BOT_HAS_ISSUES"
```"""
on_fail = "abort"
condition = "!(${BOT_UNAVAILABLE})"

[[workflow.steps]]
id = 18
title = "Step 6-fix: Fallback Review Fix Cycle (Bot Timeout Path)"
tool = "bash"
prompt = """
When BOT_UNAVAILABLE=true and FALLBACK_REVIEW_HAS_ISSUES=true, delegate a
self-contained fallback fix cycle to CSA. This wrapper enforces hard timeout,
strict return-code handling, and an explicit variable clear on success.

DONE WHEN:
- CSA returns marker FALLBACK_FIX=clean and FALLBACK_REVIEW_HAS_ISSUES=false.
- Any timeout/agent failure/invalid marker exits non-zero.

```bash
set -euo pipefail
TIMEOUT_BIN="$(command -v timeout || command -v gtimeout || true)"
run_with_hard_timeout() {
  local timeout_secs="$1"
  shift
  if [ -n "${TIMEOUT_BIN}" ]; then
    "${TIMEOUT_BIN}" -k 5s "${timeout_secs}s" "$@" 2>&1
    return $?
  fi

  local tmp_out timeout_flag child_pid watcher_pid rc use_pgroup
  tmp_out="$(mktemp)"
  timeout_flag="$(mktemp)"
  rm -f "${timeout_flag}"
  use_pgroup=false
  if command -v setsid >/dev/null 2>&1; then
    setsid "$@" >"${tmp_out}" 2>&1 &
    use_pgroup=true
    child_pid=$!
  else
    "$@" >"${tmp_out}" 2>&1 &
    child_pid=$!
  fi
  (
    sleep "${timeout_secs}"
    if kill -0 "${child_pid}" 2>/dev/null; then
      : >"${timeout_flag}"
      if [ "${use_pgroup}" = "true" ]; then
        kill -TERM "-${child_pid}" 2>/dev/null || true
      else
        kill -TERM "${child_pid}" 2>/dev/null || true
      fi
      sleep 2
      if kill -0 "${child_pid}" 2>/dev/null; then
        if [ "${use_pgroup}" = "true" ]; then
          kill -KILL "-${child_pid}" 2>/dev/null || true
        else
          kill -KILL "${child_pid}" 2>/dev/null || true
        fi
      fi
    fi
  ) &
  watcher_pid=$!
  wait "${child_pid}"
  rc=$?
  kill "${watcher_pid}" 2>/dev/null || true
  cat "${tmp_out}"
  rm -f "${tmp_out}"
  if [ -f "${timeout_flag}" ]; then
    rm -f "${timeout_flag}"
    return 124
  fi
  rm -f "${timeout_flag}"
  return "${rc}"
}
set +e
FIX_RESULT_FILE="$(mktemp)"
run_with_hard_timeout 1800 csa run --force-ignore-tier-setting --tool codex --idle-timeout 1800 "Bounded fallback-fix task only. Do NOT invoke pr-codex-bot skill or any full PR workflow. Operate on PR #${PR_NUM} in repo ${REPO}. Bot is unavailable and fallback local review found issues. Run a self-contained max-3-round fix cycle: read latest findings from csa review --range main...HEAD, apply fixes with commits, re-run review, repeat until clean. Return exactly one marker line FALLBACK_FIX=clean when clean; otherwise return FALLBACK_FIX=failed and exit non-zero." | tee "${FIX_RESULT_FILE}"
FIX_RC=${PIPESTATUS[0]}
set -e
FIX_RESULT="$(cat "${FIX_RESULT_FILE}")"
rm -f "${FIX_RESULT_FILE}"

if [ "${FIX_RC}" -eq 124 ]; then
  echo "ERROR: Fallback fix cycle exceeded hard timeout (1800s)." >&2
  exit 1
fi
if [ "${FIX_RC}" -ne 0 ]; then
  echo "ERROR: Fallback fix cycle failed (rc=${FIX_RC})." >&2
  exit 1
fi
FIX_MARKER="$(
  printf '%s\n' "${FIX_RESULT}" \
    | grep -E '^[[:space:]]*FALLBACK_FIX=(clean|failed)[[:space:]]*$' \
    | tail -n 1 \
    | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//' \
    || true
)"
if [ "${FIX_MARKER}" != "FALLBACK_FIX=clean" ]; then
  echo "ERROR: Fallback fix cycle returned invalid marker." >&2
  exit 1
fi

FALLBACK_REVIEW_HAS_ISSUES=false
echo "CSA_VAR:FALLBACK_REVIEW_HAS_ISSUES=$FALLBACK_REVIEW_HAS_ISSUES"
```"""
on_fail = "abort"
condition = "(${BOT_UNAVAILABLE}) && (${FALLBACK_REVIEW_HAS_ISSUES}) && (!(${ROUND_LIMIT_REACHED}))"

[[workflow.steps]]
id = 7
title = "Step 6a: Merge Without Bot"
tool = "bash"
prompt = """
Bot unavailable. Local review already guarantees coverage.
Push any local commits before merge so remote HEAD includes all fixes.
MANDATORY: Leave an audit trail comment on the PR explaining the merge rationale
(bot timeout + local review CLEAN) before merging.

```bash
if [ "${FALLBACK_REVIEW_HAS_ISSUES:-false}" = "true" ]; then
  echo "ERROR: Reached bot-timeout merge with unresolved fallback review issues."
  exit 1
fi
if [ "${REBASE_REVIEW_HAS_ISSUES:-false}" = "true" ]; then
  echo "ERROR: Reached bot-timeout merge with unresolved post-rebase review issues."
  exit 1
fi

git push origin "${WORKFLOW_BRANCH}"

# Audit trail: explain why merging without bot review.
gh pr comment "${PR_NUM}" --repo "${REPO}" --body \
  "**Merge rationale**: Cloud bot (@codex) is disabled or unavailable. Local csa review --branch main passed CLEAN (or issues were fixed in fallback cycle). Proceeding to merge with local review as the review layer."

gh pr merge "${PR_NUM}" --repo "${REPO}" --merge --delete-branch

# Post-merge: sync local main with remote
git fetch origin
git checkout main
git merge origin/main --ff-only
git log --oneline -1  # verify local matches remote
```"""
on_fail = "abort"
condition = "(${BOT_UNAVAILABLE}) && (!(${FALLBACK_REVIEW_HAS_ISSUES})) && (!(${ROUND_LIMIT_REACHED}))"

[[workflow.steps]]
id = 8
title = "Select Current Bot Comment"
tool = "bash"
prompt = """
Select one actionable bot review comment from the current review window for
v1 flat execution. v1 processes a single current bot comment per review loop
iteration; additional findings are picked up by the next review trigger after
Step 12 pushes fixes.

Export the selected comment metadata so later steps can run the conservative
staleness check, arbitration, and fix flow against a single current comment.

```bash
set -euo pipefail
if [ -z "${BOT_REVIEW_WINDOW_START:-}" ]; then
  echo "ERROR: BOT_REVIEW_WINDOW_START is unset. Step 5 must export the current review window start." >&2
  exit 1
fi

COMMENT_RECORD="$(
  gh api "repos/${REPO}/pulls/${PR_NUM}/comments?per_page=100" \
    --jq '[.[] | select(.user.login == "chatgpt-codex-connector[bot]") | select(.created_at > "'"${BOT_REVIEW_WINDOW_START}"'") | select((.body | test("P0|P1|P2"))) ] | sort_by(.created_at) | .[0] | [(.id | tostring), (.path // ""), .created_at] | @tsv' \
    2>/dev/null || true
)"
if [ -z "${COMMENT_RECORD}" ] || [ "${COMMENT_RECORD}" = "null" ]; then
  echo "ERROR: BOT_HAS_ISSUES=true but no actionable bot comment was found in the current review window." >&2
  exit 1
fi

IFS=$'\t' read -r CURRENT_COMMENT_ID COMMENT_PATH COMMENT_TIMESTAMP <<EOF
${COMMENT_RECORD}
EOF

if [ -z "${CURRENT_COMMENT_ID}" ] || ! printf '%s' "${CURRENT_COMMENT_ID}" | grep -Eq '^[0-9]+$'; then
  echo "ERROR: Failed to parse a numeric current bot comment id from '${COMMENT_RECORD}'." >&2
  exit 1
fi
if [ -z "${COMMENT_TIMESTAMP}" ]; then
  echo "ERROR: Failed to parse the current bot comment timestamp." >&2
  exit 1
fi

COMMENT_IS_FALSE_POSITIVE=true
COMMENT_IS_STALE=false
AUDIT_TRAIL_POSTED=false

echo "Selected current bot comment ${CURRENT_COMMENT_ID} for v1 flat execution."
echo "CSA_VAR:CURRENT_COMMENT_ID=$CURRENT_COMMENT_ID"
echo "CSA_VAR:COMMENT_PATH=$COMMENT_PATH"
echo "CSA_VAR:COMMENT_TIMESTAMP=$COMMENT_TIMESTAMP"
echo "CSA_VAR:COMMENT_IS_FALSE_POSITIVE=$COMMENT_IS_FALSE_POSITIVE"
echo "CSA_VAR:COMMENT_IS_STALE=$COMMENT_IS_STALE"
echo "CSA_VAR:AUDIT_TRAIL_POSTED=$AUDIT_TRAIL_POSTED"
```"""
on_fail = "abort"
condition = "(!(${BOT_UNAVAILABLE})) && (${BOT_HAS_ISSUES})"

[[workflow.steps]]
id = 9
title = "Staleness Filter"
tool = "bash"
prompt = """
Run a conservative file-level staleness check for the current bot review
comment selected in Step 8. If the referenced file changed on this branch after
the comment timestamp, mark COMMENT_IS_STALE=true so arbitration and fixes are
skipped for this loop iteration.

```bash
set -euo pipefail
COMMENT_IS_STALE=false

if [ -n "${COMMENT_PATH:-}" ] && [ -n "${COMMENT_TIMESTAMP:-}" ]; then
  if ! git diff --quiet main...HEAD -- "${COMMENT_PATH}"; then
    if git log --since="${COMMENT_TIMESTAMP}" --format=%H -- "${COMMENT_PATH}" | grep -q .; then
      COMMENT_IS_STALE=true
    fi
  fi
fi

echo "CSA_VAR:COMMENT_IS_STALE=$COMMENT_IS_STALE"
if [ "${COMMENT_IS_STALE}" = "true" ]; then
  echo "Current bot comment ${CURRENT_COMMENT_ID} is stale because ${COMMENT_PATH} changed after ${COMMENT_TIMESTAMP}."
fi
```"""
on_fail = "skip"
condition = "(!(${BOT_UNAVAILABLE})) && (${BOT_HAS_ISSUES})"

[[workflow.steps]]
id = 10
title = "Arbitrate via Debate"
tool = "csa"
prompt = """
Evaluate the current bot review comment independently to determine if it is a
false positive or a real issue.

Current comment context:
- PR: #${PR_NUM} in ${REPO}
- Review comment id: ${CURRENT_COMMENT_ID}
- Referenced path: ${COMMENT_PATH}
- Comment timestamp: ${COMMENT_TIMESTAMP}

Fetch the review comment body yourself before deciding:
- `gh api repos/${REPO}/pulls/comments/${CURRENT_COMMENT_ID}`

Read the referenced code at the current HEAD. Consider:
1. Does the code actually have the problem the bot describes?
2. Is the bot's suggestion appropriate for this context?
3. Is the current comment already stale relative to the current HEAD?
4. Are there project-specific patterns that justify the current code?

Output format (exact markers):
VERDICT: DISMISSED|CONFIRMED
RATIONALE: <one-line summary>
PR_COMMENT_START
<Markdown audit trail comment body for the caller to post when VERDICT is
DISMISSED. If VERDICT is CONFIRMED, explain why the comment must be rerouted to
the fix step instead of being posted.

When VERDICT is DISMISSED, the comment body MUST include:
- `**Local arbitration result: DISMISSED.**`
- `## Participants`
- `## Bot Concern`
- `## Debate Summary`
- `## Conclusion`
- `CSA session ID: ...`
>
PR_COMMENT_END

Emit each marker exactly once, in the order shown, and do not repeat the format
description in the answer.

Do NOT post to GitHub yourself. The next workflow step posts the PR comment
explicitly when VERDICT is DISMISSED, and reroutes to the fix step when
VERDICT is CONFIRMED."""
tier = "tier-2-standard"
on_fail = "abort"
condition = "(!(${BOT_UNAVAILABLE})) && ((${BOT_HAS_ISSUES}) && ((${COMMENT_IS_FALSE_POSITIVE}) && (!(${COMMENT_IS_STALE}))))"

[[workflow.steps]]
id = 19
title = "Post Debate Audit Trail Comment"
tool = "bash"
prompt = """
Parse the structured debate result from Step 10.
- If VERDICT is DISMISSED: post the explanatory PR comment explicitly via
  `gh pr comment`, fail if comment creation fails, and set AUDIT_TRAIL_POSTED.
- If VERDICT is CONFIRMED: do not post a dismissal comment; reroute this
  comment to the real-issue fix step by setting COMMENT_IS_FALSE_POSITIVE=false.

```bash
set -euo pipefail
DEBATE_OUTPUT="${STEP_10_OUTPUT}"
VERDICT_COUNT="$(
  printf '%s\n' "${DEBATE_OUTPUT}" \
    | grep -Ec '^[[:space:]]*VERDICT: (DISMISSED|CONFIRMED)[[:space:]]*$' \
    || true
)"
if [ "${VERDICT_COUNT}" != "1" ]; then
  echo "ERROR: Debate output must contain exactly one VERDICT marker." >&2
  exit 1
fi
VERDICT_MARKER="$(
  printf '%s\n' "${DEBATE_OUTPUT}" \
    | grep -E '^[[:space:]]*VERDICT: (DISMISSED|CONFIRMED)[[:space:]]*$' \
    | tail -n 1 \
    | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//' \
    || true
)"

if [ -z "${VERDICT_MARKER}" ]; then
  echo "ERROR: Debate output missing VERDICT marker." >&2
  exit 1
fi

VERDICT="${VERDICT_MARKER#VERDICT: }"

case "${VERDICT}" in
  DISMISSED)
    COMMENT_START_COUNT="$(
      printf '%s\n' "${DEBATE_OUTPUT}" \
        | grep -Ec '^[[:space:]]*PR_COMMENT_START[[:space:]]*$' \
        || true
    )"
    COMMENT_END_COUNT="$(
      printf '%s\n' "${DEBATE_OUTPUT}" \
        | grep -Ec '^[[:space:]]*PR_COMMENT_END[[:space:]]*$' \
        || true
    )"
    if [ "${COMMENT_START_COUNT}" != "1" ] || [ "${COMMENT_END_COUNT}" != "1" ]; then
      echo "ERROR: Debate output must contain exactly one PR comment marker pair." >&2
      exit 1
    fi

    COMMENT_START_LINE="$(
      printf '%s\n' "${DEBATE_OUTPUT}" \
        | grep -n -E '^[[:space:]]*PR_COMMENT_START[[:space:]]*$' \
        | tail -n 1 \
        | cut -d: -f1 \
        || true
    )"
    COMMENT_END_LINE="$(
      printf '%s\n' "${DEBATE_OUTPUT}" \
        | grep -n -E '^[[:space:]]*PR_COMMENT_END[[:space:]]*$' \
        | tail -n 1 \
        | cut -d: -f1 \
        || true
    )"
    if [ -z "${COMMENT_START_LINE}" ] || [ -z "${COMMENT_END_LINE}" ] || [ "${COMMENT_END_LINE}" -le "${COMMENT_START_LINE}" ]; then
      echo "ERROR: Debate output has an invalid PR comment marker range." >&2
      exit 1
    fi

    COMMENT_FILE="$(mktemp)"
    trap 'rm -f "${COMMENT_FILE}"' EXIT
    printf '%s\n' "${DEBATE_OUTPUT}" \
      | sed -n "${COMMENT_START_LINE},${COMMENT_END_LINE}p" \
      | sed '1d;$d' > "${COMMENT_FILE}"
    if [ ! -s "${COMMENT_FILE}" ]; then
      echo "ERROR: Debate output missing PR comment body." >&2
      exit 1
    fi
    grep -Eq '^\\*\\*Local arbitration result: DISMISSED\\.\\*\\*$' "${COMMENT_FILE}" || { echo "ERROR: Debate output missing a DISMISSED arbitration result heading." >&2; exit 1; }
    grep -Eq '^## Participants$' "${COMMENT_FILE}" || { echo "ERROR: Debate output missing Participants section." >&2; exit 1; }
    grep -Eq '^## Bot Concern$' "${COMMENT_FILE}" || { echo "ERROR: Debate output missing Bot Concern section." >&2; exit 1; }
    grep -Eq '^## Debate Summary$' "${COMMENT_FILE}" || { echo "ERROR: Debate output missing Debate Summary section." >&2; exit 1; }
    grep -Eq '^## Conclusion$' "${COMMENT_FILE}" || { echo "ERROR: Debate output missing Conclusion section." >&2; exit 1; }
    grep -Eq '^CSA session ID:' "${COMMENT_FILE}" || { echo "ERROR: Debate output missing CSA session ID." >&2; exit 1; }

    gh pr comment "${PR_NUM}" --repo "${REPO}" --body-file "${COMMENT_FILE}"
    rm -f "${COMMENT_FILE}"
    trap - EXIT

    AUDIT_TRAIL_POSTED=true
    echo "CSA_VAR:AUDIT_TRAIL_POSTED=$AUDIT_TRAIL_POSTED"
    ;;
  CONFIRMED)
    AUDIT_TRAIL_POSTED=false
    COMMENT_IS_FALSE_POSITIVE=false
    echo "CSA_VAR:AUDIT_TRAIL_POSTED=$AUDIT_TRAIL_POSTED"
    echo "CSA_VAR:COMMENT_IS_FALSE_POSITIVE=$COMMENT_IS_FALSE_POSITIVE"
    echo "Debate confirmed a real issue. Rerouting this comment to the fix step."
    ;;
  *)
    echo "ERROR: Debate output has unsupported VERDICT '${VERDICT}'." >&2
    exit 1
    ;;
esac
```"""
on_fail = "abort"
condition = "(!(${BOT_UNAVAILABLE})) && ((${BOT_HAS_ISSUES}) && ((${COMMENT_IS_FALSE_POSITIVE}) && (!(${COMMENT_IS_STALE}))))"

[[workflow.steps]]
id = 11
title = "Fix Real Issue"
tool = "csa"
prompt = """
Fix the real issue described by the current bot review comment.

Current comment context:
- PR: #${PR_NUM} in ${REPO}
- Review comment id: ${CURRENT_COMMENT_ID}
- Referenced path: ${COMMENT_PATH}

Fetch the review comment body yourself via:
- `gh api repos/${REPO}/pulls/comments/${CURRENT_COMMENT_ID}`

Read the referenced code at the current HEAD, apply the fix, and commit it."""
tier = "tier-2-standard"
condition = "(!(${BOT_UNAVAILABLE})) && ((${BOT_HAS_ISSUES}) && (!(${COMMENT_IS_FALSE_POSITIVE})) && (!(${COMMENT_IS_STALE})))"

[workflow.steps.on_fail]
retry = 2

[[workflow.steps]]
id = 12
title = "Push Fixes and Continue Loop"
tool = "bash"
prompt = """
Track iteration count via REVIEW_ROUND. Check the round cap BEFORE pushing
fixes and continuing to the next review loop iteration.

When REVIEW_ROUND reaches MAX_REVIEW_ROUNDS (default: 10), STOP and present
options to the user — no new review is triggered until the user decides:
- Option A: Merge now (review is good enough)
- Option B: Continue for MAX_REVIEW_ROUNDS more rounds
- Option C: Abort and investigate manually

The workflow MUST NOT auto-merge or auto-abort at the round limit.

Orchestrator protocol: When the round cap is hit, the bash block exits with
code 0 after printing ROUND_LIMIT_HALT. The orchestrator MUST then use
AskUserQuestion to present options A/B/C and collect the user's choice.

Signal disambiguation: ROUND_LIMIT_HALT (exit 0) = ask user.
ROUND_LIMIT_MERGE (exit 0) = proceed to merge. ROUND_LIMIT_ABORT (exit 1) = stop.

```bash
REVIEW_ROUND=$((REVIEW_ROUND + 1))
MAX_REVIEW_ROUNDS="${MAX_REVIEW_ROUNDS:-10}"
echo "CSA_VAR:REVIEW_ROUND=$REVIEW_ROUND"
echo "CSA_VAR:MAX_REVIEW_ROUNDS=$MAX_REVIEW_ROUNDS"

# --- Handle orchestrator re-entry with user decision (FIRST) ---
if [ -n "${ROUND_LIMIT_ACTION}" ]; then
  case "${ROUND_LIMIT_ACTION}" in
    merge)
      echo "User chose: Merge now. Pushing local commits before merge."
      ROUND_LIMIT_REACHED=false
      git push origin "${WORKFLOW_BRANCH}"
      echo "CSA_VAR:ROUND_LIMIT_REACHED=$ROUND_LIMIT_REACHED"
      echo "CSA_VAR:ROUND_LIMIT_ACTION="
      echo "ROUND_LIMIT_MERGE: Routing to merge step."
      exit 0
      ;;
    continue)
      echo "User chose: Continue. Extending by ${MAX_REVIEW_ROUNDS} rounds."
      ROUND_LIMIT_REACHED=false
      MAX_REVIEW_ROUNDS=$((REVIEW_ROUND + MAX_REVIEW_ROUNDS))
      unset ROUND_LIMIT_ACTION
      echo "CSA_VAR:ROUND_LIMIT_REACHED=$ROUND_LIMIT_REACHED"
      echo "CSA_VAR:MAX_REVIEW_ROUNDS=$MAX_REVIEW_ROUNDS"
      echo "CSA_VAR:ROUND_LIMIT_ACTION="
      ;;
    abort)
      echo "User chose: Abort workflow."
      echo "ROUND_LIMIT_ABORT: Workflow terminated by user."
      exit 1
      ;;
  esac
fi

# --- Round cap check BEFORE push/next-loop ---
if [ "${REVIEW_ROUND}" -ge "${MAX_REVIEW_ROUNDS}" ]; then
  ROUND_LIMIT_REACHED=true
  echo "Reached MAX_REVIEW_ROUNDS (${MAX_REVIEW_ROUNDS})."
  echo "Options:"
  echo "  A) Merge now (review is good enough)"
  echo "  B) Continue for ${MAX_REVIEW_ROUNDS} more rounds"
  echo "  C) Abort and investigate manually"
  echo ""
  echo "CSA_VAR:ROUND_LIMIT_REACHED=$ROUND_LIMIT_REACHED"
  echo "ROUND_LIMIT_HALT: Awaiting user decision."
  exit 0
fi

# --- Push fixes only (next trigger happens in Step 5) ---
git push origin "${WORKFLOW_BRANCH}"
ROUND_LIMIT_REACHED=false
echo "CSA_VAR:ROUND_LIMIT_REACHED=$ROUND_LIMIT_REACHED"
echo "CSA_VAR:REVIEW_ROUND=$REVIEW_ROUND"
echo "CSA_VAR:MAX_REVIEW_ROUNDS=$MAX_REVIEW_ROUNDS"
```

Loop back to Step 5 (delegated wait gate)."""
on_fail = "abort"
condition = "(!(${BOT_UNAVAILABLE})) && (${BOT_HAS_ISSUES})"

[[workflow.steps]]
id = 13
title = "Step 10a: Bot Review Clean"
prompt = "No issues found by bot. Proceed to merge."
on_fail = "abort"
condition = "(!(${BOT_UNAVAILABLE})) && (!(${BOT_HAS_ISSUES})) && (!(${ROUND_LIMIT_REACHED}))"

[[workflow.steps]]
id = 17
title = "Step 10.5: Rebase for Clean History"
tool = "bash"
prompt = """
When the branch has accumulated fix commits from review iterations,
reorganize them into logical groups before merging. Skip if <= 3 commits.

After rebase, trigger one final @codex review, then delegate all long waiting,
fix/review retries, and timeout fallback handling to a single CSA step.
Caller stays as router/gate only (no explicit polling loops).

BLOCKING: The orchestrator MUST NOT proceed to merge until the post-rebase
gate passes (REBASE_REVIEW_HAS_ISSUES=false and FALLBACK_REVIEW_HAS_ISSUES
unset or false).

```bash
set -euo pipefail
TIMEOUT_BIN="$(command -v timeout || command -v gtimeout || true)"
run_with_hard_timeout() {
  local timeout_secs="$1"
  shift
  if [ -n "${TIMEOUT_BIN}" ]; then
    "${TIMEOUT_BIN}" -k 5s "${timeout_secs}s" "$@" 2>&1
    return $?
  fi

  local tmp_out timeout_flag child_pid watcher_pid rc use_pgroup
  tmp_out="$(mktemp)"
  timeout_flag="$(mktemp)"
  rm -f "${timeout_flag}"
  use_pgroup=false
  if command -v setsid >/dev/null 2>&1; then
    setsid "$@" >"${tmp_out}" 2>&1 &
    use_pgroup=true
    child_pid=$!
  else
    "$@" >"${tmp_out}" 2>&1 &
    child_pid=$!
  fi
  (
    sleep "${timeout_secs}"
    if kill -0 "${child_pid}" 2>/dev/null; then
      : >"${timeout_flag}"
      if [ "${use_pgroup}" = "true" ]; then
        kill -TERM "-${child_pid}" 2>/dev/null || true
      else
        kill -TERM "${child_pid}" 2>/dev/null || true
      fi
      sleep 2
      if kill -0 "${child_pid}" 2>/dev/null; then
        if [ "${use_pgroup}" = "true" ]; then
          kill -KILL "-${child_pid}" 2>/dev/null || true
        else
          kill -KILL "${child_pid}" 2>/dev/null || true
        fi
      fi
    fi
  ) &
  watcher_pid=$!
  wait "${child_pid}"
  rc=$?
  kill "${watcher_pid}" 2>/dev/null || true
  cat "${tmp_out}"
  rm -f "${tmp_out}"
  if [ -f "${timeout_flag}" ]; then
    rm -f "${timeout_flag}"
    return 124
  fi
  rm -f "${timeout_flag}"
  return "${rc}"
}

COMMIT_COUNT=$(git rev-list --count main..HEAD)
if [ "${COMMIT_COUNT}" -gt 3 ]; then
  # 1. Create backup branch (idempotent)
  git branch -f "backup-${PR_NUM}-pre-rebase" HEAD

  # 2. Soft reset to merge-base
  MERGE_BASE=$(git merge-base main HEAD)
  git reset --soft $MERGE_BASE

  # 3. Create logical commits by selectively staging files
  git reset HEAD .
  # Group 1: Source code
  git diff --name-only -z HEAD | { grep -zE '^(src/|crates/|lib/|bin/)' || true; } | xargs -0 --no-run-if-empty git add --
  if ! git diff --cached --quiet; then
    git commit -m "feat(scope): primary implementation changes"
  fi

  # Group 2: Patterns, skills, and workflow definitions
  git diff --name-only -z HEAD | { grep -zE '^(patterns/|\\.claude/)' || true; } | xargs -0 --no-run-if-empty git add --
  if ! git diff --cached --quiet; then
    git commit -m "fix(scope): pattern and skill updates"
  fi

  # Group 3: Everything else
  git add -A
  if ! git diff --cached --quiet; then
    git commit -m "chore(scope): config and documentation updates"
  fi

  # 4. Verify replacement commits exist
  NEW_COMMIT_COUNT=$(git rev-list --count ${MERGE_BASE}..HEAD)
  if [ "${NEW_COMMIT_COUNT}" -eq 0 ]; then
    echo "ERROR: No replacement commits after soft reset. Restoring backup."
    git reset --hard "backup-${PR_NUM}-pre-rebase"
    exit 1
  fi

  # 5. Force push
  git push --force-with-lease

  # 6. Trigger final @codex review with trigger marker
  REBASE_CURRENT_SHA="$(git rev-parse HEAD)"
  REBASE_TRIGGER_TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
  REBASE_TRIGGER_BODY="@codex review

<!-- csa-trigger:${REBASE_CURRENT_SHA}:${REBASE_TRIGGER_TS} -->"
  gh pr comment "${PR_NUM}" --repo "${REPO}" --body "${REBASE_TRIGGER_BODY}"

  # 7. Delegate post-rebase wait/fix/review loop to CSA.
  set +e
  GATE_RESULT_FILE="$(mktemp)"
  run_with_hard_timeout 2400 csa run --force-ignore-tier-setting --tool codex --idle-timeout 2400 "Bounded post-rebase gate task only. Do NOT invoke pr-codex-bot skill or any full PR workflow. Operate on PR #${PR_NUM} in repo ${REPO} (branch ${WORKFLOW_BRANCH}). Complete the post-rebase review gate end-to-end: wait up to 10 minutes for @codex response to the latest trigger; if response contains P0/P1/P2 findings, iteratively fix/commit/push/re-trigger and re-check (max 3 rounds); if bot times out, run csa review --range main...HEAD and execute a max-3-round fix/review cycle; leave an audit-trail PR comment whenever timeout fallback path is used; return exactly one marker line REBASE_GATE=PASS when clean, otherwise REBASE_GATE=FAIL and exit non-zero." | tee "${GATE_RESULT_FILE}"
  GATE_RC=${PIPESTATUS[0]}
  set -e
  GATE_RESULT="$(cat "${GATE_RESULT_FILE}")"
  rm -f "${GATE_RESULT_FILE}"
  if [ "${GATE_RC}" -eq 124 ]; then
    REBASE_REVIEW_HAS_ISSUES=true
    FALLBACK_REVIEW_HAS_ISSUES=true
    echo "CSA_VAR:REBASE_REVIEW_HAS_ISSUES=$REBASE_REVIEW_HAS_ISSUES"
    echo "CSA_VAR:FALLBACK_REVIEW_HAS_ISSUES=$FALLBACK_REVIEW_HAS_ISSUES"
    echo "ERROR: Post-rebase delegated gate exceeded hard timeout (2400s)." >&2
    exit 1
  fi
  if [ "${GATE_RC}" -ne 0 ]; then
    REBASE_REVIEW_HAS_ISSUES=true
    FALLBACK_REVIEW_HAS_ISSUES=true
    echo "CSA_VAR:REBASE_REVIEW_HAS_ISSUES=$REBASE_REVIEW_HAS_ISSUES"
    echo "CSA_VAR:FALLBACK_REVIEW_HAS_ISSUES=$FALLBACK_REVIEW_HAS_ISSUES"
    echo "ERROR: Post-rebase delegated gate failed (rc=${GATE_RC})." >&2
    exit 1
  fi

  GATE_MARKER="$(
    printf '%s\n' "${GATE_RESULT}" \
      | grep -E '^[[:space:]]*REBASE_GATE=(PASS|FAIL)[[:space:]]*$' \
      | tail -n 1 \
      | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//' \
      || true
  )"
  if [ "${GATE_MARKER}" != "REBASE_GATE=PASS" ]; then
    REBASE_REVIEW_HAS_ISSUES=true
    FALLBACK_REVIEW_HAS_ISSUES=true
    echo "CSA_VAR:REBASE_REVIEW_HAS_ISSUES=$REBASE_REVIEW_HAS_ISSUES"
    echo "CSA_VAR:FALLBACK_REVIEW_HAS_ISSUES=$FALLBACK_REVIEW_HAS_ISSUES"
    echo "ERROR: Post-rebase review gate failed."
    exit 1
  fi

  BOT_SETTLE_SECS="${BOT_SETTLE_SECS:-20}"
  sleep "${BOT_SETTLE_SECS}"
  set +e
  LATE_ACTIONABLE_COUNT="$(
    gh api "repos/${REPO}/pulls/${PR_NUM}/comments?per_page=100" \
      --jq '[.[] | select(.user.login == "chatgpt-codex-connector[bot]") | select(.created_at > "'"${REBASE_TRIGGER_TS}"'") | select((.body | test("P0|P1|P2"))) ] | length' \
      2>/dev/null
  )"
  LATE_ACTIONABLE_RC=$?
  set -e
  if [ "${LATE_ACTIONABLE_RC}" -ne 0 ]; then
    REBASE_REVIEW_HAS_ISSUES=true
    FALLBACK_REVIEW_HAS_ISSUES=true
    echo "CSA_VAR:REBASE_REVIEW_HAS_ISSUES=$REBASE_REVIEW_HAS_ISSUES"
    echo "CSA_VAR:FALLBACK_REVIEW_HAS_ISSUES=$FALLBACK_REVIEW_HAS_ISSUES"
    echo "ERROR: Failed to query post-rebase actionable bot comments (rc=${LATE_ACTIONABLE_RC})." >&2
    exit 1
  fi
  case "${LATE_ACTIONABLE_COUNT:-}" in
    ''|*[!0-9]*)
      REBASE_REVIEW_HAS_ISSUES=true
      FALLBACK_REVIEW_HAS_ISSUES=true
      echo "CSA_VAR:REBASE_REVIEW_HAS_ISSUES=$REBASE_REVIEW_HAS_ISSUES"
      echo "CSA_VAR:FALLBACK_REVIEW_HAS_ISSUES=$FALLBACK_REVIEW_HAS_ISSUES"
      echo "ERROR: Invalid post-rebase actionable comment count from GitHub API: '${LATE_ACTIONABLE_COUNT}'." >&2
      exit 1
      ;;
  esac
  if [ "${LATE_ACTIONABLE_COUNT}" -gt 0 ]; then
    REBASE_REVIEW_HAS_ISSUES=true
    FALLBACK_REVIEW_HAS_ISSUES=true
    echo "CSA_VAR:REBASE_REVIEW_HAS_ISSUES=$REBASE_REVIEW_HAS_ISSUES"
    echo "CSA_VAR:FALLBACK_REVIEW_HAS_ISSUES=$FALLBACK_REVIEW_HAS_ISSUES"
    echo "ERROR: Detected ${LATE_ACTIONABLE_COUNT} actionable bot comment(s) after post-rebase trigger window." >&2
    exit 1
  fi

  REBASE_REVIEW_HAS_ISSUES=false
  FALLBACK_REVIEW_HAS_ISSUES=false
  echo "CSA_VAR:REBASE_REVIEW_HAS_ISSUES=$REBASE_REVIEW_HAS_ISSUES"
  echo "CSA_VAR:FALLBACK_REVIEW_HAS_ISSUES=$FALLBACK_REVIEW_HAS_ISSUES"
  git push origin "${WORKFLOW_BRANCH}"
fi
```"""
on_fail = "abort"
condition = "(!(${BOT_UNAVAILABLE})) && (!(${BOT_HAS_ISSUES})) && (!(${ROUND_LIMIT_REACHED})) && (${REBASE_ENABLED})"

[[workflow.steps]]
id = 14
title = "Clean Resubmission (if needed)"
tool = "bash"
prompt = """
If fixes accumulated, create clean branch for final review.

