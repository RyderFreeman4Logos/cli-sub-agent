[[workflow.steps]]
id = 16
title = "Step 12b: Final Merge (Direct)"
tool = "bash"
prompt = """
First-pass clean review: merge the existing PR directly. Hard gate blocks
merge if any post-rebase review issues remain unresolved.

```bash
