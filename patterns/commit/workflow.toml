[workflow]
name = "commit"
description = "Strict commit discipline with Conventional Commits, mandatory security audit, test verification, and pre-commit review"

[[workflow.variables]]
name = "AUDIT_FAIL"

[[workflow.variables]]
name = "AUDIT_PASS_DEFERRED"

[[workflow.variables]]
name = "BRANCH"

[[workflow.variables]]
name = "COMMIT_BODY"

[[workflow.variables]]
name = "COMMIT_BODY_LOCAL"

[[workflow.variables]]
name = "COMMIT_MESSAGE_FILE"

[[workflow.variables]]
name = "COMMIT_MESSAGE_FILE_LOCAL"

[[workflow.variables]]
name = "COMMIT_SUBJECT"

[[workflow.variables]]
name = "COMMIT_SUBJECT_LOCAL"

[[workflow.variables]]
name = "CREATE_OUTPUT"

[[workflow.variables]]
name = "CREATE_RC"

[[workflow.variables]]
name = "CRITERIA_SUMMARY"

[[workflow.variables]]
name = "CURRENT_BRANCH"

[[workflow.variables]]
name = "ENABLE_REVIEW_LOOP"

[[workflow.variables]]
name = "FILES"

[[workflow.variables]]
name = "HAS_DEFERRED_ISSUES"

[[workflow.variables]]
name = "IS_MILESTONE"

[[workflow.variables]]
name = "PLAN_JSON"

[[workflow.variables]]
name = "PLAN_TIMESTAMP"

[[workflow.variables]]
name = "PLAN_ULID"

[[workflow.variables]]
name = "PR_BODY"

[[workflow.variables]]
name = "REVIEW_HAS_ISSUES"

[[workflow.variables]]
name = "SKIP_PUBLISH"

[[workflow.variables]]
name = "SCOPE"

[[workflow.variables]]
name = "SID"

[[workflow.variables]]
name = "SPEC_OUTPUT"

[[workflow.variables]]
name = "TRAILERS"

[[workflow.steps]]
id = 1
title = "Variables"
tool = "bash"
prompt = """
Initialize and declare workflow variables.

- `${FILES}`: Space-separated list of files to stage (default: `.`)
- `${SCOPE}`: Conventional Commit scope (e.g., `core`, `cli`)
- `${BRANCH}`: Target branch for push/PR
- `${COMMIT_SUBJECT}`: Generated or provided commit subject
- `${COMMIT_BODY}`: Generated or provided commit body
- `${COMMIT_MESSAGE_FILE}`: Path to temporary commit message file
- `${IS_MILESTONE}`: Set to `"true"` to trigger push and PR
- `${ENABLE_REVIEW_LOOP}`: Set to `"true"` to run iterative review loop
- `${AUDIT_FAIL}`: Set by `security-audit` if blocking issues found
- `${AUDIT_PASS_DEFERRED}`: Set by `security-audit` if non-blocking issues found
- `${REVIEW_HAS_ISSUES}`: Set by `ai-reviewed-commit` if issues found
- `${PR_BODY}`: Body for the created Pull Request

```bash
# Force weave to pick up these variables
: "${FILES}" "${SCOPE}" "${BRANCH}" "${COMMIT_SUBJECT}" "${COMMIT_BODY}" "${COMMIT_MESSAGE_FILE}" "${IS_MILESTONE}" "${ENABLE_REVIEW_LOOP}" "${AUDIT_FAIL}" "${AUDIT_PASS_DEFERRED}" "${REVIEW_HAS_ISSUES}" "${PR_BODY}" "${SKIP_PUBLISH}"

# Bridge CSA_SKIP_PUBLISH env var to workflow variable.
# When parent workflow (mktsk/dev2merge) sets CSA_SKIP_PUBLISH=true, auto-PR is skipped.
# When standalone, CSA_SKIP_PUBLISH is unset → auto-PR runs after commit.
# Also auto-skip in executor mode (`CSA_DEPTH>0` + `CSA_INTERNAL_INVOCATION=1`) —
# the Layer 0 orchestrator owns publish/pr-bot. Letting an employee session
# invoke /pr-bot nests another `csa plan run` and can trip the recursion-ceiling
# guard or leak grandchild processes if the chain fails mid-flight (see #752 Bug 4).
if [ "${CSA_SKIP_PUBLISH:-}" = "true" ]; then
  echo "CSA_VAR:SKIP_PUBLISH=true"
elif [ "${CSA_DEPTH:-0}" -gt 0 ] && [ "${CSA_INTERNAL_INVOCATION:-0}" = "1" ]; then
  echo "CSA_VAR:SKIP_PUBLISH=true"
  echo "INFO: Detected executor mode (CSA_DEPTH=${CSA_DEPTH}, CSA_INTERNAL_INVOCATION=${CSA_INTERNAL_INVOCATION:-0}); auto-skipping push/PR to keep employee sessions orchestration-pure."
else
  echo "CSA_VAR:SKIP_PUBLISH=${SKIP_PUBLISH:-false}"
fi
echo "Variables initialized."
```"""
on_fail = "abort"

[[workflow.steps]]
id = 2
title = "Branch Check"
tool = "bash"
prompt = """
Verify not on protected branch. Must be on feature branch.

```bash
default_branch=$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed 's@^refs/remotes/origin/@@')
if [ -z "$default_branch" ]; then default_branch="main"; fi
branch=$(git branch --show-current)
if [ "$branch" = "$default_branch" ] || [ "$branch" = "dev" ]; then
  echo "ERROR: Cannot commit directly to $branch. Create a feature branch."
  exit 1
fi
```"""
on_fail = "abort"

[[workflow.steps]]
id = 3
title = "Run Formatters"
tool = "bash"
prompt = """
```bash
just fmt
```"""

[workflow.steps.on_fail]
retry = 2

[[workflow.steps]]
id = 4
title = "Run Linters"
tool = "bash"
prompt = """
```bash
just clippy
```"""

[workflow.steps.on_fail]
retry = 2

[[workflow.steps]]
id = 5
title = "Run Tests"
tool = "bash"
prompt = """
```bash
set -o pipefail
just test 2>&1
```"""
on_fail = "abort"

[[workflow.steps]]
id = 6
title = "Stage Changes"
tool = "bash"
prompt = """
Stage all relevant files. Verify no untracked files remain.

```bash
git add ${FILES}
# Allow deletions so cleanup commits can remove previously tracked artifacts.
STAGED_GENERATED_ARTIFACTS="$(
  git diff --cached --name-only --diff-filter=ACMR \
    | rg '^([.]test-target/|[.]tmp/|target/|diff[.]txt$|test-write$)' || true
)"
if [ -n "${STAGED_GENERATED_ARTIFACTS}" ]; then
  echo "ERROR: Generated or scratch artifacts are staged."
  printf '%s\n' "${STAGED_GENERATED_ARTIFACTS}"
  exit 1
fi
if git ls-files --others --exclude-standard | grep -q .; then
  echo "ERROR: Untracked files detected."
  git ls-files --others --exclude-standard
  exit 1
fi
```"""
on_fail = "abort"

[[workflow.steps]]
id = 7
title = "Security Scan"
tool = "bash"
prompt = """
Check staged files for hardcoded secrets, debug statements.

```bash
git diff --cached --name-only | while read -r file; do
  if grep -nE '(API_KEY|SECRET|PASSWORD|PRIVATE_KEY)=' "$file" 2>/dev/null; then
    echo "FAIL: Potential secret in $file"
    exit 1
  fi
done
```"""
on_fail = "abort"

[[workflow.steps]]
id = 8
title = "Security Audit"
tool = "csa"
prompt = """
Run the security audit directly in this CSA step.
- Review the staged changes and associated tests.
- Phase 1: test completeness.
  - For each changed public function, verify normal-path, edge/boundary, and error-condition coverage.
  - Ask whether there is a missing test case you can still propose; treat missing coverage in changed code as blocking unless it is clearly deferred outside the current scope.
- Phase 2: vulnerability scan.
  - For external-input handling, check input validation and size/length limits.
  - Check panic paths on untrusted input (`unwrap`, `expect`, index access).
  - Check crafted-input resource exhaustion risks.
  - Check timing-attack exposure for secrets.
  - Check integer overflow handling.
- Phase 3: code quality.
  - Check for debug code, hardcoded secrets, commented-out code, TODO/FIXME security items, and incomplete error handling on untrusted input.
- Emit `CSA_VAR:AUDIT_FAIL=true` when blocking issues exist; otherwise emit `CSA_VAR:AUDIT_FAIL=false`.
- Emit `CSA_VAR:AUDIT_PASS_DEFERRED=true` when only deferred follow-up issues remain; otherwise emit `CSA_VAR:AUDIT_PASS_DEFERRED=false`.
- Blocking issues take precedence over deferred ones.
- End with a concise structured audit report and a final verdict: PASS, PASS_DEFERRED, or FAIL."""
tier = "tier-2-standard"
on_fail = "abort"

[[workflow.steps]]
id = 9
title = "Include security-audit"
tool = "weave"
prompt = "security-audit"
on_fail = "abort"

[[workflow.steps]]
id = 10
title = "Fix Audit Issues"
prompt = "Fix blocking issues and re-run from Step 2."
on_fail = "abort"
condition = "${AUDIT_FAIL}"

[[workflow.steps]]
id = 11
title = "Record Deferred Issues"
prompt = """
Record deferred issues (other modules) via TaskCreate for
immediate post-commit fixing."""
on_fail = "abort"
condition = "${AUDIT_PASS_DEFERRED}"

[[workflow.steps]]
id = 12
title = "Pre-Commit Review"
tool = "csa"
prompt = """
Run the staged-diff review directly in this CSA step.
- Inspect `git diff --cached` for correctness, regressions, security issues, and test gaps.
- Use an authorship-aware review strategy.
  - Self-authored changes from this session: review with the adversarial rigor of `csa debate`.
  - Other-authored changes: review with the `csa review --diff --allow-fallback` standard.
- Check the applicable AGENTS.md chain for every staged file.
- Explicitly check rule 009 (error handling), rule 014 (security), and rule 016 (testing).
- Enforce the `Reviewer Guidance` schema in the generated commit body:
  - `Timing/Race Scenarios`, `Boundary Cases`, and `Regression Tests Added` must all be present.
  - If `Timing/Race Scenarios` is not `none`, `Regression Tests Added` must list concrete test names.
  - Missing tests, empty test lists, or tests that do not match the stated timing/race scenarios are
    blocking review failures.
- If staged changes touch `PATTERN.md` or `workflow.toml`, check rule 027 `pattern-workflow-sync`.
- If staged changes touch process spawning or lifecycle code, check Rust rule 015 `subprocess-lifecycle`.
- If the implementation session is available, you may optionally use fork-based self-review guidance such as `csa review --fork-from <impl-session-id> --diff` for zero-cost context reuse.
- Emit `CSA_VAR:REVIEW_HAS_ISSUES=true` when fixes are required before commit; otherwise emit `CSA_VAR:REVIEW_HAS_ISSUES=false`.
- If issues exist, explain exactly what must be fixed before commit proceeds.
- Preserve the AGENTS.md compliance checklist and rule checks below."""
tier = "tier-2-standard"
on_fail = "abort"

[[workflow.steps]]
id = 13
title = "Include ai-reviewed-commit"
tool = "weave"
prompt = "ai-reviewed-commit"
on_fail = "abort"

[[workflow.steps]]
id = 14
title = "Fix Review Issues"
tool = "csa"
prompt = """
Fix issues, re-run quality gates, re-review.

```bash
just pre-commit
```"""
tier = "tier-2-standard"
condition = "${REVIEW_HAS_ISSUES}"

[workflow.steps.on_fail]
retry = 3

[[workflow.steps]]
id = 15
title = "Optional Review-Loop"
tool = "csa"
prompt = "Run `review-loop` pattern on staged changes before final commit."
tier = "tier-2-standard"
on_fail = "abort"
condition = '${ENABLE_REVIEW_LOOP} == "true"'

[[workflow.steps]]
id = 16
title = "Include review-loop"
tool = "weave"
prompt = "review-loop"
on_fail = "abort"
condition = '${ENABLE_REVIEW_LOOP} == "true"'

[[workflow.steps]]
id = 17
title = "Generate Commit Message Parts"
tool = "bash"
prompt = '''
Generate a Conventional Commits subject/body split from staged files. The body
MUST contain a short description of what changed followed by the AI Reviewer
Metadata block. Generate the metadata from the actual staged changes, design
decisions made during implementation, and reviewer guidance needed for careful
inspection. Prefer a richer `${COMMIT_BODY}` supplied by an upstream AI step
when available; otherwise fall back to the helper script.

```bash
set -euo pipefail
COMMIT_SUBJECT_LOCAL="$(scripts/gen_commit_msg.sh --subject "${SCOPE:-}")"
COMMIT_BODY_RAW="${COMMIT_BODY:-}"

if [ -n "${COMMIT_BODY_RAW}" ] && [ "${COMMIT_BODY_RAW}" != '""' ]; then
  if ! COMMIT_BODY_LOCAL="$(printf '%s' "${COMMIT_BODY_RAW}" | jq -er . 2>/dev/null)"; then
    COMMIT_BODY_LOCAL="${COMMIT_BODY_RAW}"
  fi
else
  COMMIT_BODY_LOCAL="$(scripts/gen_commit_msg.sh --body "${SCOPE:-}")"
fi

if [ -z "${COMMIT_SUBJECT_LOCAL}" ]; then
  echo "ERROR: Commit subject is empty." >&2
  exit 1
fi

if [ -z "$(printf '%s' "${COMMIT_BODY_LOCAL}" | tr -d '[:space:]')" ]; then
  echo "ERROR: Commit body is empty. AI-era commit format requires a summary and metadata block." >&2
  exit 1
fi

for required_line in \
  '### AI Reviewer Metadata' \
  '- **Design Intent**:' \
  '- **Key Decisions**:' \
  '- **Reviewer Guidance**:'
do
  if ! printf '%s\n' "${COMMIT_BODY_LOCAL}" | grep -Fq -- "${required_line}"; then
    echo "ERROR: Commit body is missing required AI reviewer metadata line: ${required_line}" >&2
    exit 1
  fi
done

for required_guidance in 'Timing/Race Scenarios:' 'Boundary Cases:' 'Regression Tests Added:'; do
  if ! printf '%s\n' "${COMMIT_BODY_LOCAL}" | grep -Fq -- "${required_guidance}"; then
    echo "ERROR: Commit body Reviewer Guidance must include the required '${required_guidance}' sub-field." >&2
    exit 1
  fi
done

timing_guidance="$(printf '%s\n' "${COMMIT_BODY_LOCAL}" | sed -n 's/^  - \*\*Timing\/Race Scenarios\*\*: //p' | head -n1)"
regression_tests_guidance="$(printf '%s\n' "${COMMIT_BODY_LOCAL}" | sed -n 's/^  - \*\*Regression Tests Added\*\*: //p' | head -n1)"

if [ -z "${timing_guidance}" ] || [ -z "${regression_tests_guidance}" ]; then
  echo "ERROR: Commit body Reviewer Guidance must populate both Timing/Race Scenarios and Regression Tests Added." >&2
  exit 1
fi

if ! printf '%s\n' "${timing_guidance}" | grep -Eiq '^(none|n/a|na|not applicable)([[:space:][:punct:]].*)?$'; then
  if printf '%s\n' "${regression_tests_guidance}" | grep -Eiq '^(none|n/a|na|not applicable)([[:space:][:punct:]].*)?$'; then
    echo "ERROR: Regression Tests Added must list concrete test names when Timing/Race Scenarios is not 'none'." >&2
    exit 1
  fi
fi

echo "CSA_VAR:COMMIT_SUBJECT=$COMMIT_SUBJECT_LOCAL"
echo "CSA_VAR:COMMIT_BODY=$(printf '%s' "$COMMIT_BODY_LOCAL" | jq -Rs .)"
printf '%s\n' "${COMMIT_SUBJECT_LOCAL}"
```'''
on_fail = "abort"

[[workflow.steps]]
id = 18
title = "Inject Spec Trailers"
tool = "bash"
prompt = '''
If the current branch has an associated TODO plan with `spec.toml`,
append audit trailers to the commit body. Skip silently when no plan exists.

```bash
set -euo pipefail
COMMIT_BODY_LOCAL="$(printf '%s' "${COMMIT_BODY:-\"\"}" | jq -r .)"
CURRENT_BRANCH="$(git branch --show-current)"
PLAN_JSON="$(csa --format json todo find --branch "${CURRENT_BRANCH}")"
PLAN_TIMESTAMP="$(printf '%s' "${PLAN_JSON}" | jq -r '.[0].timestamp // empty')"

if [ -n "${PLAN_TIMESTAMP}" ]; then
  SPEC_OUTPUT="$(csa todo show --timestamp "${PLAN_TIMESTAMP}" --spec)"
  if [ "${SPEC_OUTPUT}" != "No spec found for this plan" ]; then
    PLAN_ULID="$(printf '%s\n' "${SPEC_OUTPUT}" | sed -n 's/^Plan ULID: //p' | head -n1)"
    CRITERIA_SUMMARY="$(printf '%s\n' "${SPEC_OUTPUT}" | sed -n 's/^Summary: //p' | head -n1)"
    CRITERIA_SUMMARY="$(printf '%s' "${CRITERIA_SUMMARY}" | tr '\r\n' '  ' | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')"

    TRAILERS=""
    if [ -n "${PLAN_ULID}" ]; then
      TRAILERS="CSA-Plan: ${PLAN_ULID}"
    fi
    if [ -n "${CRITERIA_SUMMARY}" ]; then
      if [ -n "${TRAILERS}" ]; then
        TRAILERS="${TRAILERS}"$'\n'
      fi
      TRAILERS="${TRAILERS}CSA-Criteria: ${CRITERIA_SUMMARY}"
    fi

    if [ -n "${TRAILERS}" ]; then
      if [ -n "${COMMIT_BODY_LOCAL}" ]; then
        COMMIT_BODY_LOCAL="$(printf '%s\n\n%s' "${COMMIT_BODY_LOCAL}" "${TRAILERS}")"
      else
        COMMIT_BODY_LOCAL="${TRAILERS}"
      fi
    fi
  fi
fi

echo "CSA_VAR:COMMIT_BODY=$(printf '%s' "$COMMIT_BODY_LOCAL" | jq -Rs .)"
printf '%s\n' "${COMMIT_BODY_LOCAL}"
```'''
on_fail = "abort"

[[workflow.steps]]
id = 19
title = "Write Commit Message File"
tool = "bash"
prompt = '''
Persist the subject/body split to a temporary file for `git commit -F`.

```bash
set -euo pipefail
COMMIT_SUBJECT_LOCAL="${COMMIT_SUBJECT:-}"
COMMIT_BODY_LOCAL="$(printf '%s' "${COMMIT_BODY:-\"\"}" | jq -r .)"

if [ -z "${COMMIT_SUBJECT_LOCAL}" ]; then
  echo "ERROR: Commit subject is empty." >&2
  exit 1
fi

COMMIT_MESSAGE_FILE_LOCAL="$(mktemp)"
{
  printf '%s\n' "${COMMIT_SUBJECT_LOCAL}"
  printf '\n'
  printf '%s' "${COMMIT_BODY_LOCAL}"
  printf '\n'
} > "${COMMIT_MESSAGE_FILE_LOCAL}"

echo "CSA_VAR:COMMIT_MESSAGE_FILE=$COMMIT_MESSAGE_FILE_LOCAL"
cat "${COMMIT_MESSAGE_FILE_LOCAL}"
```'''
on_fail = "abort"

[[workflow.steps]]
id = 20
title = "Commit"
tool = "bash"
prompt = """
```bash
set -euo pipefail
COMMIT_MESSAGE_FILE_LOCAL="${COMMIT_MESSAGE_FILE:-}"

if [ -z "${COMMIT_MESSAGE_FILE_LOCAL}" ] || [ ! -f "${COMMIT_MESSAGE_FILE_LOCAL}" ]; then
  echo "ERROR: Commit message file is missing." >&2
  exit 1
fi

trap 'rm -f "${COMMIT_MESSAGE_FILE_LOCAL}"' EXIT
git commit -F "${COMMIT_MESSAGE_FILE_LOCAL}"
echo '<!-- CSA:NEXT_STEP cmd="cumulative branch review (Step 18) or publish" required=true -->'
```"""
on_fail = "abort"

[[workflow.steps]]
id = 21
title = "Cumulative Branch Review"
tool = "csa"
prompt = """
Perform a cumulative review of the entire feature branch before pushing.
This catches cross-commit issues that per-commit reviews might miss.

```bash
set -euo pipefail
bash scripts/csa/cumulative-review-batch.sh --default-branch main -- \
  csa review --range main...HEAD
echo '<!-- CSA:NEXT_STEP cmd="push and create PR (Step 19)" required=true -->'
```"""
tier = "tier-2-standard"
on_fail = "abort"
condition = "!(${SKIP_PUBLISH})"

[[workflow.steps]]
id = 22
title = "Auto PR Transaction"
tool = "bash"
prompt = '''
Push, create or reuse the PR, then synchronously run the post-create helper.
This makes PR creation + pr-bot a single shell-enforced transaction.

Runs by default when commit is standalone. Skipped when parent workflow
(mktsk/dev2merge) sets CSA_SKIP_PUBLISH=true to handle publish itself.

```bash
set -euo pipefail
if [ "${CSA_DEPTH:-0}" -gt 0 ] && [ "${CSA_INTERNAL_INVOCATION:-0}" = "1" ]; then
  echo "INFO: Executor mode detected; skipping push/PR transaction."
  exit 0
fi

if [ -z "${COMMIT_SUBJECT:-}" ]; then
  echo "ERROR: PR title is empty." >&2
  exit 1
fi

# Resolve branch name (BRANCH may be unset in standalone /commit)
BRANCH="${BRANCH:-$(git branch --show-current)}"
if [ -z "${BRANCH}" ] || [ "${BRANCH}" = "HEAD" ]; then
  echo "ERROR: Cannot determine current branch for push." >&2
  exit 1
fi

git push -u origin "${BRANCH}"
set +e
CREATE_OUTPUT="$(gh pr create --base main --title "${COMMIT_SUBJECT}" --body "${PR_BODY}" 2>&1)"
CREATE_RC=$?
set -e
if [ "${CREATE_RC}" -ne 0 ]; then
  if ! printf '%s\n' "${CREATE_OUTPUT}" | grep -Eiq 'already exists|a pull request already exists'; then
    echo "ERROR: gh pr create failed: ${CREATE_OUTPUT}" >&2
    exit 1
  fi
  echo "INFO: PR already exists for ${BRANCH}; continuing with post-create helper."
fi
scripts/hooks/post-pr-create.sh --base main
echo '<!-- CSA:NEXT_STEP cmd="csa plan run --sa-mode true patterns/pr-bot/workflow.toml" required=true -->'
```'''
on_fail = "abort"
condition = "!(${SKIP_PUBLISH})"

[[workflow.steps]]
id = 23
title = "Fix Deferred Issues"
prompt = """
Fix deferred issues by priority (Critical > High > Medium).
Each fix goes through full commit workflow (Steps 1-17)."""
on_fail = "abort"
condition = "${HAS_DEFERRED_ISSUES}"
