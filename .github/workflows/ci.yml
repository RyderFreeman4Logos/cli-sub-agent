name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        uses: taiki-e/install-action@ba41dd491d91278bf5d2280486932414ba6d4991
      - name: Check workspace
        run: cargo check --workspace --all-features
      - name: Check dependencies
        run: cargo deny check
      - name: Check for Chinese characters
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking for Chinese characters..."
          ! rg "\p{Script=Han}" . --vimgrep --glob '!target/**' --glob '!.git/**' --glob '!**/i18n/*.ftl' --glob '!skills/mktd/**' --glob '!tests/fixtures/**' --glob '!.claude/rules/**' --glob '!.agents/**' --glob '!CLAUDE.md' --glob '!GEMINI.md'
      - name: Build csa for monolith detection
        run: cargo build --quiet -p cli-sub-agent --bin csa
      - name: Detect monolith files
        shell: bash
        env:
          MONOLITH_TOKEN_THRESHOLD: "8000"
          MONOLITH_LINE_THRESHOLD: "800"
          TOKUIN_MODEL: "gpt-4"
        run: |
          set -euo pipefail

          checker="$(mktemp)"
          trap 'rm -f "$checker"' EXIT

          cat >"$checker" <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          file="$1"
          threshold_tokens="${MONOLITH_TOKEN_THRESHOLD}"
          threshold_lines="${MONOLITH_LINE_THRESHOLD}"
          model="${TOKUIN_MODEL}"

          case "$file" in
              *.lock|*lock.json|*lock.yaml) exit 0 ;;
              */AGENTS.md|*/FACTORY.md) exit 0 ;;
              */PATTERN.md|*/SKILL.md) exit 0 ;;
              */workflow.toml) exit 0 ;;
          esac

          [ -f "$file" ] || exit 0
          grep -Iq '' "$file" 2>/dev/null || exit 0

          if ! lines="$(wc -l <"$file" 2>/dev/null)"; then
              lines=0
          fi
          lines="$(printf '%s' "$lines" | tr -d '[:space:]')"
          case "$lines" in
              ''|*[!0-9]*) lines=0 ;;
          esac
          if [ "$lines" -gt "$threshold_lines" ]; then
              printf 'Monolith file detected (%s lines, limit: %s): %q\n' "$lines" "$threshold_lines" "$file" >&2
              exit 1
          fi

          if ! tokens="$(./target/debug/csa tokuin estimate --model "$model" "$file" 2>/dev/null)"; then
              tokens=0
          fi
          tokens="$(printf '%s' "$tokens" | tr -d '[:space:]')"
          case "$tokens" in
              ''|*[!0-9]*) tokens=0 ;;
          esac
          if [ "$tokens" -gt "$threshold_tokens" ]; then
              printf 'Monolith file detected (%s tokens, limit: %s): %q\n' "$tokens" "$threshold_tokens" "$file" >&2
              exit 1
          fi
          SCRIPT

          chmod +x "$checker"

          while IFS= read -r -d '' file; do
            "$checker" "$file"
          done < <(git ls-files -z --recurse-submodules)

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features -- -D warnings

  version-bump:
    name: Version Bump
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version bumped vs main
        run: |
          current=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          main_ver=$(git show origin/main:Cargo.toml | grep '^version' | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "PR version: $current"
          echo "main version: $main_ver"
          if [ "$current" = "$main_ver" ]; then
            echo "::error::Version ($current) matches main. Run 'just bump-patch' before pushing."
            exit 1
          fi
          # Ensure version is strictly greater than main (no downgrades).
          highest=$(printf '%s\n%s\n' "$main_ver" "$current" | sort -V | tail -1)
          if [ "$highest" != "$current" ]; then
            echo "::error::Version ($current) is lower than main ($main_ver). Version must be incremented, not decremented."
            exit 1
          fi

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install nextest
        uses: taiki-e/install-action@f1d55f103dfbf9be3d3cf757ce9e198778ba8687
      - name: Run workspace tests (default features)
        run: cargo nextest run --workspace
      - name: Run workspace tests (all features)
        run: cargo nextest run --workspace --all-features
      - name: Run cli-sub-agent e2e tests
        if: matrix.os == 'ubuntu-latest'
        run: cargo nextest run --package cli-sub-agent --test e2e --all-features
