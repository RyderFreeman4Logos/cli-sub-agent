name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        uses: taiki-e/install-action@ba41dd491d91278bf5d2280486932414ba6d4991
      - name: Check workspace
        run: cargo check --workspace --all-features
      - name: Check dependencies
        run: cargo deny check
      - name: Check for Chinese characters
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking for Chinese characters..."
          ! rg "\p{Script=Han}" . --vimgrep --glob '!target/**' --glob '!.git/**' --glob '!**/i18n/*.ftl' --glob '!skills/mktd/**' --glob '!tests/fixtures/**' --glob '!.claude/rules/**' --glob '!.agents/**' --glob '!CLAUDE.md' --glob '!GEMINI.md'
      - name: Build csa for monolith detection
        run: cargo build --quiet -p cli-sub-agent --bin csa
      - name: Detect monolith files
        shell: bash
        env:
          MONOLITH_TOKEN_THRESHOLD: "8000"
          MONOLITH_LINE_THRESHOLD: "800"
          TOKUIN_MODEL: "gpt-4o"
        run: scripts/monolith/check.sh --scope all --baseline scripts/monolith/baseline.toml --report-all
      - name: Test monolith checker
        shell: bash
        run: bash scripts/tests/monolith-check-tests.sh

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features -- -D warnings

  version-bump:
    name: Version Bump
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version bumped vs main
        run: |
          current=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          main_ver=$(git show origin/main:Cargo.toml | grep '^version' | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "PR version: $current"
          echo "main version: $main_ver"
          if [ "$current" = "$main_ver" ]; then
            echo "::error::Version ($current) matches main. Run 'just bump-patch' before pushing."
            exit 1
          fi
          # Ensure version is strictly greater than main (no downgrades).
          highest=$(printf '%s\n%s\n' "$main_ver" "$current" | sort -V | tail -1)
          if [ "$highest" != "$current" ]; then
            echo "::error::Version ($current) is lower than main ($main_ver). Version must be incremented, not decremented."
            exit 1
          fi

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Install nextest
        uses: taiki-e/install-action@f1d55f103dfbf9be3d3cf757ce9e198778ba8687
      - name: Install bubblewrap
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y bubblewrap
      - name: Run workspace tests (default features)
        run: cargo nextest run --workspace --no-fail-fast
      - name: Run workspace tests (all features)
        run: cargo nextest run --workspace --all-features --no-fail-fast
      - name: Run cli-sub-agent e2e tests
        if: matrix.os == 'ubuntu-latest'
        run: cargo nextest run --package cli-sub-agent --test e2e --all-features --no-fail-fast
