# Project-level CSA configuration for cli-sub-agent.
#
# These [hooks] entries are injected as runtime overrides and take
# priority over ~/.config/cli-sub-agent/hooks.toml and session-root
# hooks.toml entries for PreRun/PostRun events.

[hooks]
# Safety-net: after every `csa run` session, inspect the session output
# for a freshly created GitHub PR URL, then trigger the deterministic
# post-create transaction. Fall back to the branch-based open-PR check
# only when the session output does not provide an exact PR signal.
# CSA sets cwd to project root before hook execution, so relative paths
# are safe.  The script also resolves project root internally as fallback.
post_run = "scripts/hooks/post-pr-create-check.sh --base main --session-dir {session_dir}"
timeout_secs = 120

[review]
# Quality gate command for csa review/debate pre-review checks.
# With lefthook managing hooks (no core.hooksPath), pipeline_gate.rs cannot
# auto-detect the pre-commit hook — an explicit gate_command is required.
gate_command = "lefthook run pre-commit"
tier = "tier-review"

[debate]
tier = "tier-review"

[tiers.tier-review]
description = "Review and debate tier with priority-based fallback"
strategy = "priority"
models = [
  "gemini-cli/google/gemini-3.1-pro-preview/xhigh",
  "codex/openai/o3/medium",
  "claude-code/anthropic/claude-sonnet-4-20250514/none",
]
