# Lefthook — git hooks manager
# Install: lefthook install
# Docs: https://github.com/evilmartians/lefthook

# Suppress interactive spinner in non-TTY contexts (CSA daemon sessions,
# CI, piped invocations). Without this, lefthook renders ⠙/⠹ spinner
# frames with \r that accumulate as literal bytes in output.log, ballooning
# it to ~30 MB and causing "quality-gates" hang symptoms (#1040).
no_tty: true

pre-commit:
  commands:
    branch-protection:
      run: scripts/hooks/branch-protection.sh
    quality-gates:
      run: just pre-commit

pre-push:
  commands:
    version-check:
      run: scripts/hooks/version-check.sh
    review-check:
      run: scripts/hooks/review-check.sh

post-merge:
  commands:
    rebuild:
      run: scripts/hooks/post-merge-rebuild.sh
