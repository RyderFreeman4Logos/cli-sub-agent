[model_catalog]
mode = "replace"
closed = true

# Later layers are applied independently. `extend` upserts exact
# (tool, provider, model) identities and open scopes. `replace` first discards
# lower-priority entries/scopes. `enabled = false` is an exact tombstone.
# Precedence is shipped data < global/user config < project config.

[[model_catalog.open_scopes]]
tool = "openai-compat"
provider = "*"
reasoning_efforts = ["default", "low", "medium", "high", "xhigh", "max"]
allow_custom_reasoning = true

