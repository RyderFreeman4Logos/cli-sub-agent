# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
ignore = [
    # Transitive from agent-teams -> cc-sdk -> reqwest.
    # rustls-pemfile is archived; no non-breaking safe upgrade is available yet.
    "RUSTSEC-2025-0134",
    # (removed: RUSTSEC-2024-0384 resolved by dependency upgrades)
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "MPL-2.0",
    "Zlib",
    "CDLA-Permissive-2.0",
    "OpenSSL",
]
# xurl-core is pre-release (0.0.0-dev) with no license field in manifest yet.
# Upstream repo (github.com/Xuanwo/xurl) is Apache-2.0 licensed.
exceptions = [
    { allow = ["Apache-2.0"], crate = "xurl-core" },
]

[[licenses.clarify]]
crate = "xurl-core"
expression = "Apache-2.0"
license-files = []

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/ZhangHanDong/agent-teams-rs.git",
    "https://github.com/Xuanwo/xurl.git",
    "https://github.com/nooscraft/tokuin.git",
]
